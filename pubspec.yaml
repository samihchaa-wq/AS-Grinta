name: as_grinta
description: Application officielle AS Grinta.
publish_to: "none"
version: 0.2.1+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  connectivity_plus: ^6.1.4
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  image_picker: ^1.1.2
  supabase_flutter: ^2.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/mpg_logo.png
    - assets/images/mpg_logo_bar.png
    - assets/images/scorer_logo.png
    - assets/images/keeper_logo.png
