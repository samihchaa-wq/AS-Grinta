name: Format next match flow

on:
  push:
    branches: [agent/simplify-next-match-flow]
    paths:
      - '.github/workflows/format_next_match_flow.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/simplify-next-match-flow
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Format changed Dart files
        run: |
          dart format \
            lib/features/home/presentation/accueil_page.dart \
            lib/features/predictions/presentation/pronos_hub_history_section.dart \
            lib/features/sports_management/presentation/match_lineup_page.dart \
            lib/features/sports_management/presentation/widgets/match_availability_board_card.dart
      - name: Commit formatter output
        run: |
          if git diff --quiet; then
            echo 'No formatting changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            lib/features/home/presentation/accueil_page.dart \
            lib/features/predictions/presentation/pronos_hub_history_section.dart \
            lib/features/sports_management/presentation/match_lineup_page.dart \
            lib/features/sports_management/presentation/widgets/match_availability_board_card.dart
          git commit -m 'Formater le parcours du prochain match'
          git push origin HEAD:agent/simplify-next-match-flow
