name: Runtime diagnostic

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get

      - name: Apply prediction distance sort
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('lib/features/predictions/presentation/widgets/premium_season_gauges.dart')
          text = path.read_text()

          text, sort_count = re.subn(
              r"    final predictions = \[\.\.\.gauge\.predictions\]\n"
              r"      \.\.sort\(\(a, b\) \{\n"
              r".*?"
              r"      \}\);\n",
              """    final predictions = [...gauge.predictions]
      ..sort((a, b) {
        final aDistance = (a.value - gauge.actual).abs();
        final bDistance = (b.value - gauge.actual).abs();
        final byDistance = aDistance.compareTo(bDistance);
        if (byDistance != 0) return byDistance;

        final byValue = a.value.compareTo(b.value);
        if (byValue != 0) return byValue;

        return a.predictorName.toLowerCase().compareTo(
              b.predictorName.toLowerCase(),
            );
      });
""",
              text,
              count=1,
              flags=re.S,
          )

          text, call_count = re.subn(
              r"                    rank: _rankFor\(predictions, index\),",
              """                    rank: _rankFor(
                      predictions,
                      index,
                      gauge.actual,
                    ),""",
              text,
              count=1,
          )

          text, rank_count = re.subn(
              r"  int _rankFor\(List<GaugePrediction> predictions, int index\) \{\n"
              r".*?"
              r"  \}\n",
              """  int _rankFor(
    List<GaugePrediction> predictions,
    int index,
    int actual,
  ) {
    if (index == 0) return 1;

    final currentDistance = (predictions[index].value - actual).abs();
    final previousDistance = (predictions[index - 1].value - actual).abs();
    if (currentDistance == previousDistance) {
      return _rankFor(predictions, index - 1, actual);
    }
    return index + 1;
  }
""",
              text,
              count=1,
              flags=re.S,
          )

          if (sort_count, call_count, rank_count) != (1, 1, 1):
            raise SystemExit(
                f'Unexpected replacement counts: {(sort_count, call_count, rank_count)}'
            )

          path.write_text(text)

      - run: dart format lib/features/predictions/presentation/widgets/premium_season_gauges.dart

      - name: Upload generated Dart file
        uses: actions/upload-artifact@v4
        with:
          name: prediction-distance-sort-file
          path: lib/features/predictions/presentation/widgets/premium_season_gauges.dart
          if-no-files-found: error

      - name: Build debug web with source maps
        run: flutter build web --debug --source-maps --base-href "/"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install --no-save playwright-core@1.52.0
      - name: Start local server
        run: |
          python3 -m http.server 8080 --directory build/web >/tmp/http.log 2>&1 &
          echo $! > /tmp/http.pid
          sleep 2
      - name: Inspect rendered app
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright-core');
          (async () => {
            const browser = await chromium.launch({
              headless: true,
              executablePath: '/usr/bin/google-chrome',
              args: ['--no-sandbox', '--disable-dev-shm-usage'],
            });
            const context = await browser.newContext({
              viewport: { width: 390, height: 844 },
              serviceWorkers: 'block',
            });
            const page = await context.newPage();
            const events = [];
            page.on('console', msg => events.push(`console.${msg.type()}: ${msg.text()}`));
            page.on('pageerror', error => events.push(`pageerror: ${error.stack || error.message}`));
            page.on('requestfailed', request => events.push(`requestfailed: ${request.url()} ${request.failure()?.errorText}`));
            page.on('response', response => {
              if (response.status() >= 400 && !response.url().endsWith('/favicon.ico')) {
                events.push(`http ${response.status()}: ${response.url()}`);
              }
            });
            await page.goto('http://127.0.0.1:8080/', { waitUntil: 'networkidle', timeout: 90000 });
            await page.waitForTimeout(5000);
            await page.screenshot({ path: 'runtime.png', fullPage: true });
            fs.writeFileSync('runtime.html', await page.content());
            fs.writeFileSync('runtime.log', events.join('\n'));
            console.log(events.join('\n'));
            if (events.some(line => line.startsWith('console.error:') || line.startsWith('pageerror:'))) {
              throw new Error('Runtime error detected');
            }
            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-diagnostic
          path: |
            runtime.png
            runtime.html
            runtime.log
            build/web/main.dart.js
            build/web/main.dart.js.map
            /tmp/http.log
          if-no-files-found: warn
