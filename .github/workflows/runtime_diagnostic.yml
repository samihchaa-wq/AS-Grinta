name: Runtime diagnostic

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release --base-href "/"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install --no-save playwright-core@1.52.0
      - name: Start local server
        run: |
          python3 -m http.server 8080 --directory build/web >/tmp/http.log 2>&1 &
          echo $! > /tmp/http.pid
          sleep 2
      - name: Inspect rendered app
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright-core');
          (async () => {
            const browser = await chromium.launch({
              headless: true,
              executablePath: '/usr/bin/google-chrome',
              args: ['--no-sandbox', '--disable-dev-shm-usage'],
            });
            const context = await browser.newContext({
              viewport: { width: 390, height: 844 },
              serviceWorkers: 'block',
            });
            const page = await context.newPage();
            const events = [];
            page.on('console', msg => events.push(`console.${msg.type()}: ${msg.text()}`));
            page.on('pageerror', error => events.push(`pageerror: ${error.stack || error.message}`));
            page.on('requestfailed', request => events.push(`requestfailed: ${request.url()} ${request.failure()?.errorText}`));
            page.on('response', response => {
              if (response.status() >= 400) events.push(`http ${response.status()}: ${response.url()}`);
            });
            await page.goto('http://127.0.0.1:8080/', { waitUntil: 'networkidle', timeout: 90000 });
            await page.waitForTimeout(5000);
            await page.screenshot({ path: 'runtime.png', fullPage: true });
            const html = await page.content();
            fs.writeFileSync('runtime.html', html);
            fs.writeFileSync('runtime.log', events.join('\n'));
            const bodyText = await page.locator('body').innerText().catch(() => '');
            fs.writeFileSync('runtime-body.txt', bodyText);
            console.log(events.join('\n'));
            if (events.some(line => line.includes('FlutterError') || line.includes('pageerror:'))) {
              throw new Error('Runtime error detected');
            }
            const size = fs.statSync('runtime.png').size;
            if (size < 5000) throw new Error(`Screenshot too small: ${size}`);
            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-diagnostic
          path: |
            runtime.png
            runtime.html
            runtime.log
            runtime-body.txt
            /tmp/http.log
          if-no-files-found: warn
