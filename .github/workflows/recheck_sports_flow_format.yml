name: Recheck sports flow format

on:
  push:
    branches: [feature/simple-player-sports-flow]

permissions:
  contents: write

concurrency:
  group: recheck-sports-flow-format-${{ github.ref }}
  cancel-in-progress: false

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[sports-flow-rechecked]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/simple-player-sports-flow
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Recheck and format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart')
          printf 'Changed Dart files:\n%s\n' "${files[*]}"
          if [ "${#files[@]}" -gt 0 ]; then
            dart format "${files[@]}"
          fi
          rm .github/workflows/recheck_sports_flow_format.yml

      - name: Commit final formatting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[sports-flow-rechecked] Finaliser le formatage sportif"
          git push origin HEAD:feature/simple-player-sports-flow
