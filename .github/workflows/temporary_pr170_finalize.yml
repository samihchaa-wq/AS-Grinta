name: Temporary PR 170 finalizer

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/exact-player-gauges-h2h-colors
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Apply exact player cards and colored face-to-face scores
        shell: python
        run: |
          from pathlib import Path

          chip_import = "import 'package:as_grinta/features/matches/presentation/widgets/match_result_score_chip.dart';\n"

          def add_import(text: str) -> str:
              anchor = "import 'package:as_grinta/features/matches/data/match_details_repository.dart';\n"
              if chip_import not in text:
                  if anchor not in text:
                      raise SystemExit('Match details repository import anchor not found')
                  text = text.replace(anchor, anchor + chip_import, 1)
              return text

          def replace_mapped_return(path: str, class_name: str, map_marker: str) -> None:
              file = Path(path)
              text = add_import(file.read_text())
              class_start = text.index(f'class {class_name}')
              map_start = text.index(map_marker, class_start)
              map_end = text.index('            }).toList()', map_start)
              section = text[map_start:map_end]
              if 'MatchResultScoreChip(' not in section:
                  return_start = text.index('              return ', map_start)
                  replacement = """              return MatchResultScoreChip(
                scoreGrinta: match.scoreGrinta ?? 0,
                scoreOpponent: match.scoreOpponent ?? 0,
              );
"""
                  text = text[:return_start] + replacement + text[map_end:]
              file.write_text(text)

          replace_mapped_return(
              'lib/features/predictions/presentation/widgets/inline_match_prediction_card.dart',
              '_HeadToHead',
              'children: matches.map((match) {',
          )
          replace_mapped_return(
              'lib/features/matches/presentation/upcoming_match_prediction_page.dart',
              '_HistoryStrip',
              'children: matches.map((match) {',
          )

          details = Path('lib/features/matches/presentation/match_details_page.dart')
          text = add_import(details.read_text())
          class_start = text.index('class _HeadToHeadCard')
          class_end = text.index('class _MatchHeader', class_start)
          if 'MatchResultScoreChip(' not in text[class_start:class_end]:
              old = """                      Text(
                         '${match.scoreGrinta ?? 0} – ${match.scoreOpponent ?? 0}',
                         style: const TextStyle(fontWeight: FontWeight.w900),
                       ),
"""
              new = """                      MatchResultScoreChip(
                        scoreGrinta: match.scoreGrinta ?? 0,
                        scoreOpponent: match.scoreOpponent ?? 0,
                      ),
"""
              if old not in text:
                  raise SystemExit('Match details score text not found')
              text = text.replace(old, new, 1)
          details.write_text(text)

          premium = Path('lib/features/predictions/presentation/widgets/premium_season_gauges.dart')
          text = premium.read_text()
          start_marker = "          Text(\n            'Tous les pronostics (${predictions.length})',"
          start = text.find(start_marker)
          if start >= 0:
              end_marker = '          const SizedBox(height: 12),\n'
              end = text.index(end_marker, start) + len(end_marker)
              text = text[:start] + text[end:]
              premium.write_text(text)

          gauge = Path('lib/features/predictions/presentation/widgets/reference_player_gauge_card.dart')
          text = gauge.read_text().replace(
              'width: math.max(8, actualX - edge),',
              'width: math.max(8.0, actualX - edge),',
          )
          gauge.write_text(text)
      - run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart'
          )
          dart format "${files[@]}"
      - name: Remove temporary branch trigger
        run: rm -f .github/pr170-trigger.txt
      - name: Commit finalized changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: finalize exact player gauges and result colors"
          git push origin HEAD:fix/exact-player-gauges-h2h-colors
