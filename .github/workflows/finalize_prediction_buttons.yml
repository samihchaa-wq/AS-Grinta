name: Finalize prediction buttons

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'fix/upcoming-prediction-buttons-player-sort-settings-label'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/upcoming-prediction-buttons-player-sort-settings-label
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Apply requested changes
        shell: python
        run: |
          from pathlib import Path

          shell = Path('lib/app/shell/app_shell.dart')
          text = shell.read_text().replace(
              "label: '',\n            tooltip: 'Plus',",
              "label: 'Paramètres',\n            tooltip: 'Paramètres',",
          )
          shell.write_text(text)

          router = Path('lib/app/router/app_router.dart')
          text = router.read_text()
          import_line = "import 'package:as_grinta/features/matches/presentation/upcoming_match_prediction_page.dart';\n"
          anchor = "import 'package:as_grinta/features/matches/presentation/matches_page.dart';\n"
          if import_line not in text:
              text = text.replace(anchor, anchor + import_line)
          route_anchor = """          GoRoute(
            path: '/matches/:matchId/finalize',
            builder: (context, state) => MatchFinalizationPage(
              matchId: state.pathParameters['matchId'] ?? '',
            ),
          ),
"""
          prediction_route = route_anchor + """          GoRoute(
            path: '/matches/:matchId/prediction',
            builder: (context, state) => UpcomingMatchPredictionPage(
              matchId: state.pathParameters['matchId'] ?? '',
            ),
          ),
"""
          text = text.replace(route_anchor, prediction_route)
          router.write_text(text)

          finalization = Path('lib/features/matches/presentation/match_finalization_page.dart')
          text = finalization.read_text()
          old = """    final results = query.isEmpty
        ? widget.squad
        : widget.squad
            .where((m) => m.name.toLowerCase().contains(query))
            .toList();
"""
          new = """    final results = (query.isEmpty
            ? [...widget.squad]
            : widget.squad
                .where((m) => m.name.toLowerCase().contains(query))
                .toList())
      ..sort(
        (a, b) => a.name.toLowerCase().compareTo(b.name.toLowerCase()),
      );
"""
          text = text.replace(old, new)
          finalization.write_text(text)

          history = Path('lib/features/predictions/presentation/pronos_hub_history_section.dart')
          text = history.read_text()
          text = text.replace(
              "                          const _UpcomingPredictionCard(),\n",
              """                          const _UpcomingPredictionCard(),
                          const SizedBox(height: 10),
                          SizedBox(
                            width: double.infinity,
                            child: OutlinedButton.icon(
                              onPressed: () => context.push(
                                '/matches/${match.id}/prediction',
                              ),
                              icon: const Icon(Icons.edit_outlined),
                              label: Text(
                                predictionState.items.first.isFilled
                                    ? 'Modifier mon prono'
                                    : 'Rentrer mon prono',
                              ),
                            ),
                          ),
""",
          )
          text = text.replace(
              'class _CalendarMatchCard extends StatelessWidget {',
              'class _CalendarMatchCard extends ConsumerWidget {',
          )
          text = text.replace(
              '  Widget build(BuildContext context) {\n    final opponent =',
              """  Widget build(BuildContext context, WidgetRef ref) {
    final prediction = match.isFinished
        ? const AsyncValue<MatchPredictionItem?>.data(null)
        : ref.watch(matchPredictionDetailsProvider(match.id));
    final opponent =""",
          )
          admin_block = """              if (isAdmin) ...[
                const SizedBox(height: 14),
                SizedBox(
                  width: double.infinity,
                  child: FilledButton.tonalIcon(
"""
          prediction_block = """              if (!match.isFinished) ...[
                const SizedBox(height: 14),
                SizedBox(
                  width: double.infinity,
                  child: OutlinedButton.icon(
                    onPressed: () =>
                        context.push('/matches/${match.id}/prediction'),
                    icon: const Icon(Icons.edit_outlined),
                    label: Text(
                      prediction.maybeWhen(
                        data: (item) => item?.isFilled == true
                            ? 'Modifier mon prono'
                            : 'Rentrer mon prono',
                        orElse: () => 'Rentrer mon prono',
                      ),
                    ),
                  ),
                ),
              ],
""" + admin_block
          text = text.replace(admin_block, prediction_block)
          history.write_text(text)
      - run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart'
          )
          dart format "${files[@]}"
      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib
          git commit -m "fix: add prediction actions and sort scorer picker"
          git push origin HEAD:fix/upcoming-prediction-buttons-player-sort-settings-label
