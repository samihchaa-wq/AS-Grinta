name: Patch unified squad UI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.head_ref == 'feature/unified-squad-composition' || github.ref_name == 'feature/unified-squad-composition' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/unified-squad-composition
          fetch-depth: 0

      - name: Patch router and match actions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          router = Path('lib/app/router/app_router.dart')
          text = router.read_text()
          old_import = "import 'package:as_grinta/features/sports_management/presentation/admin_composition_page.dart';"
          new_import = "import 'package:as_grinta/features/sports_management/presentation/admin_squad_plan_page.dart';"
          if old_import not in text:
              raise SystemExit('Admin composition import not found')
          text = text.replace(old_import, new_import)
          if text.count('AdminCompositionPage') != 2:
              raise SystemExit(f'Unexpected AdminCompositionPage count: {text.count("AdminCompositionPage")}')
          text = text.replace('AdminCompositionPage', 'AdminSquadPlanPage')
          router.write_text(text)

          details = Path('lib/features/matches/presentation/match_details_page.dart')
          text = details.read_text()

          def replace_actions(source: str, marker: str, replacement: str) -> str:
              marker_at = source.index(marker)
              start = source.rfind('actions: const [', 0, marker_at)
              if start < 0:
                  raise SystemExit(f'Actions start not found for {marker}')
              end = source.index('],', marker_at) + 2
              return source[:start] + replacement + source[end:]

          text = replace_actions(
              text,
              "_SportAction('Convocations'",
              """actions: const [
                        _SportAction(
                          'Sélection & composition',
                          Icons.sports_soccer_outlined,
                          'composition',
                        ),
                      ],""",
          )
          text = replace_actions(
              text,
              "_SportAction('Suivi des votes HDM'",
              """actions: const [
                      _SportAction(
                        'Suivi des votes HDM',
                        Icons.how_to_vote_outlined,
                        'motm',
                      ),
                    ],""",
          )
          details.write_text(text)

          index = Path('web/index.html')
          text = index.read_text().replace('sw.js?v=57', 'sw.js?v=58')
          text = text.replace('flutter_bootstrap.js?v=57', 'flutter_bootstrap.js?v=58')
          index.write_text(text)

          sw = Path('web/sw.js')
          text = sw.read_text().replace('as-grinta-v57', 'as-grinta-v58')
          text = text.replace('Version fonctionnelle v57', 'Version fonctionnelle v58')
          sw.write_text(text)
          PY

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format Dart files
        run: |
          flutter pub get
          dart format \
            lib/app/router/app_router.dart \
            lib/features/matches/presentation/match_details_page.dart \
            lib/features/sports_management/data/match_squad_plan_repository.dart \
            lib/features/sports_management/presentation/admin_squad_plan_page.dart
          rm .github/workflows/patch_unified_squad_ui.yml

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[unified-squad-ui] Brancher sélection et composition"
          git push origin HEAD:feature/unified-squad-composition
