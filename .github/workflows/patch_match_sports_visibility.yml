name: Patch match sports visibility

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/match-sports-visibility-x2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Patch match details
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/features/matches/presentation/match_details_page.dart')
          text = path.read_text()

          old_refresh = """        onRefresh: () async {
          ref.invalidate(matchDetailsProvider(matchId));
          if (sportsEnabled) {
            ref.invalidate(sportMotmVoteProvider(matchId));
          }
          await ref.read(matchDetailsProvider(matchId).future);
        },"""
          new_refresh = """        onRefresh: () async {
          await ref.read(featureFlagsControllerProvider.notifier).refresh();
          ref
            ..invalidate(matchDetailsProvider(matchId))
            ..invalidate(sportMotmVoteProvider(matchId));
          await ref.read(matchDetailsProvider(matchId).future);
        },"""

          old_upcoming = """                  _UpcomingHeader(details: details),
                  const SizedBox(height: 16),
                  PublishedLineupCard(matchId: matchId, bottomSpacing: 16),
                  _HeadToHeadCard(details: details),
                  if (isAdmin && sportsEnabled) ...[
                    const SizedBox(height: 16),
                    _SportsManagementSection(
                      matchId: matchId,
                      actions: const [
                        _SportAction(
                          'Sélection & composition',
                          Icons.sports_soccer_outlined,
                          'composition',
                        ),
                      ],
                    ),
                  ],"""
          new_upcoming = """                  _UpcomingHeader(details: details),
                  if (isAdmin && sportsEnabled) ...[
                    const SizedBox(height: 16),
                    _SportsManagementSection(
                      matchId: matchId,
                      actions: const [
                        _SportAction(
                          'Sélection & composition',
                          Icons.sports_soccer_outlined,
                          'composition',
                        ),
                      ],
                    ),
                  ],
                  const SizedBox(height: 16),
                  PublishedLineupCard(matchId: matchId, bottomSpacing: 16),
                  _HeadToHeadCard(details: details),"""

          old_finished = """                if (details.playerStats.isNotEmpty) ...[
                  const SizedBox(height: 16),
                  _MatchSummary(details: details),
                ],
                if (details.predictions.isNotEmpty) ...[
                  const SizedBox(height: 16),
                  _PredictionsTable(
                    predictions: details.predictions,
                    actualGrinta: details.scoreGrinta ?? 0,
                    actualOpponent: details.scoreOpponent ?? 0,
                    isHome: details.location == 'domicile',
                  ),
                ],
                if (isAdmin && sportsEnabled) ...[
                  const SizedBox(height: 16),
                  _SportsManagementSection(
                    matchId: matchId,
                    actions: const [
                      _SportAction(
                        'Suivi des votes HDM',
                        Icons.how_to_vote_outlined,
                        'motm',
                      ),
                    ],
                  ),
                ],"""
          new_finished = """                if (isAdmin && sportsEnabled) ...[
                  const SizedBox(height: 16),
                  _SportsManagementSection(
                    matchId: matchId,
                    actions: const [
                      _SportAction(
                        'Suivi des votes HDM',
                        Icons.how_to_vote_outlined,
                        'motm',
                      ),
                    ],
                  ),
                ],
                if (details.playerStats.isNotEmpty) ...[
                  const SizedBox(height: 16),
                  _MatchSummary(details: details),
                ],
                if (details.predictions.isNotEmpty) ...[
                  const SizedBox(height: 16),
                  _PredictionsTable(
                    predictions: details.predictions,
                    actualGrinta: details.scoreGrinta ?? 0,
                    actualOpponent: details.scoreOpponent ?? 0,
                    isHome: details.location == 'domicile',
                  ),
                ],"""

          old_title = """            Text(
              'Gestion sportive',
              style: Theme.of(context)
                  .textTheme
                  .titleMedium
                  ?.copyWith(fontWeight: FontWeight.w900),
            ),"""
          new_title = """            Row(
              children: [
                Expanded(
                  child: Text(
                    'Gestion sportive',
                    style: Theme.of(context)
                        .textTheme
                        .titleMedium
                        ?.copyWith(fontWeight: FontWeight.w900),
                  ),
                ),
                Container(
                  padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 4),
                  decoration: BoxDecoration(
                    color: const Color(0xFF39E784).withValues(alpha: .12),
                    borderRadius: BorderRadius.circular(999),
                    border: Border.all(
                      color: const Color(0xFF39E784).withValues(alpha: .55),
                    ),
                  ),
                  child: const Row(
                    mainAxisSize: MainAxisSize.min,
                    children: [
                      Icon(
                        Icons.check_circle,
                        size: 14,
                        color: Color(0xFF39E784),
                      ),
                      SizedBox(width: 4),
                      Text(
                        'Active',
                        style: TextStyle(fontWeight: FontWeight.w900),
                      ),
                    ],
                  ),
                ),
              ],
            ),"""

          old_score = """                    Expanded(child: Text(score, textAlign: TextAlign.center)),"""
          new_score = """                    Expanded(
                      child: Wrap(
                        alignment: WrapAlignment.center,
                        crossAxisAlignment: WrapCrossAlignment.center,
                        spacing: 5,
                        children: [
                          Text(score),
                          if (prediction.usedX2)
                            Container(
                              padding: const EdgeInsets.symmetric(
                                horizontal: 6,
                                vertical: 2,
                              ),
                              decoration: BoxDecoration(
                                color: const Color(0xFFFFB020),
                                borderRadius: BorderRadius.circular(999),
                              ),
                              child: const Text(
                                '×2',
                                style: TextStyle(
                                  color: Colors.black,
                                  fontSize: 11,
                                  fontWeight: FontWeight.w900,
                                ),
                              ),
                            ),
                        ],
                      ),
                    ),"""

          replacements = [
              (old_refresh, new_refresh, 'refresh'),
              (old_upcoming, new_upcoming, 'upcoming layout'),
              (old_finished, new_finished, 'finished layout'),
              (old_title, new_title, 'sports title'),
              (old_score, new_score, 'x2 badge'),
          ]
          for old, new, label in replacements:
              if old not in text:
                  raise SystemExit(f'Block not found: {label}')
              text = text.replace(old, new, 1)

          path.write_text(text)
      - name: Format
        run: |
          flutter pub get
          dart format lib/features/matches/presentation/match_details_page.dart
      - name: Remove temporary workflow
        run: rm .github/workflows/patch_match_sports_visibility.yml
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/features/matches/presentation/match_details_page.dart .github/workflows/patch_match_sports_visibility.yml
          git commit -m "fix: rendre visibles les outils sportifs et le bonus x2"
          git push origin HEAD:${{ github.head_ref }}
