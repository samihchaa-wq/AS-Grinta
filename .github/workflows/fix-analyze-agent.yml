name: Fix Flutter analyze warnings

on:
  push:
    branches:
      - agent/jauges-neon-ballon-v2

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jauges-neon-ballon-v2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Apply deprecation fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/features/predictions/presentation/season_predictions_page.dart')
          text = path.read_text()
          text = text.replace('        DropdownButtonFormField<String>(\n          value: selectedId,', '        DropdownButtonFormField<String>(\n          initialValue: selectedId,')
          import re
          text = re.sub(r'\.withOpacity\(([^)]+)\)', r'.withValues(alpha: \1)', text)
          path.write_text(text)
          PY
          dart format lib/features/predictions/presentation/season_predictions_page.dart
          rm -f analysis-output.txt
          rm .github/workflows/fix-analyze-agent.yml
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/predictions/presentation/season_predictions_page.dart analysis-output.txt .github/workflows/fix-analyze-agent.yml
          git diff --cached --quiet || git commit -m "Corriger les avertissements Flutter"
          git push origin HEAD:agent/jauges-neon-ballon-v2
