name: Supabase migration guard

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/production_migrations.lock'
      - '.github/workflows/migration_inventory.yml'
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-local-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject edits or deletions of existing migrations
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          changed=$(git diff --name-status "$base...HEAD" -- supabase/migrations)
          echo "$changed"
          if [ -n "$changed" ] && echo "$changed" | awk '$1 != "A" { found=1 } END { exit !found }'; then
            echo "Existing migration files are immutable. Add a new migration instead." >&2
            exit 1
          fi

      - name: Validate newly added migration names and timestamps
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          mapfile -t added < <(git diff --name-only --diff-filter=A "$base...HEAD" -- 'supabase/migrations/*.sql')
          if [ "${#added[@]}" -eq 0 ]; then
            echo "No new migration file."
            exit 0
          fi

          for file in "${added[@]}"; do
            name=$(basename "$file")
            if [[ ! "$name" =~ ^[0-9]{14}_[a-z0-9_]+\.sql$ ]]; then
              echo "Invalid migration filename: $name" >&2
              exit 1
            fi
            version=${name%%_*}
            duplicates=$(find supabase/migrations -maxdepth 1 -type f -name "${version}_*.sql" | wc -l)
            if [ "$duplicates" -ne 1 ]; then
              echo "Migration timestamp $version is not unique." >&2
              exit 1
            fi
          done

      - name: Ensure production lock is not changed from a feature PR
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref != 'ci/supabase-migration-drift-guard'
        shell: bash
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          if git diff --name-only "$base...HEAD" | grep -qx 'supabase/production_migrations.lock'; then
            echo "The production lock is updated only after a verified production deployment." >&2
            exit 1
          fi

  compare-production-history:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ovzijmqrnsgcmryinkfa
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Migration drift check skipped: configure SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v1
        if: steps.secrets.outputs.configured == 'true'
        with:
          version: latest

      - name: Read remote migration history
        if: steps.secrets.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase migration list > /tmp/migration-list.txt
          cat /tmp/migration-list.txt
          awk -F'|' '
            {
              remote=$2
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", remote)
              if (remote ~ /^[0-9]{14}$/) print remote
            }
          ' /tmp/migration-list.txt | sort -u > /tmp/remote-versions.txt
          test -s /tmp/remote-versions.txt

      - name: Compare production with committed baseline
        if: steps.secrets.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          source supabase/production_migrations.lock
          actual_count=$(wc -l < /tmp/remote-versions.txt | tr -d ' ')
          actual_latest=$(tail -n 1 /tmp/remote-versions.txt)
          actual_md5=$(md5sum /tmp/remote-versions.txt | awk '{print $1}')

          printf 'Expected: count=%s latest=%s md5=%s\n' \
            "$MIGRATION_COUNT" "$LATEST_VERSION" "$VERSION_MD5"
          printf 'Actual:   count=%s latest=%s md5=%s\n' \
            "$actual_count" "$actual_latest" "$actual_md5"

          test "$actual_count" = "$MIGRATION_COUNT"
          test "$actual_latest" = "$LATEST_VERSION"
          test "$actual_md5" = "$VERSION_MD5"
