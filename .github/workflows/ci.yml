name: Flutter CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" -- '*.dart')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed Dart files to format."
            exit 0
          fi
          dart format --output=none "${files[@]}"
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Build Flutter Web
        run: flutter build web --release --base-href "/AS-Grinta/" --pwa-strategy=none
