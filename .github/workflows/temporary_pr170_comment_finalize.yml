name: Temporary PR 170 copy cleanup

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'fix/exact-player-gauges-h2h-colors'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/exact-player-gauges-h2h-colors
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Remove redundant player prediction heading
        shell: python
        run: |
          from pathlib import Path

          premium = Path('lib/features/predictions/presentation/widgets/premium_season_gauges.dart')
          text = premium.read_text()
          marker = "'Tous les pronostics (${predictions.length})'"
          if marker in text:
              start = text.rfind('          Text(', 0, text.index(marker))
              end_marker = '          const SizedBox(height: 12),\n'
              end = text.index(end_marker, text.index(marker)) + len(end_marker)
              premium.write_text(text[:start] + text[end:])
      - run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart'
          )
          dart format "${files[@]}"
      - name: Remove trigger and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/pr170-copy-trigger.txt
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove redundant player prediction heading"
          git push origin HEAD:fix/exact-player-gauges-h2h-colors
