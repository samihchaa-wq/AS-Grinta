name: Format match feature branch

on:
  push:
    branches:
      - feat/match-attendance-mvp-entry

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/match-attendance-mvp-entry

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format changed Dart files
        run: |
          dart format \
            lib/features/matches/data/matches_repository.dart \
            lib/features/matches/data/match_finalization_repository.dart \
            lib/features/matches/presentation/match_finalization_controller.dart \
            lib/features/matches/presentation/match_finalization_page.dart

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/matches
          git commit -m "style: formater la saisie des présents et du HDM"
          git push
