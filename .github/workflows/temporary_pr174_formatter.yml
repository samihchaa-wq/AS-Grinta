name: Temporary PR 174 formatter

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'fix/remove-legacy-predictions-heading-path'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/remove-legacy-predictions-heading-path
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart'
          )
          dart format "${files[@]}"
      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.dart'
          git commit -m "chore: format season prediction entry refactor"
          git push origin HEAD:fix/remove-legacy-predictions-heading-path
