name: Fix season gauge layout

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.issue.title == 'RUN-SEASON-GAUGE-LAYOUT-FIX'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Replace overlapping gauge labels
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lib/features/predictions/presentation/widgets/premium_season_gauges.dart')
          text = path.read_text()
          start = text.index('class PremiumGaugeLine extends StatelessWidget {')
          end = text.index('class _CurrentBall extends StatelessWidget {')

          replacement = r'''class PremiumGaugeLine extends StatelessWidget {
  const PremiumGaugeLine({
    super.key,
    required this.actual,
    required this.fallbackMax,
    required this.median,
    required this.personalPrediction,
    required this.accent,
    required this.onMedianTap,
  });

  final int actual;
  final int fallbackMax;
  final double? median;
  final int? personalPrediction;
  final Color accent;
  final VoidCallback? onMedianTap;

  @override
  Widget build(BuildContext context) {
    return LayoutBuilder(
      builder: (context, constraints) {
        const markerRadius = 16.0;
        final usable = math.max(1.0, constraints.maxWidth - markerRadius * 2);
        final roundedMedian = median?.roundToDouble();
        final largestMarker = math.max(
          actual.toDouble(),
          math.max(
            roundedMedian ?? 0,
            personalPrediction?.toDouble() ?? 0,
          ),
        );
        final centeredMax = roundedMedian == null
            ? math.max(1.0, fallbackMax.toDouble())
            : math.max(1.0, roundedMedian * 2);
        final visualMax = math.max(
          math.max(centeredMax, fallbackMax.toDouble()),
          largestMarker > centeredMax ? largestMarker * 1.15 : largestMarker,
        );

        double xFor(num value) {
          final ratio = (value / visualMax).clamp(0.0, 1.0);
          return markerRadius + usable * ratio;
        }

        return Column(
          crossAxisAlignment: CrossAxisAlignment.stretch,
          children: [
            SizedBox(
              height: 52,
              child: Stack(
                clipBehavior: Clip.none,
                children: [
                  Positioned(
                    left: markerRadius,
                    right: markerRadius,
                    top: 27,
                    child: Container(
                      height: 5,
                      decoration: BoxDecoration(
                        borderRadius: BorderRadius.circular(99),
                        gradient: LinearGradient(
                          colors: [accent.withValues(alpha: .72), accent],
                        ),
                        boxShadow: [
                          BoxShadow(
                            color: accent.withValues(alpha: .3),
                            blurRadius: 12,
                          ),
                        ],
                      ),
                    ),
                  ),
                  if (roundedMedian != null)
                    Positioned(
                      left: xFor(roundedMedian) - 1,
                      top: 6,
                      child: GestureDetector(
                        behavior: HitTestBehavior.opaque,
                        onTap: onMedianTap,
                        child: SizedBox(
                          width: 2,
                          height: 42,
                          child: DecoratedBox(
                            decoration: BoxDecoration(
                              color: Colors.white70,
                              borderRadius: BorderRadius.circular(2),
                            ),
                          ),
                        ),
                      ),
                    ),
                  if (personalPrediction != null)
                    Positioned(
                      left: xFor(personalPrediction!) - 6,
                      top: 23,
                      child: Container(
                        width: 12,
                        height: 12,
                        decoration: BoxDecoration(
                          shape: BoxShape.circle,
                          color: _personalPrediction,
                          border: Border.all(color: Colors.white, width: 2),
                          boxShadow: [
                            BoxShadow(
                              color: _personalPrediction.withValues(alpha: .65),
                              blurRadius: 10,
                            ),
                          ],
                        ),
                      ),
                    ),
                  Positioned(
                    left: xFor(actual) - markerRadius,
                    top: 4,
                    child: _CurrentBall(value: actual, accent: accent),
                  ),
                ],
              ),
            ),
            const SizedBox(height: 8),
            Row(
              children: [
                Expanded(
                  child: _GaugeValueLabel(
                    icon: Icons.sports_soccer,
                    label: 'Actuel',
                    value: '$actual',
                    color: accent,
                    alignment: CrossAxisAlignment.start,
                  ),
                ),
                Expanded(
                  child: _GaugeValueLabel(
                    icon: Icons.circle,
                    label: 'Toi',
                    value: personalPrediction?.toString() ?? '—',
                    color: _personalPrediction,
                    alignment: CrossAxisAlignment.center,
                  ),
                ),
                Expanded(
                  child: _GaugeValueLabel(
                    icon: Icons.balance,
                    label: 'Médiane',
                    value: roundedMedian?.round().toString() ?? '—',
                    color: Colors.white70,
                    alignment: CrossAxisAlignment.end,
                  ),
                ),
              ],
            ),
          ],
        );
      },
    );
  }
}

class _GaugeValueLabel extends StatelessWidget {
  const _GaugeValueLabel({
    required this.icon,
    required this.label,
    required this.value,
    required this.color,
    required this.alignment,
  });

  final IconData icon;
  final String label;
  final String value;
  final Color color;
  final CrossAxisAlignment alignment;

  @override
  Widget build(BuildContext context) {
    return Column(
      crossAxisAlignment: alignment,
      children: [
        Row(
          mainAxisSize: MainAxisSize.min,
          children: [
            Icon(icon, size: 12, color: color),
            const SizedBox(width: 4),
            Flexible(
              child: Text(
                label,
                maxLines: 1,
                overflow: TextOverflow.ellipsis,
                style: const TextStyle(
                  color: Colors.white60,
                  fontSize: 10,
                  fontWeight: FontWeight.w700,
                ),
              ),
            ),
          ],
        ),
        const SizedBox(height: 2),
        Text(
          value,
          style: TextStyle(
            color: color,
            fontSize: 13,
            fontWeight: FontWeight.w900,
          ),
        ),
      ],
    );
  }
}

'''

          path.write_text(text[:start] + replacement + text[end:])
          PY

      - name: Commit layout fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/predictions/presentation/widgets/premium_season_gauges.dart
          git commit -m "Éviter le chevauchement des jauges de saison"
          git push
