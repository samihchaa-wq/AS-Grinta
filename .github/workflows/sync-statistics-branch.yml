name: Sync statistics branch

on:
  pull_request:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/statistiques-module
          fetch-depth: 0
      - name: Merge current main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Format statistics Dart files
        run: |
          dart format \
            lib/app/router/app_router.dart \
            lib/app/shell/app_shell.dart \
            lib/features/statistics/data/statistics_repository.dart \
            lib/features/statistics/presentation/statistics_page.dart
          if ! git diff --quiet; then
            git add \
              lib/app/router/app_router.dart \
              lib/app/shell/app_shell.dart \
              lib/features/statistics/data/statistics_repository.dart \
              lib/features/statistics/presentation/statistics_page.dart
            git commit -m "style: formater après synchronisation avec main"
          fi
      - name: Push synchronized branch
        run: git push origin HEAD:feat/statistiques-module
