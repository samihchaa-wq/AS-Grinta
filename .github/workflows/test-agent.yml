name: Capture Flutter test output

on:
  push:
    branches:
      - agent/jauges-neon-ballon-v2

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jauges-neon-ballon-v2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Capture test output
        run: flutter test > test-output.txt 2>&1 || true
      - name: Remove temporary workflow
        run: rm .github/workflows/test-agent.yml
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test-output.txt .github/workflows/test-agent.yml
          git diff --cached --quiet || git commit -m "Capturer le diagnostic des tests Flutter"
          git push origin HEAD:agent/jauges-neon-ballon-v2
