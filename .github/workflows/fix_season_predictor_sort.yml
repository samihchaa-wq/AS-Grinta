name: Fix season predictor sort

on:
  push:
    branches: [main]
    paths:
      - '.github/season-predictor-sort-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Sort players by actual goals first
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lib/features/predictions/presentation/enhanced_season_predictions_page.dart')
          text = path.read_text()
          old = '''    int compare(PlayerGauge a, PlayerGauge b) {
      final aValue = a.predictionFor(selectedId)?.value ?? -1;
      final bValue = b.predictionFor(selectedId)?.value ?? -1;
      final byPrediction = bValue.compareTo(aValue);
      if (byPrediction != 0) return byPrediction;
      final byActual = b.actual.compareTo(a.actual);
      if (byActual != 0) return byActual;
      return a.playerName.toLowerCase().compareTo(b.playerName.toLowerCase());
    }
'''
          new = '''    int compare(PlayerGauge a, PlayerGauge b) {
      final byActual = b.actual.compareTo(a.actual);
      if (byActual != 0) return byActual;

      final aPrediction = a.predictionFor(selectedId)?.value ?? -1;
      final bPrediction = b.predictionFor(selectedId)?.value ?? -1;
      final byPrediction = bPrediction.compareTo(aPrediction);
      if (byPrediction != 0) return byPrediction;

      return a.playerName.toLowerCase().compareTo(b.playerName.toLowerCase());
    }
'''
          if old not in text:
            raise SystemExit('Comparator block not found')
          path.write_text(text.replace(old, new, 1))

          Path('.github/season-predictor-sort-trigger').unlink(missing_ok=True)
          Path('.github/workflows/fix_season_predictor_sort.yml').unlink()
          PY

      - name: Commit sorting fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Trier les joueurs par buts marqués dans les pronos de saison"
          git push
