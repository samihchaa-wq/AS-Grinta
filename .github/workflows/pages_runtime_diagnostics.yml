name: Diagnose GitHub Pages runtime

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Capture runtime diagnostics
        env:
          APP_URL: https://samihchaa-wq.github.io/AS-Grinta/
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright');
          (async () => {
            const lines = [];
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 390, height: 844 },
              serviceWorkers: 'block',
            });
            const page = await context.newPage();
            page.on('console', m => lines.push(`console:${m.type()}: ${m.text()}`));
            page.on('pageerror', e => lines.push(`pageerror: ${e.stack || e.message}`));
            page.on('requestfailed', r => lines.push(`requestfailed: ${r.url()} :: ${r.failure()?.errorText}`));
            page.on('response', r => {
              if (r.status() >= 400) lines.push(`response:${r.status()}: ${r.url()}`);
            });
            const response = await page.goto(
              `${process.env.APP_URL}?diagnostic=${Date.now()}`,
              { waitUntil: 'domcontentloaded', timeout: 60000 },
            );
            lines.push(`navigation_status: ${response?.status()}`);
            await page.waitForTimeout(35000);
            lines.push(`url: ${page.url()}`);
            lines.push(`title: ${await page.title()}`);
            lines.push(`body_children: ${await page.locator('body').evaluate(el => el.childElementCount)}`);
            lines.push(`body_html: ${await page.locator('body').evaluate(el => el.innerHTML.slice(0, 10000))}`);
            await page.screenshot({ path: 'runtime-diagnostic.png', fullPage: true });
            fs.writeFileSync('runtime-diagnostic.txt', lines.join('\n'));
            await browser.close();
          })().catch(error => {
            fs.writeFileSync('runtime-diagnostic.txt', `diagnostic_exception: ${error.stack || error}`);
            process.exit(0);
          });
          NODE
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pages-runtime-diagnostics
          path: |
            runtime-diagnostic.txt
            runtime-diagnostic.png
          if-no-files-found: error
