name: Rename season tab

on:
  push:
    branches: [fix/rename-season-tab-to-buteur]

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rename label and clean workflow
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/features/predictions/presentation/pronos_hub_page.dart')
          text = path.read_text()
          old = "label: Text('Saison'),"
          new = "label: Text('Buteur'),"
          if text.count(old) != 1:
              raise SystemExit(f'Expected exactly one label, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          rm -f .github/workflows/rename-season-tab.yml
          rm -f .github/rename-season-tab-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ui): rename Saison tab to Buteur"
          git push origin HEAD:fix/rename-season-tab-to-buteur
