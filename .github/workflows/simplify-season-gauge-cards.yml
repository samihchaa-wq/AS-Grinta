name: Simplify season gauge cards

on:
  push:
    branches:
      - agent/simplifier-cartes-jauges

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/simplifier-cartes-jauges
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Remove initials and action button
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/features/predictions/presentation/widgets/premium_season_gauges.dart')
          text = path.read_text()
          text = text.replace("                _PlayerAvatar(name: gauge.playerName, accent: accent),\n                const SizedBox(width: 12),\n", "")
          text = text.replace("                const SizedBox(width: 10),\n                _OpenButton(\n                  count: gauge.predictions.length,\n                  accent: accent,\n                  onTap: onOpenAll,\n                ),\n", "")
          text = text.replace("              _PlayerAvatar(name: gauge.playerName, accent: accent),\n              const SizedBox(width: 12),\n", "")
          start = text.find('class _PlayerAvatar extends StatelessWidget {')
          end = text.find('class _CurrentBall extends StatelessWidget {')
          if start != -1 and end != -1:
              text = text[:start] + text[end:]
          start = text.find('class _OpenButton extends StatelessWidget {')
          end = text.find('class PremiumPlayerDetailsSheet extends StatefulWidget {')
          if start != -1 and end != -1:
              text = text[:start] + text[end:]
          path.write_text(text)
          PY
          dart format lib/features/predictions/presentation/widgets/premium_season_gauges.dart
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/predictions/presentation/widgets/premium_season_gauges.dart
          git diff --cached --quiet || git commit -m "Simplifier les cartes des jauges de saison"
          git push origin HEAD:agent/simplifier-cartes-jauges
