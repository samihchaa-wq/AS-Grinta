name: Run live squad finalization

on:
  push:
    branches: [feat/live-squad-and-formations]
    paths:
      - .github/workflows/run-finalize-live-squad.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/live-squad-and-formations
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply targeted implementation
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python3 - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          source = Path('.github/workflows/finalize-live-squad.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index('\n          PY', start)
          script = dedent(source[start:end])
          Path('/tmp/finalize_live_squad.py').write_text(script)
          PY
            python3 /tmp/finalize_live_squad.py
            dart format \
              lib/features/sports_management/presentation/admin_squad_plan_page.dart \
              lib/features/sports_management/data/sport_waitlist_repository.dart \
              lib/features/matches/presentation/match_details_page.dart
          } 2>&1 | tee finalize-apply.log

      - name: Validate Flutter
        shell: bash
        run: |
          set -o pipefail
          flutter pub get
          flutter analyze --fatal-infos 2>&1 | tee analyze.log
          flutter test 2>&1 | tee test.log
          version=$(awk '/^version:/{print $2}' pubspec.yaml)
          flutter build web \
            --release \
            --base-href "/AS-Grinta/" \
            --pwa-strategy=none \
            --no-web-resources-cdn \
            --dart-define-from-file=config/production.json \
            --dart-define=APP_VERSION="$version" \
            2>&1 | tee build-web.log

      - name: Commit validated implementation
        shell: bash
        run: |
          set -euo pipefail
          git rm \
            .github/workflows/finalize-live-squad.yml \
            .github/workflows/run-finalize-live-squad.yml
          rm -f finalize-apply.log analyze.log test.log build-web.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finaliser effectif atomique et module de prono'
          git push origin HEAD:feat/live-squad-and-formations

      - name: Commit failure diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          git diff > finalize-diff.patch
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add finalize-apply.log analyze.log test.log build-web.log finalize-diff.patch 2>/dev/null
          git commit -m 'Diagnostic de la finalisation'
          git push origin HEAD:feat/live-squad-and-formations
