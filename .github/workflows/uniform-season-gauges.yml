name: Uniform season gauges

on:
  push:
    branches:
      - agent/temporal-odds-and-colorful-season-pronos
    paths:
      - .github/workflows/uniform-season-gauges.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/temporal-odds-and-colorful-season-pronos

      - name: Use one color for every season gauge
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lib/features/predictions/presentation/widgets/premium_season_gauges.dart')
          text = path.read_text()

          old = '''Color gaugeAccentFor(String key) {
            const colors = [_violet, _cyan, _green, _amber, _orange, _pink];
            return colors[key.hashCode.abs() % colors.length];
          }'''
          new = '''Color gaugeAccentFor(String key) {
            return const Color(0xFF4B6FFF);
          }'''
          if old not in text:
            raise SystemExit('gaugeAccentFor block not found')
          text = text.replace(old, new)
          text = text.replace(
              'colors: [accent.withValues(alpha: .72), accent, _pink],',
              'colors: [accent.withValues(alpha: .72), accent],',
          )
          text = text.replace(
              'border: Border.all(color: _pink, width: 1.7),',
              'border: Border.all(color: accent, width: 1.7),',
          )
          text = text.replace(
              'BoxShadow(color: _pink.withValues(alpha: .75), blurRadius: 18),',
              'BoxShadow(color: accent.withValues(alpha: .75), blurRadius: 18),',
          )
          path.write_text(text)

          enhanced = Path('lib/features/predictions/presentation/enhanced_season_predictions_page.dart')
          enhanced_text = enhanced.read_text()
          enhanced_text = enhanced_text.replace(
              'colors: [accent.withValues(alpha: .72), accent],',
              'colors: [accent.withValues(alpha: .72), accent],',
          )
          enhanced.write_text(enhanced_text)

          Path('.github/workflows/uniform-season-gauges.yml').unlink()
          PY

      - name: Commit normalized gauges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Uniformiser la couleur des jauges de saison"
          git push
