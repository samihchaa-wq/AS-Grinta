name: One-shot Flutter API cleanup

on:
  push:
    branches:
      - fix-v1-public-readiness
    paths:
      - .github/workflows/one_shot_flutter_cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix-v1-public-readiness
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Replace deprecated DropdownButtonFormField value
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          paths = [
              Path('lib/features/matches/presentation/match_correction_page.dart'),
              Path('lib/features/matches/presentation/match_finalization_page.dart'),
              Path('lib/features/matches/presentation/matches_page.dart'),
          ]
          pattern = re.compile(r'(DropdownButtonFormField<[^>]+>\(\s*\n\s*)value:')
          total = 0
          for path in paths:
              text = path.read_text()
              updated, count = pattern.subn(r'\1initialValue:', text)
              total += count
              path.write_text(updated)
          print(f'Replaced {total} deprecated values')
          PY
          dart format lib/features/matches/presentation/match_correction_page.dart \
            lib/features/matches/presentation/match_finalization_page.dart \
            lib/features/matches/presentation/matches_page.dart

      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/features/matches/presentation
          git commit -m 'fix: replace deprecated Flutter form values'
          git push origin HEAD:fix-v1-public-readiness
