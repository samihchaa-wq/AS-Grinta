name: Fix median helper

on:
  push:
    branches:
      - agent/median-season-gauges

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/median-season-gauges
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Remove unused helper
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/features/predictions/presentation/premium_season_predictions_page.dart')
          text = path.read_text()
          text = text.replace("String _initial(String name) {\n  final trimmed = name.trim();\n  return trimmed.isEmpty ? '?' : trimmed[0].toUpperCase();\n}\n\n", "")
          path.write_text(text)
          PY
          dart format lib/features/predictions/presentation/premium_season_predictions_page.dart
          rm -f .github/workflows/fix-median-analyze.yml
          rm -f .github/workflows/capture-median-analyze.yml
          rm -f .github/fix-median-trigger.txt
          rm -f .github/median-analyze-trigger.txt
          rm -f median-analyze.txt
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Corriger l’analyse des jauges médianes"
          git push origin HEAD:agent/median-season-gauges
