name: Format stable router

on:
  push:
    branches: [refactor/stable-app-router]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Format and clean
        shell: bash
        run: |
          set -euo pipefail
          dart format lib/app/router/app_router.dart test/app_router_stability_test.dart
          rm -f .github/workflows/format-stable-router.yml
          rm -f .github/format-stable-router-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(router): format stable router changes"
          git push origin HEAD:refactor/stable-app-router
