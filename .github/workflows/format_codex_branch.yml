name: Format Codex branch

on:
  push:
    branches:
      - codex/fusion-matchs-stats

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/fusion-matchs-stats
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart')
          if [ "${#files[@]}" -gt 0 ]; then
            dart format "${files[@]}"
          fi

      - name: Commit formatting and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/format_codex_branch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: format fusion files"
          git push origin HEAD:codex/fusion-matchs-stats
