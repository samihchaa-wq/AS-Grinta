name: Patch statistics display

on:
  push:
    branches: [fix/statistics-goalkeeper-no-cards]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[stats-patched]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/statistics-goalkeeper-no-cards
          fetch-depth: 0
      - name: Patch statistics page
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/statistics/presentation/statistics_page.dart')
          text = path.read_text()

          text = text.replace(
              "final top5Goals =\n                byGoals.where((p) => p.goals > 0).take(5).toList();",
              "final top5Goals = byGoals\n                .where((p) => !p.isGoalkeeper && p.goals > 0)\n                .take(5)\n                .toList();",
          )
          text = text.replace(
              "final top5Assists =\n                byAssists.where((p) => p.assists > 0).take(5).toList();",
              "final top5Assists = byAssists\n                .where((p) => !p.isGoalkeeper && p.assists > 0)\n                .take(5)\n                .toList();",
          )

          old_trailing = '''        trailing: Wrap(
          spacing: 10,
          children: [
            _StatBadge(label: 'B', value: player.goals),
            _StatBadge(label: 'P', value: player.assists),
            _StatBadge(label: 'M', value: player.motm),
          ],
        ),'''
          new_trailing = '''        trailing: Wrap(
          spacing: 10,
          children: [
            if (!player.isGoalkeeper) ...[
              _StatBadge(label: 'B', value: player.goals),
              _StatBadge(label: 'P', value: player.assists),
            ],
            _StatBadge(label: 'M', value: player.motm),
            if (player.isGoalkeeper)
              _StatBadge(label: 'CS', value: player.cleanSheets),
          ],
        ),'''
          if old_trailing not in text:
              raise SystemExit('Stats badges block not found')
          text = text.replace(old_trailing, new_trailing)

          old_details = '''              _DetailRow(
                icon: Icons.sports_soccer_outlined,
                label: 'Buts',
                value: '${player.goals}',
              ),
              _DetailRow(
                icon: Icons.swap_calls_rounded,
                label: 'Passes D.',
                value: '${player.assists}',
              ),
              _DetailRow(
                icon: Icons.emoji_events_outlined,
                label: 'HDM',
                value: '${player.motm}',
              ),
              _DetailRow(
                icon: Icons.square_rounded,
                label: 'Jaunes',
                value: '0',
                iconColor: const Color(0xFFFDD835),
              ),
              _DetailRow(
                icon: Icons.square_rounded,
                label: 'Rouges',
                value: '0',
                iconColor: const Color(0xFFE53935),
              ),'''
          new_details = '''              if (!player.isGoalkeeper) ...[
                _DetailRow(
                  icon: Icons.sports_soccer_outlined,
                  label: 'Buts',
                  value: '${player.goals}',
                ),
                _DetailRow(
                  icon: Icons.swap_calls_rounded,
                  label: 'Passes D.',
                  value: '${player.assists}',
                ),
              ],
              _DetailRow(
                icon: Icons.emoji_events_outlined,
                label: 'HDM',
                value: '${player.motm}',
              ),'''
          if old_details not in text:
              raise SystemExit('Stats details block not found')
          text = text.replace(old_details, new_details)

          path.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/features/statistics/presentation/statistics_page.dart
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Masquer buts et passes des gardiens et retirer les cartons [stats-patched]"
          git push origin HEAD:fix/statistics-goalkeeper-no-cards
