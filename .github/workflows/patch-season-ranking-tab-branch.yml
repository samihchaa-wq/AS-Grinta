name: Finalize season ranking tab

on:
  push:
    branches:
      - agent/season-ranking-x2

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/season-ranking-x2
      - name: Insert ranking tab
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('lib/features/predictions/presentation/premium_season_predictions_page.dart')
          t = p.read_text()
          if "label: 'Classement saison'" not in t:
              old = """          Expanded(
            child: _SwitchItem(
              active: selected == _PremiumView.predictors,
              icon: Icons.group_outlined,
              label: 'Par pronostiqueur',
              onTap: () => onChanged(_PremiumView.predictors),
            ),
          ),
        ],"""
              new = """          Expanded(
            child: _SwitchItem(
              active: selected == _PremiumView.predictors,
              icon: Icons.group_outlined,
              label: 'Par pronostiqueur',
              onTap: () => onChanged(_PremiumView.predictors),
            ),
          ),
          Expanded(
            child: _SwitchItem(
              active: selected == _PremiumView.ranking,
              icon: Icons.emoji_events_outlined,
              label: 'Classement saison',
              onTap: () => onChanged(_PremiumView.ranking),
            ),
          ),
        ],"""
              if old not in t:
                  raise SystemExit('Switcher block not found')
              t = t.replace(old, new, 1)
          p.write_text(t)
          PY
          dart format lib/features/predictions/presentation/premium_season_predictions_page.dart
          rm -f .github/workflows/patch-season-ranking-tab-branch.yml
          rm -f .github/season-ranking-x2-trigger.txt
          rm -f .github/season-ranking-x2-final-trigger.txt
          rm -f .github/add-season-ranking-tab-trigger.txt
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Finaliser l’onglet classement saison"
          git push origin HEAD:agent/season-ranking-x2
