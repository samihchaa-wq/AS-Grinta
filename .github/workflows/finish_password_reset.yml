name: Finish password reset flow

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finish_password_reset.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Keep the existing admin screen compatible
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lib/features/admin/data/admin_repository.dart')
          text = path.read_text()
          old = '''  Future<String> resetAccountPassword({
    required String userId,
    required String username,
  }) async {
    final cleanUsername = username.trim().toLowerCase();
    if (cleanUsername.isEmpty) {
      throw StateError('Identifiant du joueur introuvable.');
    }
'''
          new = '''  Future<void> resetAccountPassword(String userId) async {
    final profile = await _client
        .from('profiles')
        .select('username')
        .eq('id', userId)
        .maybeSingle();
    final cleanUsername = (profile?['username'] ?? '')
        .toString()
        .trim()
        .toLowerCase();
    if (cleanUsername.isEmpty) {
      throw StateError('Identifiant du joueur introuvable.');
    }
'''
          if old not in text:
            raise SystemExit('reset signature block not found')
          text = text.replace(old, new, 1)
          text = text.replace(
              '''    await Clipboard.setData(ClipboardData(text: temporaryPassword));
    return temporaryPassword;
  }
''',
              '''    await Clipboard.setData(ClipboardData(text: temporaryPassword));
  }
''',
              1,
          )
          path.write_text(text)

          Path('.github/workflows/deploy_supabase_functions.yml').unlink(missing_ok=True)
          Path('.github/workflows/finish_password_reset.yml').unlink()
          PY

      - name: Commit final compatibility fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rendre le mot de passe temporaire compatible avec l’administration"
          git push
