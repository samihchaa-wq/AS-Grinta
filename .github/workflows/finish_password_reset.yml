name: Finish password reset flow

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finish_password_reset.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch password reset flow
        run: |
          python - <<'PY'
          from pathlib import Path

          repo = Path('lib/features/admin/data/admin_repository.dart')
          text = repo.read_text()
          text = text.replace(
              "import 'package:as_grinta/core/providers/supabase_provider.dart';",
              "import 'dart:math';\n\nimport 'package:as_grinta/core/providers/supabase_provider.dart';",
          )
          old = '''  /// Génère un mot de passe temporaire, le copie immédiatement dans le
  /// presse-papiers de l'admin et force le joueur à le remplacer après connexion.
  Future<void> resetAccountPassword(String userId) async {
    final response = await _client.functions.invoke(
      'manage-user',
      body: {'action': 'reset-password', 'userId': userId},
    );
    final data = response.data;
    final temporaryPassword =
        data is Map ? data['temporaryPassword']?.toString() : null;
    if (response.status < 200 ||
        response.status >= 300 ||
        data is! Map ||
        data['reset'] != true ||
        temporaryPassword == null ||
        temporaryPassword.isEmpty) {
      final message = data is Map && data['error'] != null
          ? data['error'].toString()
          : 'La réinitialisation a échoué.';
      throw StateError(message);
    }

    await Clipboard.setData(ClipboardData(text: temporaryPassword));
  }
'''
          new = '''  /// Réinitialise le compte avec les fonctions Supabase déjà déployées :
  /// 1) invalide l'ancien mot de passe ; 2) active un mot de passe temporaire
  /// généré localement ; 3) force son remplacement à la prochaine connexion.
  Future<String> resetAccountPassword({
    required String userId,
    required String username,
  }) async {
    final cleanUsername = username.trim().toLowerCase();
    if (cleanUsername.isEmpty) {
      throw StateError('Identifiant du joueur introuvable.');
    }

    final resetResponse = await _client.functions.invoke(
      'manage-user',
      body: {'action': 'reset-password', 'userId': userId},
    );
    final resetData = resetResponse.data;
    if (resetResponse.status < 200 ||
        resetResponse.status >= 300 ||
        resetData is! Map ||
        resetData['reset'] != true) {
      final message = resetData is Map && resetData['error'] != null
          ? resetData['error'].toString()
          : 'La réinitialisation a échoué.';
      throw StateError(message);
    }

    final temporaryPassword = _generateTemporaryPassword();
    final activateResponse = await _client.functions.invoke(
      'claim-account',
      body: {
        'username': cleanUsername,
        'password': temporaryPassword,
      },
    );
    final activateData = activateResponse.data;
    if (activateResponse.status < 200 ||
        activateResponse.status >= 300 ||
        activateData is! Map ||
        activateData['activated'] != true) {
      final message = activateData is Map && activateData['error'] != null
          ? activateData['error'].toString()
          : 'Le mot de passe temporaire n’a pas pu être activé.';
      throw StateError(message);
    }

    final forced = await _client.rpc(
      'admin_require_password_change',
      params: {'p_profile_id': userId},
    );
    if (forced != true) {
      throw StateError('Le changement obligatoire n’a pas pu être activé.');
    }

    await Clipboard.setData(ClipboardData(text: temporaryPassword));
    return temporaryPassword;
  }

  String _generateTemporaryPassword() {
    const lower = 'abcdefghijkmnopqrstuvwxyz';
    const upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    const digits = '23456789';
    const symbols = '!@#%+-_';
    const all = '$lower$upper$digits$symbols';
    final random = Random.secure();
    final characters = <String>[
      lower[random.nextInt(lower.length)],
      upper[random.nextInt(upper.length)],
      digits[random.nextInt(digits.length)],
      symbols[random.nextInt(symbols.length)],
    ];
    while (characters.length < 14) {
      characters.add(all[random.nextInt(all.length)]);
    }
    characters.shuffle(random);
    return characters.join();
  }
'''
          if old not in text:
            raise SystemExit('admin reset method not found')
          repo.write_text(text.replace(old, new))

          auth = Path('lib/features/auth/data/auth_repository.dart')
          auth_text = auth.read_text()
          old_auth = '''    final userId = _client.auth.currentUser?.id;
    if (userId == null) throw StateError('Aucun utilisateur connecté.');
    await _client.from('profiles').update({
      'must_change_password': false,
      'password_set': true,
      'updated_at': DateTime.now().toUtc().toIso8601String(),
    }).eq('id', userId);
'''
          new_auth = '''    final result = await _client.rpc('complete_password_change');
    if (result != true) {
      throw StateError('Le changement de mot de passe n’a pas été finalisé.');
    }
'''
          if old_auth not in auth_text:
            raise SystemExit('auth completion block not found')
          auth.write_text(auth_text.replace(old_auth, new_auth))

          page = Path('lib/features/admin/presentation/admin_page.dart')
          page_text = page.read_text()
          old_page = '''                      final confirmed = await _confirm(
                        context,
                        'Réinitialiser le mot de passe ?',
                        '${profile.displayName} devra refaire une '
                            '« première connexion ».',
                      );
                      if (!confirmed) return;
                      await run(
                        () => repository.resetAccountPassword(profile.id),
                        success: 'Mot de passe réinitialisé.',
                      );
'''
          new_page = '''                      final confirmed = await _confirm(
                        context,
                        'Réinitialiser le mot de passe ?',
                        'Un mot de passe temporaire sera généré pour '
                            '${profile.displayName}. Il devra le remplacer dès '
                            'sa prochaine connexion.',
                      );
                      if (!confirmed) return;
                      try {
                        final temporaryPassword =
                            await repository.resetAccountPassword(
                          userId: profile.id,
                          username: profile.username,
                        );
                        ref.invalidate(adminDashboardProvider);
                        if (!context.mounted) return;
                        await showDialog<void>(
                          context: context,
                          builder: (dialogContext) => AlertDialog(
                            title: const Text('Mot de passe temporaire'),
                            content: Column(
                              mainAxisSize: MainAxisSize.min,
                              crossAxisAlignment: CrossAxisAlignment.stretch,
                              children: [
                                Text(
                                  'Envoie ce mot de passe à '
                                  '${profile.displayName}. Il est déjà copié.',
                                ),
                                const SizedBox(height: 14),
                                SelectableText(
                                  temporaryPassword,
                                  textAlign: TextAlign.center,
                                  style: Theme.of(context)
                                      .textTheme
                                      .headlineSmall
                                      ?.copyWith(fontWeight: FontWeight.w900),
                                ),
                              ],
                            ),
                            actions: [
                              TextButton.icon(
                                onPressed: () async {
                                  await Clipboard.setData(
                                    ClipboardData(text: temporaryPassword),
                                  );
                                },
                                icon: const Icon(Icons.copy),
                                label: const Text('Copier'),
                              ),
                              FilledButton(
                                onPressed: () => Navigator.pop(dialogContext),
                                child: const Text('Terminé'),
                              ),
                            ],
                          ),
                        );
                      } catch (error) {
                        if (context.mounted) {
                          ScaffoldMessenger.of(context).showSnackBar(
                            SnackBar(content: Text(humanizeError(error))),
                          );
                        }
                      }
'''
          if old_page not in page_text:
            raise SystemExit('admin page reset block not found')
          page.write_text(page_text.replace(old_page, new_page))

          Path('.github/workflows/deploy_supabase_functions.yml').unlink(missing_ok=True)
          Path('.github/workflows/finish_password_reset.yml').unlink()
          PY

      - name: Commit final flow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finaliser le flux de mot de passe temporaire"
          git push
