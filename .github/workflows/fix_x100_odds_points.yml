name: Fix x100 odds and points

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix_x100_odds_points.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply consistent x100 display
        run: |
          python - <<'PY'
          from pathlib import Path

          # Keep decimal odds in the model and use AppFormats.odds only in UI.
          repo = Path('lib/features/predictions/data/predictions_repository.dart')
          text = repo.read_text()
          text = text.replace(
              '''  /// Valeurs destinées à l'affichage, déjà exprimées en base 100.
  /// Exemple : une cote Supabase de 1,55 devient 155 dans l'interface.
''',
              '''  /// Cotes décimales réelles stockées en base (ex. 1,55).
  /// L'interface les affiche en base 100 via AppFormats.odds (155).
''',
          )
          text = text.replace(
              '''    final displayedOdds = switch (actualResult) {
      1 => oddsWin,
      0 => oddsDraw,
      _ => oddsLoss,
    };

    // Le moteur de points attend la cote décimale réelle, pas son affichage ×100.
    final decimalOdds = displayedOdds == null ? null : displayedOdds / 100;
    final points = PredictionScoring.points(
''',
              '''    final decimalOdds = switch (actualResult) {
      1 => oddsWin,
      0 => oddsDraw,
      _ => oddsLoss,
    };

    final points = PredictionScoring.points(
''',
          )
          text = text.replace(
              '      baseOdds: decimalOdds,\n',
              '      baseOdds: decimalOdds,\n',
          )
          old_helper = '''    double? displayOdds(Object? value) {
      final decimal = (value as num?)?.toDouble();
      return decimal == null ? null : decimal * 100;
    }

'''
          text = text.replace(old_helper, '')
          text = text.replace(
              "        oddsWin: displayOdds(odds['odds_victoire_as_grinta']),\n        oddsDraw: displayOdds(odds['odds_nul']),\n        oddsLoss: displayOdds(odds['odds_victoire_adverse']),",
              "        oddsWin: (odds['odds_victoire_as_grinta'] as num?)?.toDouble(),\n        oddsDraw: (odds['odds_nul'] as num?)?.toDouble(),\n        oddsLoss: (odds['odds_victoire_adverse'] as num?)?.toDouble(),",
          )
          repo.write_text(text)

          # Home prediction card: show 155, 263, 283 instead of 155,00 etc.
          home = Path('lib/features/home/presentation/home_page.dart')
          text = home.read_text()
          old = '''  String _format(double? value) => value == null
      ? '—'
      : value
            .toStringAsFixed(2)
            .replaceFirst(RegExp(r'0+\\$'), '')
            .replaceFirst(RegExp(r'\\.\\$'), '')
            .replaceAll('.', ',');
'''
          new = '''  String _format(double? value) => AppFormats.odds(value);
'''
          if old not in text:
            raise SystemExit('Home odds formatter not found')
          home.write_text(text.replace(old, new, 1))

          # Match details: display points in base 100, rounded to nearest integer.
          details = Path('lib/features/matches/presentation/match_details_page.dart')
          text = details.read_text()
          old = '''  String _points(double value) {
    if ((value - value.round()).abs() < 0.000001) return '${value.round()}';
    return '${value.ceil()}';
  }
'''
          new = '''  String _points(double value) => (value * 100).round().toString();
'''
          if old not in text:
            raise SystemExit('Match details points formatter not found')
          details.write_text(text.replace(old, new, 1))

          Path('.github/workflows/fix_x100_odds_points.yml').unlink()
          PY

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Uniformiser cotes et points en base 100"
          git push
