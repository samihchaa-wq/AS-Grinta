name: Fix match analyze issue

on:
  push:
    branches:
      - feat/match-attendance-mvp-entry

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/match-attendance-mvp-entry

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Replace deprecated field and format
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/features/matches/presentation/match_finalization_page.dart')
          text = path.read_text()
          old = '                    value: _manOfMatchPlayerId,\n'
          new = '                    initialValue: _manOfMatchPlayerId,\n'
          if old not in text:
              raise SystemExit('Expected DropdownButtonFormField value line not found')
          path.write_text(text.replace(old, new, 1))
          PY
          dart format lib/features/matches/presentation/match_finalization_page.dart

      - name: Commit fix
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/matches/presentation/match_finalization_page.dart
          git commit -m "fix(matches): utiliser initialValue pour le HDM"
          git push
