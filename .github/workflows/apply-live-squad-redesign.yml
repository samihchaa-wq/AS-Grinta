name: Apply live squad redesign

on:
  push:
    branches: [feat/live-squad-and-formations]
    paths: [.github/workflows/apply-live-squad-redesign.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/live-squad-and-formations
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Write implementation
        shell: bash
        run: |
          echo '[... ELLIPSIZATION ...]' | base64 -d | tar -xz
          python3 apply_patch.py
          rm apply_patch.py
      - name: Format and test
        run: |
          flutter pub get
          dart format lib test
          flutter analyze
          flutter test
      - name: Commit implementation
        shell: bash
        run: |
          rm .github/workflows/apply-live-squad-redesign.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Refondre effectif et composition en direct'
          git push origin HEAD:feat/live-squad-and-formations
