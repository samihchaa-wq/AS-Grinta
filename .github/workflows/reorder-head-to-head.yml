name: Reorder head to head

on:
  push:
    branches: [main]
    paths:
      - '.github/reorder-head-to-head-v2.trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Move head-to-head below prediction cards
        run: |
          python - <<'PY'
          from pathlib import Path

          pronos = Path('lib/features/predictions/presentation/pronos_hub_page.dart')
          text = pronos.read_text()

          before = '''    return Column(
      children: [
        details.when(
          loading: () => const _LoadingCard(),
          error: (_, __) => const _MessageCard(
            message: 'Les derniers face-à-face sont indisponibles.',
          ),
          data: (data) => _HeadToHeadPanel(data: data),
        ),
        const SizedBox(height: 16),
        _Panel(
'''
          after = '''    return Column(
      children: [
        _Panel(
'''
          if before not in text:
            raise SystemExit('pronos opening block not found')
          text = text.replace(before, after, 1)

          marker = '''          ),
        ),
      ],
    );
  }
}

class _HeadToHeadPanel extends StatelessWidget {
'''
          moved = '''          ),
        ),
        const SizedBox(height: 16),
        details.when(
          loading: () => const _LoadingCard(),
          error: (_, __) => const _MessageCard(
            message: 'Les derniers face-à-face sont indisponibles.',
          ),
          data: (data) => _HeadToHeadPanel(data: data),
        ),
      ],
    );
  }
}

