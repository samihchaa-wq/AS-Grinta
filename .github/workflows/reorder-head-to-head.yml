name: Reorder head to head

on:
  push:
    branches: [main]
    paths:
      - '.github/reorder-head-to-head-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Move head-to-head below prediction cards
        run: |
          python - <<'PY'
          from pathlib import Path

          pronos = Path('lib/features/predictions/presentation/pronos_hub_page.dart')
          text = pronos.read_text()

          opening = '''    return Column(
      children: [
        details.when(
          loading: () => const _LoadingCard(),
          error: (_, __) => const _MessageCard(
            message: 'Les derniers face-à-face sont indisponibles.',
          ),
          data: (data) => _HeadToHeadPanel(data: data),
        ),
        const SizedBox(height: 16),
        _Panel(
'''
          replacement = '''    return Column(
      children: [
        _Panel(
'''
          if opening not in text:
            raise SystemExit('Opening pronos block not found')
          text = text.replace(opening, replacement, 1)

          tail = '''          ),
        ),
      ],
    );
  }
}

class _HeadToHeadPanel extends StatelessWidget {
'''
          tail_replacement = '''          ),
        ),
        const SizedBox(height: 16),
        details.when(
          loading: () => const _LoadingCard(),
          error: (_, __) => const _MessageCard(
            message: 'Les derniers face-à-face sont indisponibles.',
          ),
          data: (data) => _HeadToHeadPanel(data: data),
        ),
      ],
    );
  }
}

class _HeadToHeadPanel extends StatelessWidget {
'''
          if tail not in text:
            raise SystemExit('Closing pronos block not found')
          text = text.replace(tail, tail_replacement, 1)
          text = text.replace("'5 derniers face-à-face'", "'Les derniers face-à-face'", 1)
          text = text.replace(
              '...data.headToHead.map((match) => _HeadToHeadRow(match: match)),',
              '...data.headToHead.take(5).map((match) => _HeadToHeadRow(match: match)),',
              1,
          )
          pronos.write_text(text)

          details_page = Path(
              'lib/features/matches/presentation/upcoming_match_prediction_page.dart'
          )
          details_text = details_page.read_text()
          old_order = '''                const SizedBox(height: 16),
                details.when(
                  loading: () => const Card(
                    child: Padding(
                      padding: EdgeInsets.all(24),
                      child: Center(child: CircularProgressIndicator()),
                    ),
                  ),
                  error: (_, __) => const SizedBox.shrink(),
                  data: _historyCard,
                ),
                const SizedBox(height: 16),
                _predictionCard(item),
'''
          new_order = '''                const SizedBox(height: 16),
                _predictionCard(item),
                const SizedBox(height: 16),
                details.when(
                  loading: () => const Card(
                    child: Padding(
                      padding: EdgeInsets.all(24),
                      child: Center(child: CircularProgressIndicator()),
                    ),
                  ),
                  error: (_, __) => const SizedBox.shrink(),
                  data: _historyCard,
                ),
'''
          if old_order not in details_text:
            raise SystemExit('Match details order block not found')
          details_text = details_text.replace(old_order, new_order, 1)
          details_text = details_text.replace(
              "'5 derniers face-à-face'",
              "'Les derniers face-à-face'",
              1,
          )
          details_text = details_text.replace(
              '...details.headToHead.map(_historyRow),',
              '...details.headToHead.take(5).map(_historyRow),',
              1,
          )
          details_page.write_text(details_text)

          Path('.github/reorder-head-to-head-trigger').unlink(missing_ok=True)
          Path('.github/workflows/reorder-head-to-head.yml').unlink()
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Placer les derniers face-à-face sous le pronostic"
          git push
