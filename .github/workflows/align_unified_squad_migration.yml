name: Align unified squad migration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  align:
    if: ${{ github.head_ref == 'feature/unified-squad-composition' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/unified-squad-composition
          fetch-depth: 0
      - name: Rename migration to production version
        run: |
          git mv \
            supabase/migrations/20260721170000_unified_match_squad_plan.sql \
            supabase/migrations/20260721170424_unified_match_squad_plan.sql
          rm .github/workflows/align_unified_squad_migration.yml
      - name: Commit aligned migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[migration-aligned] Aligner le plan unifié avec Production"
          git push origin HEAD:feature/unified-squad-composition
