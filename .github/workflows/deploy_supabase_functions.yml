name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy_supabase_functions.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  deploy-manage-user:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check deployment secret
        id: secret-check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "missing=false" >> "$GITHUB_OUTPUT"

      - name: Deploy manage-user
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          supabase functions deploy manage-user \
            --project-ref ovzijmqrnsgcmryinkfa

      - name: Record deployment result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          SECRET_MISSING: ${{ steps.secret-check.outputs.missing }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            message="✅ Edge Function \`manage-user\` déployée depuis le commit \`$GITHUB_SHA\`."
          elif [ "$SECRET_MISSING" = "true" ]; then
            message="❌ Déploiement \`manage-user\` impossible : secret GitHub \`SUPABASE_ACCESS_TOKEN\` absent."
          else
            message="❌ Échec du déploiement \`manage-user\`."
          fi
          gh issue comment 43 \
            --repo "$GITHUB_REPOSITORY" \
            --body "$message Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
