name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy_supabase_functions.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  deploy-manage-user:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy manage-user
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          supabase functions deploy manage-user \
            --project-ref ovzijmqrnsgcmryinkfa

      - name: Record successful deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 43 \
            --repo "$GITHUB_REPOSITORY" \
            --body "✅ Edge Function \`manage-user\` déployée depuis le commit \`$GITHUB_SHA\`. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
