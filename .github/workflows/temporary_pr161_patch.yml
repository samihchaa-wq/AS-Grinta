name: Temporary PR 161 patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/restore-match-delete-and-redesign-player-pronos'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/restore-match-delete-and-redesign-player-pronos
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Fix analyzer warnings and hero constraints
        shell: python
        run: |
          from pathlib import Path
          path = Path('lib/features/predictions/presentation/scorer_dashboard_page.dart')
          text = path.read_text()
          text = text.replace(
              "constraints: const BoxConstraints(minHeight: 220),",
              "height: 230,",
          )
          text = text.replace('comparison! > 0', 'comparison > 0')
          text = text.replace('comparison! < 0', 'comparison < 0')
          path.write_text(text)
      - run: dart format lib/features/predictions/presentation/scorer_dashboard_page.dart
      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/predictions/presentation/scorer_dashboard_page.dart
          git commit -m "fix: polish player prediction dashboard"
          git push origin HEAD:feature/restore-match-delete-and-redesign-player-pronos
