}

class _BenchPlayers extends StatelessWidget {
  const _BenchPlayers({required this.entries, required this.stats});

  final List<MatchCompositionEntry> entries;
  final Map<String, _ResultPlayerStats> stats;

  @override
  Widget build(BuildContext context) {
    if (entries.isEmpty) return const Text('Aucun remplaçant.');
    return Wrap(
      spacing: 10,
      runSpacing: 10,
      children: [
        for (final entry in entries)
          _BenchPlayer(
            name: entry.displayName,
            stats: _statsFor(entry.displayName, stats),
          ),
      ],
    );
  }
}

class _BenchPlayer extends StatelessWidget {
  const _BenchPlayer({required this.name, this.stats});

  final String name;
  final _ResultPlayerStats? stats;

  @override
  Widget build(BuildContext context) {
    final labels = <String>[
      if ((stats?.goals ?? 0) > 0)
        stats!.goals == 1 ? '1 but' : '${stats!.goals} buts',
      if (stats?.isManOfTheMatch ?? false) 'HDM',
    ];
    return Container(
      padding: const EdgeInsets.fromLTRB(8, 7, 10, 7),
      decoration: BoxDecoration(
        borderRadius: BorderRadius.circular(999),
        border: Border.all(color: Colors.white24),
      ),
      child: Row(
