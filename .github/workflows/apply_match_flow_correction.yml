        children: [
          CircleAvatar(
            radius: 14,
            child: Text(
              _initials(name),
              style: const TextStyle(fontSize: 10, fontWeight: FontWeight.w900),
            ),
          ),
          const SizedBox(width: 7),
          Text(
            labels.isEmpty ? name : '$name · ${labels.join(' · ')}',
            style: const TextStyle(fontWeight: FontWeight.w800),
          ),
        ],
      ),
    );
  }
}

class _FallbackResultPlayers extends StatelessWidget {
  const _FallbackResultPlayers({required this.details, required this.stats});

  final MatchDetailsData details;
  final Map<String, _ResultPlayerStats> stats;

  @override
  Widget build(BuildContext context) {
    if (details.startingLineup.isEmpty) {
      return const Text('Composition non renseignée.');
    }
    return Wrap(
      spacing: 10,
      runSpacing: 10,
      children: [
        for (final player in details.startingLineup)
          _BenchPlayer(
            name: player.name,
            stats: stats[_normalize(player.name)],
          ),
      ],
    );
  }
}

class _ResultPlayerStats {
  const _ResultPlayerStats({required this.goals, required this.isManOfTheMatch});

  final int goals;
  final bool isManOfTheMatch;
}

_ResultPlayerStats? _statsFor(
  String displayName,
  Map<String, _ResultPlayerStats> stats,
) {
  final normalized = _normalize(displayName);
  final exact = stats[normalized];
  if (exact != null) return exact;
  final firstName = normalized.split(' ').first;
  for (final entry in stats.entries) {
    if (entry.key.split(' ').first == firstName) return entry.value;
  }
  return null;
}

String _normalize(String value) =>
    value.trim().toLowerCase().replaceAll(RegExp(r'\s+'), ' ');

String _shortName(String value) => value.trim().split(RegExp(r'\s+')).first;

String _initials(String value) {
  final parts = value.trim().split(RegExp(r'\s+'));
  if (parts.isEmpty || parts.first.isEmpty) return '?';
  if (parts.length == 1) return parts.first.substring(0, 1).toUpperCase();
  return '${parts.first.substring(0, 1)}${parts.last.substring(0, 1)}'
      .toUpperCase();
}
