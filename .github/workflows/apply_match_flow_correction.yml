            style: const TextStyle(fontWeight: FontWeight.w900),
          ),
        ),
        const SizedBox(height: 3),
        Text(
          _shortName(name),
          maxLines: 1,
          overflow: TextOverflow.ellipsis,
          textAlign: TextAlign.center,
          style: const TextStyle(
            color: Colors.white,
            fontSize: 11,
            fontWeight: FontWeight.w900,
            shadows: [Shadow(blurRadius: 3, color: Colors.black87)],
          ),
        ),
        if ((stats?.goals ?? 0) > 0 || (stats?.isManOfTheMatch ?? false))
          Wrap(
            alignment: WrapAlignment.center,
            spacing: 3,
            children: [
              if ((stats?.goals ?? 0) > 0)
                _SmallResultBadge(
                  label: stats!.goals == 1 ? '1 but' : '${stats!.goals} buts',
                ),
              if (stats?.isManOfTheMatch ?? false)
                const _SmallResultBadge(label: 'HDM'),
            ],
          ),
      ],
    );
  }
}

