name: Apply match flow correction

on:
  push:
    branches: [agent/fix-next-and-last-match-flow]
    paths:
      - '.github/workflows/apply_match_flow_correction.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-next-and-last-match-flow
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Apply scoped UI correction
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def read(path):
              return Path(path).read_text()

          def write(path, text):
              Path(path).write_text(text)

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: expected exactly one occurrence, found {count}')
              return text.replace(old, new, 1)

          def matching(text, opening, open_char='{', close_char='}'):
              depth = 0
              i = opening
              quote = None
              triple = False
              line_comment = False
              block_comment = False
              while i < len(text):
                  c = text[i]
                  n = text[i + 1] if i + 1 < len(text) else ''
                  if line_comment:
                      if c == '\n':
                          line_comment = False
                      i += 1
                      continue
                  if block_comment:
                      if c == '*' and n == '/':
                          block_comment = False
                          i += 2
                      else:
                          i += 1
                      continue
                  if quote:
                      if triple:
                          if text.startswith(quote * 3, i):
                              quote = None
                              triple = False
                              i += 3
                          else:
                              i += 1
                      elif c == '\\':
                          i += 2
                      elif c == quote:
                          quote = None
                          i += 1
                      else:
                          i += 1
                      continue
                  if c == '/' and n == '/':
                      line_comment = True
                      i += 2
                      continue
                  if c == '/' and n == '*':
                      block_comment = True
                      i += 2
                      continue
                  if c in ("'", '"'):
                      if text.startswith(c * 3, i):
                          quote = c
                          triple = True
                          i += 3
                      else:
                          quote = c
                          i += 1
                      continue
                  if c == open_char:
                      depth += 1
                  elif c == close_char:
                      depth -= 1
                      if depth == 0:
                          return i
                  i += 1
              raise RuntimeError(f'No matching {close_char}')

          def remove_class(text, name):
              marker = f'class {name}'
              start = text.find(marker)
              if start < 0:
                  return text
              brace = text.find('{', start)
              end = matching(text, brace)
              while end + 1 < len(text) and text[end + 1] in ' \t':
                  end += 1
              while end + 1 < len(text) and text[end + 1] == '\n':
                  end += 1
                  if end + 1 < len(text) and text[end + 1] != '\n':
                      break
              return text[:start] + text[end + 1:]

          def remove_widget_statement(text, widget_name):
              marker = widget_name + '('
              start_name = text.find(marker)
              if start_name < 0:
                  return text
              line_start = text.rfind('\n', 0, start_name) + 1
              paren = text.find('(', start_name)
              end = matching(text, paren, '(', ')')
              j = end + 1
              while j < len(text) and text[j] in ' \t':
                  j += 1
              if j < len(text) and text[j] == ',':
                  j += 1
              if j < len(text) and text[j] == '\n':
                  j += 1
              return text[:line_start] + text[j:]

          def remove_collection_if(text, marker):
              start = text.find(marker)
              if start < 0:
                  raise RuntimeError(f'Collection marker not found: {marker}')
              line_start = text.rfind('\n', 0, start) + 1
              bracket = text.find('[', start)
              end = matching(text, bracket, '[', ']')
              j = end + 1
              while j < len(text) and text[j] in ' \t':
                  j += 1
              if j < len(text) and text[j] == ',':
                  j += 1
              if j < len(text) and text[j] == '\n':
                  j += 1
              return text[:line_start] + text[j:]

          # Accueil: next match opens its fiche; last prono becomes last match.
          path = 'lib/features/home/presentation/accueil_page.dart'
          text = read(path)
          import_line = "import 'package:as_grinta/features/matches/data/match_details_repository.dart';\n"
          if import_line not in text:
              anchor = "import 'package:as_grinta/features/home/presentation/home_sports_flow_blocks.dart';\n"
              text = replace_once(text, anchor, anchor + import_line, 'home details import')
          text = text.replace('            HomeLastMatchVoteBlock(),\n', '', 1)
          text = replace_once(text, '            _LastPronoBlock(),', '            _LastMatchBlock(),', 'home last block')
          if '..invalidate(matchDetailsProvider)' not in text:
              text = replace_once(
                  text,
                  '            ..invalidate(myArmoireProvider)\n',
                  '            ..invalidate(myArmoireProvider)\n            ..invalidate(matchDetailsProvider)\n',
                  'home refresh details',
              )
          text = replace_once(
              text,
              "        onTap: () => context.go('/pronos?category=matches'),",
              "        onTap: () => context.push('/matches/${match.id}'),",
              'next match destination',
          )
          last_start = text.find('class _LastPronoBlock')
          result_tag = text.find('class _ResultTag', last_start)
          if last_start < 0 or result_tag < 0:
              raise RuntimeError('Unable to locate former last prediction block')
          comment_start = text.rfind('//', 0, last_start)
          if comment_start < 0:
              comment_start = last_start
          new_last = r'''// ─────────────────────────── Dernier match ───────────────────────────

class _LastMatchBlock extends ConsumerWidget {
  const _LastMatchBlock();

  @override
  Widget build(BuildContext context, WidgetRef ref) {
    final async = ref.watch(myLastPronoProvider);
    return Column(
      crossAxisAlignment: CrossAxisAlignment.stretch,
      children: [
        const _BlockHeader('🏁', 'Dernier match'),
        async.when(
          loading: () => const _MiniLoader(),
          error: (_, __) =>
              const _EmptyCard('Impossible de charger le dernier match.'),
          data: (prono) {
            if (prono == null) {
              return const _EmptyCard('Aucun match terminé pour le moment.');
            }
            return _LastMatchCard(prono: prono);
          },
        ),
        const SizedBox(height: 12),
        const HomeLastMatchVoteBlock(),
      ],
    );
  }
}

class _LastMatchCard extends ConsumerWidget {
  const _LastMatchCard({required this.prono});

  final LastProno prono;

  @override
  Widget build(BuildContext context, WidgetRef ref) {
    final Color accent;
    if (prono.isWin) {
      accent = const Color(0xFF2E9E63);
    } else if (prono.isDraw) {
      accent = const Color(0xFF8A6D2F);
    } else {
      accent = const Color(0xFFB23B4E);
    }
    final homeName = prono.isHome ? 'AS Grinta' : prono.opponent;
    final awayName = prono.isHome ? prono.opponent : 'AS Grinta';
    final homeReal = prono.isHome ? prono.grintaScore : prono.opponentScore;
    final awayReal = prono.isHome ? prono.opponentScore : prono.grintaScore;
    final homePred = prono.isHome ? prono.predGrinta : prono.predAdverse;
    final awayPred = prono.isHome ? prono.predAdverse : prono.predGrinta;
    final detailsAsync = ref.watch(matchDetailsProvider(prono.matchId));

    return Card(
      color: accent.withValues(alpha: 0.16),
      shape: RoundedRectangleBorder(
        borderRadius: BorderRadius.circular(20),
        side: BorderSide(color: accent.withValues(alpha: 0.7), width: 1.4),
      ),
      clipBehavior: Clip.antiAlias,
      child: InkWell(
        onTap: () => context.push('/matches/${prono.matchId}'),
        child: Padding(
          padding: const EdgeInsets.all(18),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Text(
                '$homeName  $homeReal – $awayReal  $awayName',
                style: Theme.of(context).textTheme.titleMedium?.copyWith(
                      fontWeight: FontWeight.w900,
                    ),
              ),
              const SizedBox(height: 12),
              detailsAsync.when(
                loading: () => const SizedBox.shrink(),
                error: (_, __) => const SizedBox.shrink(),
                data: (details) {
                  final scorers = details.startingLineup
                      .where((player) => player.goals > 0)
                      .map(
                        (player) => player.goals == 1
                            ? player.name
                            : '${player.name} (${player.goals})',
                      )
                      .toList(growable: false);
                  final motm = details.startingLineup
                      .where((player) => player.isManOfTheMatch)
                      .map((player) => player.name)
                      .toList(growable: false);
                  return Column(
                    children: [
                      _LastMatchInfoRow(
                        label: 'Buteur${scorers.length > 1 ? 's' : ''}',
                        value: scorers.isEmpty ? 'Aucun' : scorers.join(', '),
                      ),
                      const SizedBox(height: 7),
                      _LastMatchInfoRow(
                        label: 'HDM',
                        value: motm.isEmpty ? 'Vote en cours' : motm.join(', '),
                      ),
                    ],
                  );
                },
              ),
              const SizedBox(height: 12),
              Text(
                'Ton prono : $homePred – $awayPred'
                '${prono.useX2 ? ' · ×2' : ''} · '
                '${AppFormats.counted((prono.points * 100).round(), 'point')}',
                style: Theme.of(context).textTheme.bodyMedium?.copyWith(
                      color: AppTheme.textSecondary,
                      fontWeight: FontWeight.w800,
                    ),
              ),
              const SizedBox(height: 14),
              Row(
                children: [
                  if (prono.exact)
                    const _ResultTag('Score exact', Color(0xFF52D08A))
                  else if (prono.goodWinner)
                    const _ResultTag('Bon vainqueur', Color(0xFF6BA0FF))
                  else
                    const _ResultTag('Raté', Color(0xFF9299A5)),
                  const Spacer(),
                  const Icon(Icons.chevron_right),
                ],
              ),
            ],
          ),
        ),
      ),
    );
  }
}

class _LastMatchInfoRow extends StatelessWidget {
