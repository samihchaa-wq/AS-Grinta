class _ResultPitch extends StatelessWidget {
  const _ResultPitch({required this.entries, required this.stats});

  final List<MatchCompositionEntry> entries;
  final Map<String, _ResultPlayerStats> stats;

  @override
  Widget build(BuildContext context) {
    return AspectRatio(
      aspectRatio: 0.72,
      child: LayoutBuilder(
        builder: (context, constraints) {
          const markerWidth = 88.0;
          const markerHeight = 82.0;
          return Container(
            decoration: BoxDecoration(
              color: const Color(0xFF12633D),
              borderRadius: BorderRadius.circular(22),
              border: Border.all(color: Colors.white54, width: 2),
            ),
            child: Stack(
              children: [
                const Positioned.fill(child: _PitchLines()),
                for (final entry in entries)
                  Positioned(
                    left: ((entry.x ?? 0.5) * constraints.maxWidth -
                            markerWidth / 2)
                        .clamp(0, constraints.maxWidth - markerWidth),
                    top: ((entry.y ?? 0.5) * constraints.maxHeight -
                            markerHeight / 2)
                        .clamp(0, constraints.maxHeight - markerHeight),
                    child: SizedBox(
                      width: markerWidth,
                      height: markerHeight,
                      child: _ResultPlayer(
                        name: entry.displayName,
                        stats: _statsFor(entry.displayName, stats),
                      ),
                    ),
                  ),
              ],
            ),
          );
        },
      ),
    );
  }
}

class _PitchLines extends StatelessWidget {
  const _PitchLines();

  @override
  Widget build(BuildContext context) {
    return CustomPaint(painter: _PitchPainter());
  }
}

class _PitchPainter extends CustomPainter {
  @override
  void paint(Canvas canvas, Size size) {
    final paint = Paint()
      ..color = Colors.white38
      ..style = PaintingStyle.stroke
      ..strokeWidth = 1.5;
    canvas.drawLine(
      Offset(0, size.height / 2),
      Offset(size.width, size.height / 2),
      paint,
    );
    canvas.drawCircle(Offset(size.width / 2, size.height / 2), 38, paint);
    final boxWidth = size.width * 0.56;
    final boxHeight = size.height * 0.15;
    canvas.drawRect(
      Rect.fromLTWH((size.width - boxWidth) / 2, 0, boxWidth, boxHeight),
      paint,
    );
    canvas.drawRect(
      Rect.fromLTWH(
        (size.width - boxWidth) / 2,
        size.height - boxHeight,
        boxWidth,
        boxHeight,
      ),
      paint,
    );
  }

  @override
  bool shouldRepaint(covariant CustomPainter oldDelegate) => false;
}

