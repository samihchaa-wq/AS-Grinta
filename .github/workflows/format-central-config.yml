name: Format centralized config

on:
  push:
    branches: [quality/central-config-versioning]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Format and clean
        shell: bash
        run: |
          set -euo pipefail
          dart format \
            lib/core/config/app_config.dart \
            lib/main.dart \
            lib/features/auth/data/auth_repository.dart \
            lib/features/more/presentation/more_page.dart
          rm -f .github/workflows/format-central-config.yml
          rm -f .github/format-central-config-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(config): format centralized configuration changes"
          git push origin HEAD:quality/central-config-versioning
