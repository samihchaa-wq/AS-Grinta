name: Finalize admin crown markers

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'fix/calendar-colors-admin-crowns'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/calendar-colors-admin-crowns
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Restore remaining admin crowns
        shell: python
        run: |
          from pathlib import Path

          details = Path('lib/features/matches/presentation/match_details_page.dart')
          text = details.read_text().replace(
              "label: const Text('Modifier les statistiques'),",
              "label: const Text('👑 Modifier les statistiques'),",
          )
          details.write_text(text)

          admin = Path('lib/features/admin/presentation/admin_page.dart')
          text = admin.read_text().replace(
              "leading: const Icon(Icons.sports_soccer_outlined),\n                    title: const Text('Gérer les matchs'),",
              "leading: const Text('👑', style: TextStyle(fontSize: 22)),\n                    title: const Text('Gérer les matchs'),",
          )
          admin.write_text(text)
      - run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart'
          )
          dart format "${files[@]}"
      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib
          git commit -m "chore: finalize admin crown markers"
          git push origin HEAD:fix/calendar-colors-admin-crowns
