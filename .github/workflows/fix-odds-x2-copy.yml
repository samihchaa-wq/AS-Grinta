name: Fix odds display and x2 copy

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/fix-odds-display-x2-copy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-odds-display-x2-copy
      - name: Remove x2 warning copy
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('lib/features/home/presentation/home_page.dart')
          t = p.read_text()
          old = "'${item.x2Available} en réserve · consommé même si le pronostic est faux'"
          new = "'${item.x2Available} en réserve'"
          if old not in t:
              raise SystemExit('x2 copy not found')
          p.write_text(t.replace(old, new, 1))
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/home/presentation/home_page.dart
          git diff --cached --quiet || git commit -m "Alléger le texte du bonus x2"
          git push origin HEAD:agent/fix-odds-display-x2-copy
