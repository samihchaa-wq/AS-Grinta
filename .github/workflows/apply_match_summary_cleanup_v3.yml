name: Apply match summary and squad cleanup v3

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/match-summary-and-squad-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply requested changes
        run: python .github/patch_match_summary_cleanup.py

      - name: Upload patch diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: match-summary-patch-error-v3
          path: .patch_error.txt
          if-no-files-found: ignore

      - name: Format changed Dart files
        if: success()
        run: |
          flutter pub get
          dart format \
            lib/features/home/presentation/accueil_page.dart \
            lib/features/matches/data/match_details_repository.dart \
            lib/features/matches/presentation/match_details_page.dart \
            lib/features/sports_management/presentation/admin_squad_plan_page.dart

      - name: Remove temporary files and commit
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          rm .github/patch_match_summary_cleanup.py
          rm .github/workflows/apply_match_summary_cleanup.yml
          rm .github/workflows/apply_match_summary_cleanup_v2.yml
          rm .github/workflows/apply_match_summary_cleanup_v3.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            lib/features/home/presentation/accueil_page.dart \
            lib/features/matches/data/match_details_repository.dart \
            lib/features/matches/presentation/match_details_page.dart \
            lib/features/sports_management/presentation/admin_squad_plan_page.dart \
            .github/patch_match_summary_cleanup.py \
            .github/workflows/apply_match_summary_cleanup.yml \
            .github/workflows/apply_match_summary_cleanup_v2.yml \
            .github/workflows/apply_match_summary_cleanup_v3.yml
          git commit -m "Afficher la composition de départ et simplifier la sélection"
          git push origin HEAD:${{ github.head_ref }}
