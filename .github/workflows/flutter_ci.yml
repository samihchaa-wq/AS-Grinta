name: Flutter CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Apply persistent navigation patch
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/apply_persistent_navigation_patch.py
          dart format \
            lib/app/shell/app_shell.dart \
            lib/features/sports_management/presentation/admin_squad_plan_page.dart \
            lib/features/sports_management/presentation/match_lineup_page.dart
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            lib/app/shell/app_shell.dart \
            lib/features/sports_management/presentation/admin_squad_plan_page.dart \
            lib/features/sports_management/presentation/match_lineup_page.dart \
            web/index.html \
            web/sw.js
          git commit -m 'Garder la navigation principale visible'
          git push origin HEAD:${{ github.head_ref }}

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

      - name: Build web
        run: |
          version=$(awk '/^version:/{print $2}' pubspec.yaml)
          flutter build web \
            --release \
            --base-href "/AS-Grinta/" \
            --pwa-strategy=none \
            --no-web-resources-cdn \
            --dart-define-from-file=config/production.json \
            --dart-define=APP_VERSION="$version"
