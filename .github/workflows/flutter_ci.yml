name: Remove dead home ranking code

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'ux/home-sports-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Remove unused rankings block
        shell: python
        run: |
          from pathlib import Path
          import re
          path = Path('lib/features/home/presentation/accueil_page.dart')
          text = path.read_text()
          text = text.replace("import 'package:as_grinta/features/auth/presentation/auth_state.dart';\n", '')
          text = text.replace("import 'package:as_grinta/features/predictions/data/leaderboard_repository.dart';\n", '')
          pattern = r"// ─────────────────────────── 3\) Tes classements ───────────────────────────.*?// ─────────────────────────── 4\) Badges récents ───────────────────────────"
          text, count = re.subn(
              pattern,
              '// ─────────────────────────── Badges récents ───────────────────────────',
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('Home rankings block not found')
          path.write_text(text)
      - name: Format and commit
        run: |
          flutter pub get
          dart format lib/features/home/presentation/accueil_page.dart
          git checkout origin/main -- .github/workflows/flutter_ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/flutter_ci.yml lib/features/home/presentation/accueil_page.dart
          git commit -m "refactor: retirer le classement inutilisé de l’accueil"
          git push origin HEAD:${{ github.head_ref }}
