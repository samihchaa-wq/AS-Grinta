name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply one-time match patch
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/match-sports-visibility-x2'
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/features/matches/presentation/match_details_page.dart')
          text = path.read_text()
          replacements = [
            (
              """        onRefresh: () async {
          ref.invalidate(matchDetailsProvider(matchId));
          if (sportsEnabled) {
            ref.invalidate(sportMotmVoteProvider(matchId));
          }
          await ref.read(matchDetailsProvider(matchId).future);
        },""",
              """        onRefresh: () async {
          await ref.read(featureFlagsControllerProvider.notifier).refresh();
          ref
            ..invalidate(matchDetailsProvider(matchId))
            ..invalidate(sportMotmVoteProvider(matchId));
          await ref.read(matchDetailsProvider(matchId).future);
        },""",
              'refresh',
            ),
            (
              """                  _UpcomingHeader(details: details),
                  const SizedBox(height: 16),
                  PublishedLineupCard(matchId: matchId, bottomSpacing: 16),
                  _HeadToHeadCard(details: details),
                  if (isAdmin && sportsEnabled) ...[
                    const SizedBox(height: 16),
                    _SportsManagementSection(
                      matchId: matchId,
                      actions: const [
                        _SportAction(
                          'Sélection & composition',
                          Icons.sports_soccer_outlined,
                          'composition',
                        ),
                      ],
                    ),
                  ],""",
              """                  _UpcomingHeader(details: details),
                  if (isAdmin && sportsEnabled) ...[
                    const SizedBox(height: 16),
                    _SportsManagementSection(
                      matchId: matchId,
                      actions: const [
                        _SportAction(
                          'Sélection & composition',
                          Icons.sports_soccer_outlined,
                          'composition',
                        ),
                      ],
                    ),
                  ],
                  const SizedBox(height: 16),
                  PublishedLineupCard(matchId: matchId, bottomSpacing: 16),
                  _HeadToHeadCard(details: details),""",
              'upcoming layout',
            ),
            (
              """                if (details.playerStats.isNotEmpty) ...[
                  const SizedBox(height: 16),
                  _MatchSummary(details: details),
                ],
                if (details.predictions.isNotEmpty) ...[
                  const SizedBox(height: 16),
                  _PredictionsTable(
                    predictions: details.predictions,
                    actualGrinta: details.scoreGrinta ?? 0,
                    actualOpponent: details.scoreOpponent ?? 0,
                    isHome: details.location == 'domicile',
                  ),
                ],
                if (isAdmin && sportsEnabled) ...[
                  const SizedBox(height: 16),
                  _SportsManagementSection(
                    matchId: matchId,
                    actions: const [
                      _SportAction(
                        'Suivi des votes HDM',
                        Icons.how_to_vote_outlined,
                        'motm',
                      ),
                    ],
                  ),
                ],""",
              """                if (isAdmin && sportsEnabled) ...[
                  const SizedBox(height: 16),
                  _SportsManagementSection(
                    matchId: matchId,
                    actions: const [
                      _SportAction(
                        'Suivi des votes HDM',
                        Icons.how_to_vote_outlined,
                        'motm',
                      ),
                    ],
                  ),
                ],
                if (details.playerStats.isNotEmpty) ...[
                  const SizedBox(height: 16),
                  _MatchSummary(details: details),
                ],
                if (details.predictions.isNotEmpty) ...[
                  const SizedBox(height: 16),
                  _PredictionsTable(
                    predictions: details.predictions,
                    actualGrinta: details.scoreGrinta ?? 0,
                    actualOpponent: details.scoreOpponent ?? 0,
                    isHome: details.location == 'domicile',
                  ),
                ],""",
              'finished layout',
            ),
            (
              """            Text(
              'Gestion sportive',
              style: Theme.of(context)
                  .textTheme
                  .titleMedium
                  ?.copyWith(fontWeight: FontWeight.w900),
            ),""",
              """            Row(
              children: [
                Expanded(
                  child: Text(
                    'Gestion sportive',
                    style: Theme.of(context)
                        .textTheme
                        .titleMedium
                        ?.copyWith(fontWeight: FontWeight.w900),
                  ),
                ),
                Container(
                  padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 4),
                  decoration: BoxDecoration(
                    color: const Color(0xFF39E784).withValues(alpha: .12),
                    borderRadius: BorderRadius.circular(999),
                    border: Border.all(
                      color: const Color(0xFF39E784).withValues(alpha: .55),
                    ),
                  ),
                  child: const Row(
                    mainAxisSize: MainAxisSize.min,
                    children: [
                      Icon(Icons.check_circle, size: 14, color: Color(0xFF39E784)),
                      SizedBox(width: 4),
                      Text('Active', style: TextStyle(fontWeight: FontWeight.w900)),
                    ],
                  ),
                ),
              ],
            ),""",
              'sports title',
            ),
            (
              """                    Expanded(child: Text(score, textAlign: TextAlign.center)),""",
              """                    Expanded(
                      child: Wrap(
                        alignment: WrapAlignment.center,
                        crossAxisAlignment: WrapCrossAlignment.center,
                        spacing: 5,
                        children: [
                          Text(score),
                          if (prediction.usedX2)
                            Container(
                              padding: const EdgeInsets.symmetric(
                                horizontal: 6,
                                vertical: 2,
                              ),
                              decoration: BoxDecoration(
                                color: const Color(0xFFFFB020),
                                borderRadius: BorderRadius.circular(999),
                              ),
                              child: const Text(
                                '×2',
                                style: TextStyle(
                                  color: Colors.black,
                                  fontSize: 11,
                                  fontWeight: FontWeight.w900,
                                ),
                              ),
                            ),
                        ],
                      ),
                    ),""",
              'x2 badge',
            ),
          ]

          for old, new, label in replacements:
            if old not in text:
              raise SystemExit(f'Block not found: {label}')
            text = text.replace(old, new, 1)
          path.write_text(text)

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Commit one-time match patch
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/match-sports-visibility-x2'
        shell: bash
        run: |
          set -euo pipefail
          dart format lib/features/matches/presentation/match_details_page.dart
          git checkout origin/main -- .github/workflows/flutter_ci.yml
          rm -f .github/workflows/patch_match_sports_visibility.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/features/matches/presentation/match_details_page.dart .github/workflows/flutter_ci.yml .github/workflows/patch_match_sports_visibility.yml
          git commit -m "fix: afficher le bonus x2 et les outils sportifs"
          git push origin HEAD:${{ github.head_ref }}

      - name: Read application version
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk '/^version:/{print $2}' pubspec.yaml)
          test -n "$version"
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Check formatting of changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            range="$base...HEAD"
          else
            range="HEAD^...HEAD"
          fi
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$range" -- '*.dart')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed Dart files to format."
            exit 0
          fi
          dart format --output=none --set-exit-if-changed "${files[@]}"

      - name: Analyze
        shell: bash
        run: |
          set -o pipefail
          flutter analyze --fatal-infos 2>&1 | tee analyze.log

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web
        shell: bash
        run: |
          set -o pipefail
          flutter build web \
            --release \
            --base-href "/AS-Grinta/" \
            --pwa-strategy=none \
            --no-web-resources-cdn \
            --dart-define-from-file=config/production.json \
            --dart-define=APP_VERSION="$APP_VERSION" \
            2>&1 | tee build-web.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-validation-logs
          path: |
            analyze.log
            test.log
            build-web.log
          if-no-files-found: warn
