name: Apply admin screen formatting

on:
  push:
    branches: [feat/admin-profile-status-sections]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply, clean and restore
        shell: bash
        run: |
          set -euo pipefail
          dart format lib/features/admin/presentation/admin_page.dart
          rm -f .github/admin-profile-sections-format-trigger-3
          git fetch origin main
          git checkout origin/main -- .github/workflows/flutter_ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A lib/features/admin/presentation/admin_page.dart .github/workflows/flutter_ci.yml .github/admin-profile-sections-format-trigger-3
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(admin): finalize formatted profile sections"
          git push origin HEAD:feat/admin-profile-status-sections
