name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format changed Dart files for diagnosis
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            range="$base...HEAD"
          else
            range="HEAD^...HEAD"
          fi
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$range" -- '*.dart')
          printf '%s\n' "${files[@]}" > /tmp/formatted-files.txt
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed Dart files to format."
            exit 0
          fi
          dart format "${files[@]}"

      - name: Upload formatted Dart files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-dart-files
          path: |
            lib/features/admin/data/admin_repository.dart
            /tmp/formatted-files.txt
          if-no-files-found: error

      - name: Fail if formatting changed files
        shell: bash
        run: git diff --exit-code -- '*.dart'

      - name: Analyze
        shell: bash
        run: |
          set -o pipefail
          flutter analyze --fatal-infos 2>&1 | tee analyze.log

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web
        shell: bash
        run: |
          set -o pipefail
          flutter build web --release --base-href "/AS-Grinta/" --pwa-strategy=none 2>&1 | tee build-web.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-validation-logs
          path: |
            analyze.log
            test.log
            build-web.log
          if-no-files-found: warn
