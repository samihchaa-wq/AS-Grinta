name: Apply sports UX patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'ux/home-sports-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Apply patch
        run: python .github/scripts/apply_sports_ux.py
      - name: Format
        run: |
          flutter pub get
          dart format \
            lib/features/home/data/home_repository.dart \
            lib/features/home/presentation/accueil_page.dart \
            lib/features/home/presentation/home_sports_flow_blocks.dart \
            lib/features/matches/presentation/match_details_page.dart \
            lib/features/sports_management/domain/match_composition.dart \
            lib/features/sports_management/presentation/sport_motm_vote_page.dart \
            lib/features/sports_management/presentation/widgets/match_availability_selector.dart
      - name: Commit final patch
        run: |
          git checkout origin/main -- .github/workflows/flutter_ci.yml
          rm -f .github/scripts/apply_sports_ux.py patch_failure.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "feat: simplifier l’accueil et automatiser le parcours sportif"
          git push origin HEAD:${{ github.head_ref }}
