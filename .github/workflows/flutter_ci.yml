name: Flutter CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/exact-player-gauges-h2h-colors
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Apply remaining corrections, format and push
        shell: python
        run: |
          from pathlib import Path

          chip_import = "import 'package:as_grinta/features/matches/presentation/widgets/match_result_score_chip.dart';\n"

          upcoming = Path('lib/features/matches/presentation/upcoming_match_prediction_page.dart')
          text = upcoming.read_text()
          anchor = "import 'package:as_grinta/features/matches/data/match_details_repository.dart';\n"
          if chip_import not in text:
              text = text.replace(anchor, anchor + chip_import, 1)
          old = """              final result = grinta > opponent
                  ? const Color(0xFF39E784)
                  : grinta == opponent
                      ? const Color(0xFFFFC84D)
                      : const Color(0xFFFF6B6B);

              return Container(
                padding: const EdgeInsets.symmetric(
                  horizontal: 12,
                  vertical: 9,
                ),
                decoration: BoxDecoration(
                  color: Colors.white.withValues(alpha: .035),
                  borderRadius: BorderRadius.circular(12),
                  border: Border.all(color: AppTheme.outline),
                ),
                child: Row(
                  mainAxisSize: MainAxisSize.min,
                  children: [
                    Text(
                      '$grinta–$opponent',
                      style: const TextStyle(fontWeight: FontWeight.w800),
                    ),
                    const SizedBox(width: 8),
                    Container(
                      width: 7,
                      height: 7,
                      decoration: BoxDecoration(
                        color: result,
                        shape: BoxShape.circle,
                      ),
                    ),
                  ],
                ),
              );
"""
          new = """              return MatchResultScoreChip(
                scoreGrinta: grinta,
                scoreOpponent: opponent,
              );
"""
          if old in text:
              text = text.replace(old, new, 1)
          upcoming.write_text(text)

          premium = Path('lib/features/predictions/presentation/widgets/premium_season_gauges.dart')
          text = premium.read_text()
          old = """          Text(
            'Tous les pronostics (${predictions.length})',
            style: Theme.of(
              context,
            ).textTheme.headlineSmall?.copyWith(fontWeight: FontWeight.w900),
          ),
          const SizedBox(height: 12),
"""
          if old in text:
              text = text.replace(old, '', 1)
          premium.write_text(text)
      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart'
          )
          dart format "${files[@]}"
          git checkout origin/main -- .github/workflows/flutter_ci.yml
          if git diff --quiet && git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib .github/workflows/flutter_ci.yml
          git commit -m "chore: finalize remaining score colors and copy cleanup"
          git push origin HEAD:fix/exact-player-gauges-h2h-colors

      - name: Read application version
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk '/^version:/{print $2}' pubspec.yaml)
          test -n "$version"
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Analyze
        shell: bash
        run: |
          set -o pipefail
          flutter analyze --fatal-infos 2>&1 | tee analyze.log

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web
        shell: bash
        run: |
          set -o pipefail
          flutter build web \
            --release \
            --base-href "/AS-Grinta/" \
            --pwa-strategy=none \
            --dart-define-from-file=config/production.json \
            --dart-define=APP_VERSION="$APP_VERSION" \
            2>&1 | tee build-web.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-validation-logs
          path: |
            analyze.log
            test.log
            build-web.log
          if-no-files-found: warn
