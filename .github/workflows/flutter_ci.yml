name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        shell: bash
        run: |
          set -o pipefail
          # Les erreurs et avertissements restent bloquants. Les simples informations
          # de dépréciation sont conservées dans le rapport sans faire échouer la CI.
          flutter analyze --no-fatal-infos 2>&1 | tee analyze.log

      - name: Test
        if: always()
        shell: bash
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-validation-logs
          path: |
            analyze.log
            test.log
          if-no-files-found: warn
