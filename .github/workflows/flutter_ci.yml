name: Flutter CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/remove-last-all-predictions-heading
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Remove final redundant heading, format and push
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/features/predictions/presentation/season_predictions_page.dart')
          text = path.read_text()
          old = """        Text(
          'Tous les pronostics (${predictions.length})',
          style: Theme.of(
            context,
          ).textTheme.titleLarge?.copyWith(fontWeight: FontWeight.w900),
        ),
        const SizedBox(height: 10),
"""
          if old not in text:
              raise SystemExit('Final redundant heading not found')
          path.write_text(text.replace(old, '', 1))
      - name: Format and restore workflow
        shell: bash
        run: |
          set -euo pipefail
          dart format lib/features/predictions/presentation/season_predictions_page.dart
          git checkout origin/main -- .github/workflows/flutter_ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/predictions/presentation/season_predictions_page.dart .github/workflows/flutter_ci.yml
          git commit -m "fix: remove final redundant predictions heading"
          git push origin HEAD:fix/remove-last-all-predictions-heading

      - name: Read application version
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk '/^version:/{print $2}' pubspec.yaml)
          test -n "$version"
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

      - name: Build web
        run: |
          flutter build web \
            --release \
            --base-href "/AS-Grinta/" \
            --pwa-strategy=none \
            --dart-define-from-file=config/production.json \
            --dart-define=APP_VERSION="$APP_VERSION"
