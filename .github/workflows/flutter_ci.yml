name: Remove stale home ranking refresh

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'ux/home-sports-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Remove stale provider refresh
        shell: python
        run: |
          from pathlib import Path
          path = Path('lib/features/home/presentation/accueil_page.dart')
          text = path.read_text()
          old = '            ..invalidate(leaderboardProvider)\n'
          if old not in text:
              raise SystemExit('leaderboard refresh not found')
          path.write_text(text.replace(old, '', 1))
      - name: Format and commit
        run: |
          flutter pub get
          dart format lib/features/home/presentation/accueil_page.dart
          git checkout origin/main -- .github/workflows/flutter_ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/flutter_ci.yml lib/features/home/presentation/accueil_page.dart
          git commit -m "fix: retirer le rafraîchissement du classement accueil"
          git push origin HEAD:${{ github.head_ref }}
