name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout live squad branch
        uses: actions/checkout@v4
        with:
          ref: feat/live-squad-and-formations
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare and format implementation
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- \
            analysis_options.yaml \
            lib/features/auth/presentation/forced_password_change_page.dart \
            lib/features/players/data/roster_repository.dart \
            lib/features/players/presentation/players_registry_page.dart \
            lib/features/preferences/data/preferences_repository.dart
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/sports_management/presentation/admin_squad_plan_page.dart')
          text = path.read_text()
          text = text.replace(
              """        if (player.convocationStatus == wanted && player.manualOverride)
          continue;
""",
              """        if (player.convocationStatus == wanted && player.manualOverride) {
          continue;
        }
""",
          )
          text = text.replace(
              """    if (_matches.isEmpty)
      return const Center(child: Text('Aucun match à venir.'));
""",
              """    if (_matches.isEmpty) {
      return const Center(child: Text('Aucun match à venir.'));
    }
""",
          )
          text = text.replace('    if (newIndex > oldIndex) newIndex -= 1;\n', '')
          text = text.replace('onReorder: _reorderBench,', 'onReorderItem: _reorderBench,')
          path.write_text(text)
          PY
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main -- '*.dart')
          dart format "${files[@]}"

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

      - name: Build web
        run: |
          version=$(awk '/^version:/{print $2}' pubspec.yaml)
          flutter build web \
            --release \
            --base-href "/AS-Grinta/" \
            --pwa-strategy=none \
            --no-web-resources-cdn \
            --dart-define-from-file=config/production.json \
            --dart-define=APP_VERSION="$version"

      - name: Commit formatted implementation
        shell: bash
        run: |
          set -euo pipefail
          git show 3ef14b4d56ba22ec57c5a74c45a59400babd7fd5:.github/workflows/flutter_ci.yml > .github/workflows/flutter_ci.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No formatting commit required.'
          else
            git commit -m 'Finaliser la refonte effectif et composition'
            git push origin HEAD:feat/live-squad-and-formations
          fi
