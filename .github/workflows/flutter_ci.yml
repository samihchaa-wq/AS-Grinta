name: Update sports UX tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'ux/home-sports-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Update tests
        shell: python
        run: |
          from pathlib import Path

          availability = Path('test/match_availability_selector_test.dart')
          text = availability.read_text()
          old = """  testWidgets('records Absent with an optional private reason', (tester) async {
    final repository = _FakeAvailabilityRepository();
    await tester.pumpWidget(_harness(repository));
    await tester.pumpAndSettle();

    await tester.tap(find.widgetWithText(OutlinedButton, 'Absent'));
    await tester.pumpAndSettle();
    expect(find.text('Signaler ton absence'), findsOneWidget);

    await tester.enterText(
      find.byType(TextFormField),
      'Déplacement professionnel',
    );
    await tester.tap(
      find.widgetWithText(FilledButton, 'Confirmer mon absence'),
    );
    await tester.pumpAndSettle();

    expect(repository.lastStatus, MatchAvailabilityStatus.absent);
    expect(repository.lastComment, 'Déplacement professionnel');
  });"""
          new = """  testWidgets('records Absent immediately without a private reason', (
    tester,
  ) async {
    final repository = _FakeAvailabilityRepository();
    await tester.pumpWidget(_harness(repository));
    await tester.pumpAndSettle();

    await tester.tap(find.widgetWithText(OutlinedButton, 'Absent'));
    await tester.pumpAndSettle();

    expect(find.text('Signaler ton absence'), findsNothing);
    expect(repository.lastStatus, MatchAvailabilityStatus.absent);
    expect(repository.lastComment, isNull);
    expect(find.text('Absent enregistré.'), findsOneWidget);
  });"""
          if old not in text:
              raise SystemExit('availability test block not found')
          availability.write_text(text.replace(old, new, 1))

          composition = Path('test/match_composition_model_test.dart')
          text = composition.read_text()
          old = "expect(guest.displayName, 'Alex Gardien (Invité)');"
          new = "expect(guest.displayName, 'Alex');"
          if old not in text:
              raise SystemExit('composition expectation not found')
          composition.write_text(text.replace(old, new, 1))
      - name: Format and commit
        run: |
          flutter pub get
          dart format \
            test/match_availability_selector_test.dart \
            test/match_composition_model_test.dart
          git checkout origin/main -- .github/workflows/flutter_ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            .github/workflows/flutter_ci.yml \
            test/match_availability_selector_test.dart \
            test/match_composition_model_test.dart
          git commit -m "test: aligner le parcours sportif simplifié"
          git push origin HEAD:${{ github.head_ref }}
