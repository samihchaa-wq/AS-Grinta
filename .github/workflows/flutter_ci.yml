name: Export validated migration

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/export-live-migration
      - uses: actions/upload-artifact@v4
        with:
          name: live-effectif-migration
          path: supabase/migrations/20260722010000_live_effectif_and_composition.sql
          if-no-files-found: error
