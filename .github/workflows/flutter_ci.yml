name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format changed Dart file
        run: dart format lib/features/predictions/presentation/widgets/premium_season_gauges.dart

      - name: Upload formatted Dart file
        uses: actions/upload-artifact@v4
        with:
          name: formatted-prediction-distance-file
          path: lib/features/predictions/presentation/widgets/premium_season_gauges.dart
          if-no-files-found: error

      - name: Analyze
        shell: bash
        run: |
          set -o pipefail
          flutter analyze --fatal-infos 2>&1 | tee analyze.log

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web
        shell: bash
        run: |
          set -o pipefail
          flutter build web --release --base-href "/AS-Grinta/" --pwa-strategy=none 2>&1 | tee build-web.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-validation-logs
          path: |
            analyze.log
            test.log
            build-web.log
          if-no-files-found: warn
