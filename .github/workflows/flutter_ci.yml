name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read application version
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk '/^version:/{print $2}' pubspec.yaml)
          test -n "$version"
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base...HEAD" -- '*.dart')
          if [ "${#files[@]}" -gt 0 ]; then
            dart format "${files[@]}"
          fi

      - name: Commit formatting and restore CI
        shell: bash
        run: |
          set -euo pipefail
          git checkout "origin/${{ github.base_ref }}" -- .github/workflows/flutter_ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: format navigation tests"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

      - name: Analyze
        shell: bash
        run: |
          set -o pipefail
          flutter analyze --fatal-infos 2>&1 | tee analyze.log

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web
        shell: bash
        run: |
          set -o pipefail
          flutter build web \
            --release \
            --base-href "/AS-Grinta/" \
            --pwa-strategy=none \
            --no-web-resources-cdn \
            --dart-define-from-file=config/production.json \
            --dart-define=APP_VERSION="$APP_VERSION" \
            2>&1 | tee build-web.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-validation-logs
          path: |
            analyze.log
            test.log
            build-web.log
          if-no-files-found: warn
