name: Apply sports UX patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'ux/home-sports-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply requested changes
        shell: python
        run: |
          from pathlib import Path
          import re

          def replace_once(path, old, new, label):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'Block not found: {label} in {path}')
              file.write_text(text.replace(old, new, 1))

          def regex_once(path, pattern, replacement, label):
              file = Path(path)
              text = file.read_text()
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'Regex block not found: {label} in {path}')
              file.write_text(updated)

          # Home repository: expose the exact score predicted for the next match.
          replace_once(
              'lib/features/home/data/home_repository.dart',
              """class RecentMeeting {
            const RecentMeeting({
              required this.date,
              required this.grintaScore,
              required this.opponentScore,
            });

            final DateTime date;
            final int grintaScore;
            final int opponentScore;

            bool get isWin => grintaScore > opponentScore;
            bool get isDraw => grintaScore == opponentScore;
          }

          /// Un match mis en avant sur l'accueil (prochain ou dernier joué).""",
              """class RecentMeeting {
            const RecentMeeting({
              required this.date,
              required this.grintaScore,
              required this.opponentScore,
            });

            final DateTime date;
            final int grintaScore;
            final int opponentScore;

            bool get isWin => grintaScore > opponentScore;
            bool get isDraw => grintaScore == opponentScore;
          }

          class HomePrediction {
            const HomePrediction({
              required this.grintaScore,
              required this.opponentScore,
              required this.useX2,
            });

            final int grintaScore;
            final int opponentScore;
            final bool useX2;
          }

          /// Un match mis en avant sur l'accueil (prochain ou dernier joué).""",
              'home prediction model',
          )
          replace_once(
              'lib/features/home/data/home_repository.dart',
              """    required this.recentMeetings,
            required this.nextMatchPredicted,
          });""",
              """    required this.recentMeetings,
            required this.nextMatchPredicted,
            required this.nextMatchPrediction,
          });""",
              'home dashboard constructor',
          )
          replace_once(
              'lib/features/home/data/home_repository.dart',
              """  /// La personne a-t-elle déjà rempli son prono pour le prochain match ?
            final bool nextMatchPredicted;
          }""",
              """  /// La personne a-t-elle déjà rempli son prono pour le prochain match ?
            final bool nextMatchPredicted;

            /// Score pronostiqué sur le prochain match, lorsqu'il est rempli.
            final HomePrediction? nextMatchPrediction;
          }""",
              'home dashboard field',
          )
          replace_once(
              'lib/features/home/data/home_repository.dart',
              ".select('match_id, is_filled')",
              ".select(\n          'match_id, is_filled, predicted_score_as_grinta, '\n          'predicted_score_adverse, use_x2',\n        )",
              'home predictions select',
          )
          replace_once(
              'lib/features/home/data/home_repository.dart',
              """    final filledByMatch = <String, bool>{};
            for (final row in predictions as List) {
              final map = Map<String, dynamic>.from(row);
              filledByMatch[map['match_id'].toString()] = map['is_filled'] == true;
            }""",
              """    final filledByMatch = <String, bool>{};
            final predictionByMatch = <String, HomePrediction>{};
            for (final row in predictions as List) {
              final map = Map<String, dynamic>.from(row);
              final matchId = map['match_id'].toString();
              final filled = map['is_filled'] == true;
              filledByMatch[matchId] = filled;
              if (filled) {
                predictionByMatch[matchId] = HomePrediction(
                  grintaScore:
                      (map['predicted_score_as_grinta'] as num?)?.toInt() ?? 0,
                  opponentScore:
                      (map['predicted_score_adverse'] as num?)?.toInt() ?? 0,
                  useX2: map['use_x2'] == true,
                );
              }
            }""",
              'home prediction mapping',
          )
          replace_once(
              'lib/features/home/data/home_repository.dart',
              """      nextMatchPredicted:
                  nextMatch != null && filledByMatch[nextMatch.id] == true,
            );""",
              """      nextMatchPredicted:
                  nextMatch != null && filledByMatch[nextMatch.id] == true,
              nextMatchPrediction:
                  nextMatch == null ? null : predictionByMatch[nextMatch.id],
            );""",
              'home dashboard return',
          )

          # Home page: vote first, no rankings/countdown/odds, compact prediction state.
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              "import 'dart:async';\n\n",
              '',
              'remove timer import',
          )
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              """          children: const [
                    _NextMatchBlock(),""",
              """          children: const [
                    HomeLastMatchVoteBlock(),
                    _NextMatchBlock(),""",
              'home vote first',
          )
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              """            HomeSportsFlowBlocks(),
                    _MyRankingsBlock(),
                    SizedBox(height: 18),
                    _RecentBadgesBlock(),""",
              """            HomeSportsFlowBlocks(),
                    _RecentBadgesBlock(),""",
              'remove home rankings',
          )
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              """              predicted: data.nextMatchPredicted,
                      participants: data.predictionParticipantCount,""",
              """              predicted: data.nextMatchPredicted,
                      prediction: data.nextMatchPrediction,
                      participants: data.predictionParticipantCount,""",
              'pass home prediction',
          )
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              """    required this.predicted,
              required this.participants,
            });""",
              """    required this.predicted,
              required this.prediction,
              required this.participants,
            });""",
              'next card constructor',
          )
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              """  final bool predicted;
            final int participants;""",
              """  final bool predicted;
            final HomePrediction? prediction;
            final int participants;""",
              'next card prediction field',
          )
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              """    final open = !match.predictionsClosed &&
                  closeAt != null &&
                  DateTime.now().isBefore(closeAt);

              return Card(""",
              """    final open = !match.predictionsClosed &&
                  closeAt != null &&
                  DateTime.now().isBefore(closeAt);
              final predictionScore = prediction == null
                  ? null
                  : match.isHome
                      ? '${prediction!.grintaScore} – ${prediction!.opponentScore}'
                      : '${prediction!.opponentScore} – ${prediction!.grintaScore}';

              return Card(""",
              'prediction score label',
          )
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              """              if (closeAt != null && !match.predictionsClosed) ...[
                        const SizedBox(height: 10),
                        _PronoCountdown(closeAt: closeAt),
                      ],
              """,
              '',
              'remove countdown widget usage',
          )
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              """              if (match.hasOdds) ...[
                        const SizedBox(height: 14),
                        Row(
                          children: [
                            _OddsChip(label: 'V', value: match.oddsWin),
                            const SizedBox(width: 8),
                            _OddsChip(label: 'N', value: match.oddsDraw),
                            const SizedBox(width: 8),
                            _OddsChip(label: 'D', value: match.oddsLoss),
                          ],
                        ),
                      ],
              """,
              '',
              'remove home odds',
          )
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              """              const SizedBox(height: 16),
                      Row(
                        children: [
                          Icon(
                            predicted ? Icons.check_circle : Icons.sports_soccer,
                            size: 18,
                            color: predicted ? const Color(0xFF52D08A) : Colors.white,
                          ),
                          const SizedBox(width: 8),
                          Expanded(
                            child: Text(
                              predicted
                                  ? 'Pari enregistré'
                                  : open
                                      ? 'Tu n\\'as pas encore parié'
                                      : 'Pronostics fermés',
                              style: TextStyle(
                                fontWeight: FontWeight.w800,
                                color:
                                    predicted ? const Color(0xFF52D08A) : Colors.white,
                              ),
                            ),
                          ),
                          if (open)
                            FilledButton(
                              onPressed: () =>
                                  context.push('/matches/${match.id}/prediction'),
                              child: Text(predicted ? 'Modifier' : 'Parier'),
                            ),
                        ],
                      ),""",
              """              const SizedBox(height: 16),
                      Container(
                        padding: const EdgeInsets.all(12),
                        decoration: BoxDecoration(
                          color: const Color(0xFF160B36),
                          borderRadius: BorderRadius.circular(14),
                          border: Border.all(color: const Color(0xFF3F2A73)),
                        ),
                        child: Row(
                          children: [
                            Icon(
                              predicted ? Icons.check_circle : Icons.sports_soccer,
                              size: 18,
                              color: predicted
                                  ? const Color(0xFF52D08A)
                                  : Colors.white,
                            ),
                            const SizedBox(width: 8),
                            Expanded(
                              child: Text(
                                predicted && predictionScore != null
                                    ? 'Ton prono : $predictionScore'
                                        '${prediction!.useX2 ? ' · ×2' : ''}'
                                    : open
                                        ? 'Tu n\\'as pas encore parié'
                                        : 'Pronostics fermés',
                                style: TextStyle(
                                  fontWeight: FontWeight.w800,
                                  color: predicted
                                      ? const Color(0xFF52D08A)
                                      : Colors.white,
                                ),
                              ),
                            ),
                            if (open)
                              FilledButton(
                                onPressed: () =>
                                    context.push('/matches/${match.id}/prediction'),
                                child: Text(predicted ? 'Modifier' : 'Parier'),
                              ),
                          ],
                        ),
                      ),""",
              'compact prediction panel',
          )
          regex_once(
              'lib/features/home/presentation/accueil_page.dart',
              r"/// Compte à rebours jusqu'à la clôture des pronos.*?class _MeetingDot",
              'class _MeetingDot',
              'remove countdown and odds classes',
          )

          # Home sports flow: dedicated top-of-home last match vote; composition stays below last prono.
          Path('lib/features/home/presentation/home_sports_flow_blocks.dart').write_text("""import 'package:as_grinta/features/feature_flags/presentation/feature_flags_controller.dart';
          import 'package:as_grinta/features/home/data/home_repository.dart';
          import 'package:as_grinta/features/sports_management/data/match_composition_repository.dart';
          import 'package:as_grinta/features/sports_management/data/sport_motm_vote_repository.dart';
          import 'package:as_grinta/features/sports_management/presentation/match_lineup_page.dart';
          import 'package:as_grinta/features/sports_management/presentation/sport_motm_vote_page.dart';
          import 'package:flutter/material.dart';
          import 'package:flutter_riverpod/flutter_riverpod.dart';

          class HomeLastMatchVoteBlock extends ConsumerWidget {
            const HomeLastMatchVoteBlock({super.key});

            @override
            Widget build(BuildContext context, WidgetRef ref) {
              if (!ref.watch(sportsManagementEnabledProvider)) {
                return const SizedBox.shrink();
              }

              final dashboardAsync = ref.watch(homeDashboardProvider);
              return dashboardAsync.maybeWhen(
                data: (dashboard) {
                  final lastMatch = dashboard.lastMatch;
                  if (lastMatch == null) return const SizedBox.shrink();
                  final voteAsync = ref.watch(sportMotmVoteProvider(lastMatch.id));
                  final vote = voteAsync.maybeWhen(
                    data: (value) => value,
                    orElse: () => null,
                  );
                  if (vote == null || !vote.isOpen || !vote.isEligibleVoter) {
                    return const SizedBox.shrink();
                  }
                  return const Column(
                    crossAxisAlignment: CrossAxisAlignment.stretch,
                    children: [
                      _HomeSportHeader('🗳️', 'Dernier match'),
                      _LastMatchVoteCard(),
                      SizedBox(height: 18),
                    ],
                  );
                },
                orElse: () => const SizedBox.shrink(),
              );
            }
          }

          class _LastMatchVoteCard extends ConsumerWidget {
            const _LastMatchVoteCard();

            @override
            Widget build(BuildContext context, WidgetRef ref) {
              final dashboard = ref.watch(homeDashboardProvider).valueOrNull;
              final matchId = dashboard?.lastMatch?.id;
              if (matchId == null) return const SizedBox.shrink();
              return MatchMotmVoteCard(matchId: matchId);
            }
          }

          class HomeSportsFlowBlocks extends ConsumerWidget {
            const HomeSportsFlowBlocks({super.key});

            @override
            Widget build(BuildContext context, WidgetRef ref) {
              if (!ref.watch(sportsManagementEnabledProvider)) {
                return const SizedBox.shrink();
              }

              final dashboardAsync = ref.watch(homeDashboardProvider);
              return dashboardAsync.maybeWhen(
                data: (dashboard) {
                  final nextMatch = dashboard.nextMatch;
                  if (nextMatch == null ||
                      nextMatch.kickoffAt == null ||
                      !DateTime.now().isBefore(nextMatch.kickoffAt!)) {
                    return const SizedBox.shrink();
                  }
                  final lineupAsync = ref.watch(
                    publishedMatchCompositionProvider(nextMatch.id),
                  );
                  final composition = lineupAsync.maybeWhen(
                    data: (value) => value,
                    orElse: () => null,
                  );
                  if (composition == null) return const SizedBox.shrink();
                  return Column(
                    crossAxisAlignment: CrossAxisAlignment.stretch,
                    children: [
                      const _HomeSportHeader('📋', 'Composition d’équipe'),
                      PublishedLineupCard(
                        matchId: nextMatch.id,
                        showAvailabilityFlow: false,
                        bottomSpacing: 18,
                      ),
                    ],
                  );
                },
                orElse: () => const SizedBox.shrink(),
              );
            }
          }

          class _HomeSportHeader extends StatelessWidget {
            const _HomeSportHeader(this.emoji, this.title);

            final String emoji;
            final String title;

            @override
            Widget build(BuildContext context) {
              return Padding(
                padding: const EdgeInsets.only(bottom: 10),
                child: Row(
                  children: [
                    Text(emoji, style: const TextStyle(fontSize: 18)),
                    const SizedBox(width: 8),
                    Expanded(
                      child: Text(
                        title,
                        style: Theme.of(context)
                            .textTheme
                            .titleMedium
                            ?.copyWith(fontWeight: FontWeight.w800),
                      ),
                    ),
                  ],
                ),
              );
            }
          }
          """)

          # Absence: one tap, no confirmation and no justification dialog.
          replace_once(
              'lib/features/sports_management/presentation/widgets/match_availability_selector.dart',
              'onAbsent: () => _chooseAbsent(value),',
              'onAbsent: () => _save(value, MatchAvailabilityStatus.absent),',
              'direct absent action',
          )
          regex_once(
              'lib/features/sports_management/presentation/widgets/match_availability_selector.dart',
              r"  Future<void> _chooseAbsent\(MatchAvailability availability\) async \{.*?\n  \}\n\n  Future<void> _save",
              '  Future<void> _save',
              'remove absent dialog',
          )

          # Match detail: no separate admin HDM monitoring section.
          replace_once(
              'lib/features/matches/presentation/match_details_page.dart',
              """                if (isAdmin && sportsEnabled) ...[
                    const SizedBox(height: 16),
                    _SportsManagementSection(
                      matchId: matchId,
                      actions: const [
                        _SportAction(
                          'Suivi des votes HDM',
                          Icons.how_to_vote_outlined,
                          'motm',
                        ),
                      ],
                    ),
                  ],
          """,
              '',
              'remove admin hdm tracking',
          )

          # Vote page: remove all admin restart/cancel controls.
          replace_once(
              'lib/features/sports_management/presentation/sport_motm_vote_page.dart',
              "import 'package:as_grinta/features/auth/domain/auth_profile.dart';\n",
              '',
              'remove auth profile import',
          )
          replace_once(
              'lib/features/sports_management/presentation/sport_motm_vote_page.dart',
              "import 'package:as_grinta/features/auth/presentation/auth_state.dart';\n",
              '',
              'remove auth state import',
          )
          regex_once(
              'lib/features/sports_management/presentation/sport_motm_vote_page.dart',
              r"  Future<String\?> _askReason\(String title\) async \{.*?\n  \}\n\n  @override",
              '  @override',
              'remove admin hdm actions',
          )
          replace_once(
              'lib/features/sports_management/presentation/sport_motm_vote_page.dart',
              """    final voteAsync = ref.watch(sportMotmVoteProvider(widget.matchId));
              final isAdmin =
                  ref.watch(authControllerProvider).profile?.role == AuthRole.admin;

              return Scaffold(
                appBar: GrintaAppBar(
                  title: const Text('Homme du match'),
                  actions: [
                    if (isAdmin)
                      PopupMenuButton<String>(
                        enabled: !_isSubmitting,
                        onSelected: (value) => _adminAction(restart: value == 'restart'),
                        itemBuilder: (context) => const [
                          PopupMenuItem(
                            value: 'restart',
                            child: Text('Relancer pour 24 h'),
                          ),
                          PopupMenuItem(
                            value: 'cancel',
                            child: Text('Annuler le scrutin'),
                          ),
                        ],
                      ),
                  ],
                ),""",
              """    final voteAsync = ref.watch(sportMotmVoteProvider(widget.matchId));

              return Scaffold(
                appBar: GrintaAppBar(title: const Text('Homme du match')),""",
              'remove hdm admin menu',
          )

          # Composition: first names only in admin and published lineup.
          replace_once(
              'lib/features/sports_management/domain/match_composition.dart',
              "import 'package:as_grinta/features/sports_management/domain/sport_waitlist_models.dart';\n\n",
              """import 'package:as_grinta/features/sports_management/domain/sport_waitlist_models.dart';

          String _firstName(String value) {
            final trimmed = value.trim();
            if (trimmed.isEmpty) return value;
            return trimmed.split(RegExp(r'\\s+')).first;
          }

          """,
              'composition first name helper',
          )
          replace_once(
              'lib/features/sports_management/domain/match_composition.dart',
              "displayName: (json['display_name'] ?? 'Joueur').toString(),",
              "displayName: _firstName((json['display_name'] ?? 'Joueur').toString()),",
              'composition rpc first name',
          )
          replace_once(
              'lib/features/sports_management/domain/match_composition.dart',
              'displayName: player.displayName,',
              'displayName: _firstName(player.displayName),',
              'composition initial first name',
          )

          # Force the new UI through the PWA cache.
          for path in ['web/index.html', 'web/sw.js']:
              file = Path(path)
              text = file.read_text()
              if 'v59' not in text:
                  raise SystemExit(f'Expected v59 in {path}')
              file.write_text(text.replace('v59', 'v60'))

      - name: Format changed Dart files
        run: |
          flutter pub get
          dart format \
            lib/features/home/data/home_repository.dart \
            lib/features/home/presentation/accueil_page.dart \
            lib/features/home/presentation/home_sports_flow_blocks.dart \
            lib/features/matches/presentation/match_details_page.dart \
            lib/features/sports_management/domain/match_composition.dart \
            lib/features/sports_management/presentation/sport_motm_vote_page.dart \
            lib/features/sports_management/presentation/widgets/match_availability_selector.dart

      - name: Restore strict workflow and commit
        run: |
          git checkout origin/main -- .github/workflows/flutter_ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            .github/workflows/flutter_ci.yml \
            lib/features/home/data/home_repository.dart \
            lib/features/home/presentation/accueil_page.dart \
            lib/features/home/presentation/home_sports_flow_blocks.dart \
            lib/features/matches/presentation/match_details_page.dart \
            lib/features/sports_management/domain/match_composition.dart \
            lib/features/sports_management/presentation/sport_motm_vote_page.dart \
            lib/features/sports_management/presentation/widgets/match_availability_selector.dart \
            web/index.html \
            web/sw.js
          git commit -m "feat: simplifier l’accueil et automatiser le parcours sportif"
          git push origin HEAD:${{ github.head_ref }}
