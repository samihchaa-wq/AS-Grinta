name: Remove match bet title

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/remove-match-bet-title'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove title
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/features/matches/presentation/upcoming_match_prediction_page.dart')
          text = path.read_text()
          old = "appBar: GrintaAppBar(title: const Text('Ton pari'))"
          new = "appBar: GrintaAppBar(title: const SizedBox.shrink())"
          if old not in text:
              raise SystemExit('Ton pari title not found')
          path.write_text(text.replace(old, new, 1))

      - name: Commit change
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/remove_match_bet_title.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/matches/presentation/upcoming_match_prediction_page.dart .github/workflows/remove_match_bet_title.yml
          git commit -m "Retirer le titre Ton pari de la fiche match"
          git push
