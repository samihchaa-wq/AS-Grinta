name: Temporary PR 172 cleanup

on:
  push:
    branches: [main]

# Activation marker: remove-final-predictions-heading
permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/remove-last-all-predictions-heading
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Remove final redundant heading
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/features/predictions/presentation/season_predictions_page.dart')
          text = path.read_text()
          old = """        Text(
          'Tous les pronostics (${predictions.length})',
          style: Theme.of(
            context,
          ).textTheme.titleLarge?.copyWith(fontWeight: FontWeight.w900),
        ),
        const SizedBox(height: 10),
"""
          if old in text:
              text = text.replace(old, '', 1)
          path.write_text(text)
      - run: flutter pub get
      - name: Format and clean branch
        shell: bash
        run: |
          set -euo pipefail
          dart format lib/features/predictions/presentation/season_predictions_page.dart
          git checkout origin/main -- .github/workflows/flutter_ci.yml
          rm -f .github/pr172-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix: remove final redundant predictions heading"
          git push origin HEAD:fix/remove-last-all-predictions-heading
