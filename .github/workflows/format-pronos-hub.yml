name: Format pronos hub

on:
  push:
    branches: [fix/rename-season-tab-to-buteur]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Format and clean
        shell: bash
        run: |
          set -euo pipefail
          dart format lib/features/predictions/presentation/pronos_hub_page.dart
          rm -f .github/workflows/format-pronos-hub.yml
          rm -f .github/format-pronos-hub-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style(ui): format pronos hub"
          git push origin HEAD:fix/rename-season-tab-to-buteur
