name: Apply prediction distance sort

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/sort-player-predictions-by-distance
          fetch-depth: 0

      - name: Patch sorting and ranks
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('lib/features/predictions/presentation/widgets/premium_season_gauges.dart')
          text = path.read_text()

          text, sort_count = re.subn(
              r"    final predictions = \[\.\.\.gauge\.predictions\]\n"
              r"      \.\.sort\(\(a, b\) \{\n"
              r".*?"
              r"      \}\);\n",
              """    final predictions = [...gauge.predictions]
      ..sort((a, b) {
        final aDistance = (a.value - gauge.actual).abs();
        final bDistance = (b.value - gauge.actual).abs();
        final byDistance = aDistance.compareTo(bDistance);
        if (byDistance != 0) return byDistance;

        final byValue = a.value.compareTo(b.value);
        if (byValue != 0) return byValue;

        return a.predictorName.toLowerCase().compareTo(
              b.predictorName.toLowerCase(),
            );
      });
""",
              text,
              count=1,
              flags=re.S,
          )

          text, call_count = re.subn(
              r"                    rank: _rankFor\(predictions, index\),",
              """                    rank: _rankFor(
                      predictions,
                      index,
                      gauge.actual,
                    ),""",
              text,
              count=1,
          )

          text, rank_count = re.subn(
              r"  int _rankFor\(List<GaugePrediction> predictions, int index\) \{\n"
              r".*?"
              r"  \}\n",
              """  int _rankFor(
    List<GaugePrediction> predictions,
    int index,
    int actual,
  ) {
    if (index == 0) return 1;

    final currentDistance = (predictions[index].value - actual).abs();
    final previousDistance = (predictions[index - 1].value - actual).abs();
    if (currentDistance == previousDistance) {
      return _rankFor(predictions, index - 1, actual);
    }
    return index + 1;
  }
""",
              text,
              count=1,
              flags=re.S,
          )

          if (sort_count, call_count, rank_count) != (1, 1, 1):
            raise SystemExit(
                f'Unexpected replacement counts: {(sort_count, call_count, rank_count)}'
            )

          path.write_text(text)
          Path('.github/workflows/apply_prediction_distance_sort.yml').unlink()

      - name: Format
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: dart format lib/features/predictions/presentation/widgets/premium_season_gauges.dart

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/predictions/presentation/widgets/premium_season_gauges.dart .github/workflows/apply_prediction_distance_sort.yml
          git commit -m "fix(predictions): sort by distance from current total"
          git push origin HEAD:fix/sort-player-predictions-by-distance
