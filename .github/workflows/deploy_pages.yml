name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Flutter Web
        run: flutter build web --release --base-href "/AS-Grinta/" --pwa-strategy=none

      - name: Add SPA fallback
        run: cp build/web/index.html build/web/404.html

      - name: Validate generated assets
        shell: bash
        run: |
          set -euo pipefail
          test -s build/web/index.html
          test -s build/web/flutter_bootstrap.js
          test -s build/web/main.dart.js
          grep -q '/AS-Grinta/' build/web/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify public site
        shell: bash
        run: |
          set -euo pipefail
          base='https://samihchaa-wq.github.io/AS-Grinta/'
          for attempt in 1 2 3 4 5 6; do
            index_code=$(curl -L -sS -o /tmp/index.html -w '%{http_code}' "${base}?audit=${GITHUB_SHA}")
            bootstrap_code=$(curl -L -sS -o /tmp/flutter_bootstrap.js -w '%{http_code}' "${base}flutter_bootstrap.js?audit=${GITHUB_SHA}")
            main_code=$(curl -L -sS -o /tmp/main.dart.js -w '%{http_code}' "${base}main.dart.js?audit=${GITHUB_SHA}")
            if [[ "$index_code" == '200' && "$bootstrap_code" == '200' && "$main_code" == '200' ]] \
              && [[ -s /tmp/index.html && -s /tmp/flutter_bootstrap.js && -s /tmp/main.dart.js ]]; then
              grep -q 'flutter_bootstrap.js' /tmp/index.html
              exit 0
            fi
            sleep 10
          done
          echo 'Le site ou un fichier Flutter essentiel n’est pas accessible.' >&2
          exit 1
