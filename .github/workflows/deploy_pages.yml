name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Flutter Web
        run: flutter build web --release --base-href "/AS-Grinta/" --pwa-strategy=none

      - name: Add SPA fallback
        run: cp build/web/index.html build/web/404.html

      - name: Validate generated assets
        shell: bash
        run: |
          set -euo pipefail
          test -s build/web/index.html
          test -s build/web/flutter_bootstrap.js
          test -s build/web/main.dart.js
          grep -q '/AS-Grinta/' build/web/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify public files
        shell: bash
        run: |
          set -euo pipefail
          base='https://samihchaa-wq.github.io/AS-Grinta/'
          for attempt in 1 2 3 4 5 6; do
            index_code=$(curl -L -sS -o /tmp/index.html -w '%{http_code}' "${base}?audit=${GITHUB_SHA}")
            bootstrap_code=$(curl -L -sS -o /tmp/flutter_bootstrap.js -w '%{http_code}' "${base}flutter_bootstrap.js?audit=${GITHUB_SHA}")
            main_code=$(curl -L -sS -o /tmp/main.dart.js -w '%{http_code}' "${base}main.dart.js?audit=${GITHUB_SHA}")
            if [[ "$index_code" == '200' && "$bootstrap_code" == '200' && "$main_code" == '200' ]] \
              && [[ -s /tmp/index.html && -s /tmp/flutter_bootstrap.js && -s /tmp/main.dart.js ]]; then
              grep -q 'flutter_bootstrap.js' /tmp/index.html
              exit 0
            fi
            sleep 10
          done
          echo 'Le site ou un fichier Flutter essentiel n’est pas accessible.' >&2
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Verify rendered application
        env:
          APP_URL: https://samihchaa-wq.github.io/AS-Grinta/
        run: |
          node <<'NODE'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 390, height: 844 } });
            const failures = [];

            page.on('pageerror', error => failures.push(`pageerror: ${error.message}`));
            page.on('console', message => {
              if (message.type() === 'error') failures.push(`console: ${message.text()}`);
            });

            const response = await page.goto(`${process.env.APP_URL}?browser_audit=${Date.now()}`, {
              waitUntil: 'networkidle',
              timeout: 90000,
            });

            if (!response || response.status() >= 400) {
              throw new Error(`Réponse HTTP invalide: ${response?.status() ?? 'aucune'}`);
            }

            await page.waitForFunction(() => document.body.innerText.trim().length > 0, null, {
              timeout: 30000,
            });

            const bodyText = (await page.locator('body').innerText()).trim();
            if (bodyText.length < 3) throw new Error('Application rendue sans contenu visible.');

            await page.screenshot({ path: 'as-grinta-smoke.png', fullPage: true });

            if (failures.length > 0) {
              throw new Error(`Erreurs navigateur détectées:\n${failures.join('\n')}`);
            }

            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Upload browser smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-screenshot
          path: as-grinta-smoke.png
          if-no-files-found: ignore
