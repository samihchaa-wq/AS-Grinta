name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build Flutter Web
        run: flutter build web --release --base-href "/AS-Grinta/" --pwa-strategy=none
      - name: Add SPA fallback
        run: cp build/web/index.html build/web/404.html
      - name: Validate generated assets
        run: |
          set -euo pipefail
          test -s build/web/index.html
          test -s build/web/flutter_bootstrap.js
          test -s build/web/main.dart.js
          grep -q '/AS-Grinta/' build/web/index.html
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify public application files
        run: |
          set -euo pipefail
          base='https://samihchaa-wq.github.io/AS-Grinta/'
          token="${GITHUB_SHA}-$(date +%s)"
          curl --retry 5 --retry-delay 5 -LfsS "${base}?audit=${token}" -o /tmp/index.html
          curl --retry 5 --retry-delay 5 -LfsS "${base}flutter_bootstrap.js?audit=${token}" -o /tmp/flutter_bootstrap.js
          curl --retry 5 --retry-delay 5 -LfsS "${base}main.dart.js?audit=${token}" -o /tmp/main.dart.js
          test -s /tmp/index.html
          test -s /tmp/flutter_bootstrap.js
          test -s /tmp/main.dart.js
          grep -q 'flutter_bootstrap.js' /tmp/index.html
          grep -q '/AS-Grinta/' /tmp/index.html
      - name: Verify Supabase API availability
        run: |
          set -euo pipefail
          code=$(curl --retry 5 --retry-delay 3 -sS -o /tmp/supabase.txt -w '%{http_code}' \
            'https://ovzijmqrnsgcmryinkfa.supabase.co/rest/v1/' \
            -H 'apikey: sb_publishable_YjiJqFuuQPelzQtnuyTXnA_6thtFIgl')
          test "$code" = '200'
