name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build Flutter Web
        run: flutter build web --release --base-href "/AS-Grinta/" --pwa-strategy=none
      - name: Add SPA fallback
        run: cp build/web/index.html build/web/404.html
      - name: Validate generated assets
        run: |
          set -euo pipefail
          test -s build/web/index.html
          test -s build/web/flutter_bootstrap.js
          test -s build/web/main.dart.js
          test -s build/web/favicon.svg
          grep -q '/AS-Grinta/' build/web/index.html
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout configuration
        uses: actions/checkout@v4
      - name: Verify public application files
        run: |
          set -euo pipefail
          base='https://samihchaa-wq.github.io/AS-Grinta/'
          token="${GITHUB_SHA}-$(date +%s)"
          curl --retry 5 --retry-delay 5 -LfsS "${base}?audit=${token}" -o /tmp/index.html
          curl --retry 5 --retry-delay 5 -LfsS "${base}flutter_bootstrap.js?audit=${token}" -o /tmp/flutter_bootstrap.js
          curl --retry 5 --retry-delay 5 -LfsS "${base}main.dart.js?audit=${token}" -o /tmp/main.dart.js
          curl --retry 5 --retry-delay 5 -LfsS "${base}favicon.svg?audit=${token}" -o /tmp/favicon.svg
          test -s /tmp/index.html
          test -s /tmp/flutter_bootstrap.js
          test -s /tmp/main.dart.js
          test -s /tmp/favicon.svg
          grep -q 'flutter_bootstrap.js' /tmp/index.html
          grep -q '/AS-Grinta/' /tmp/index.html
      - name: Verify Supabase availability
        run: |
          set -euo pipefail
          supabase_url=$(grep -oE "https://[a-z0-9]+\.supabase\.co" lib/core/config/supabase_config.dart | head -1)
          publishable_key=$(grep -oE "sb_publishable_[A-Za-z0-9_-]+" lib/core/config/supabase_config.dart | head -1)
          test -n "$supabase_url"
          test -n "$publishable_key"
          curl --retry 5 --retry-delay 3 -LfsS \
            "$supabase_url/auth/v1/health" \
            -H "apikey: $publishable_key" \
            -o /tmp/supabase-health.json
          test -s /tmp/supabase-health.json
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Playwright Core
        run: npm install --no-save playwright-core@1.52.0
      - name: Verify rendered Flutter application
        env:
          APP_URL: https://samihchaa-wq.github.io/AS-Grinta/
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright-core');

          (async () => {
            const browser = await chromium.launch({
              headless: true,
              executablePath: '/usr/bin/google-chrome',
              args: ['--no-sandbox', '--disable-dev-shm-usage'],
            });
            const context = await browser.newContext({
              viewport: { width: 390, height: 844 },
              serviceWorkers: 'block',
            });
            const page = await context.newPage();
            const errors = [];
            page.on('pageerror', error => errors.push(`pageerror: ${error.stack || error.message}`));
            page.on('console', message => {
              if (message.type() === 'error') {
                errors.push(`console.error: ${message.text()}`);
              }
            });
            page.on('requestfailed', request => {
              errors.push(`requestfailed: ${request.url()} ${request.failure()?.errorText ?? ''}`);
            });
            page.on('response', response => {
              if (response.status() >= 400) {
                errors.push(`http ${response.status()}: ${response.url()}`);
              }
            });
            const response = await page.goto(
              `${process.env.APP_URL}?smoke=${Date.now()}`,
              { waitUntil: 'networkidle', timeout: 90000 },
            );
            if (!response || response.status() >= 400) {
              throw new Error(`HTTP ${response?.status() ?? 'sans réponse'}`);
            }
            await page.waitForFunction(() => {
              return document.querySelector('flutter-view, flt-glass-pane, canvas') !== null;
            }, null, { timeout: 45000 });
            await page.waitForTimeout(3000);
            await page.screenshot({ path: 'as-grinta-smoke.png', fullPage: true });
            fs.writeFileSync('as-grinta-smoke-errors.log', errors.join('\n'));
            const size = fs.statSync('as-grinta-smoke.png').size;
            if (size < 5000) throw new Error(`Capture anormalement vide: ${size} octets`);
            if (errors.length > 0) throw new Error(errors.join(' | '));
            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pages-smoke-diagnostic
          path: |
            as-grinta-smoke.png
            as-grinta-smoke-errors.log
          if-no-files-found: error
