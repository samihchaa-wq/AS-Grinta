name: Format first open prediction fix

on:
  push:
    branches:
      - agent/first-open-prediction-ui

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/first-open-prediction-ui
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: |
          dart format \
            lib/features/home/data/home_repository.dart \
            lib/features/predictions/data/predictions_repository.dart \
            test/first_open_prediction_window_test.dart
      - run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/features/home/data/home_repository.dart \
            lib/features/predictions/data/predictions_repository.dart \
            test/first_open_prediction_window_test.dart
          git commit -m "Formater le correctif du premier pronostic"
          git push origin HEAD:agent/first-open-prediction-ui
