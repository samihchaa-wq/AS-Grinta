name: Patch complete V1

on:
  push:
    branches: [feat/complete-v1-production]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[v1-patched]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/complete-v1-production
          fetch-depth: 0
      - name: Patch coach board locking
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/coach/presentation/coach_board_controller.dart')
          text = path.read_text()
          text = text.replace(
              """    required bool canEdit,
  }) : super(CoachBoardState.initial(canEdit: canEdit)) {
""",
              """    required bool canEdit,
  })  : _hasStaffPermission = canEdit,
        super(CoachBoardState.initial(canEdit: canEdit)) {
""",
          )
          text = text.replace(
              """  final SupabaseClient _client;
  final CoachLiveRepository _repository;
  Timer? _ticker;
""",
              """  final SupabaseClient _client;
  final CoachLiveRepository _repository;
  final bool _hasStaffPermission;
  Timer? _ticker;
""",
          )
          text = text.replace(
              """  StreamSubscription<CoachLiveSession?>? _sessionSubscription;
  StreamSubscription<List<CoachLiveEventRecord>>? _eventsSubscription;
""",
              """  StreamSubscription<String>? _statusSubscription;
  StreamSubscription<CoachLiveSession?>? _sessionSubscription;
  StreamSubscription<List<CoachLiveEventRecord>>? _eventsSubscription;
""",
          )
          marker = """      _sessionSubscription = _repository.watchSession(matchId).listen(
"""
          status_block = """      _statusSubscription = _repository.watchMatchStatus(matchId).listen(
        (status) {
          final isLiveEditable = status == 'a_venir' || status == 'en_cours';
          if (!isLiveEditable) _stopLocalTicker();
          state = state.copyWith(
            canEdit: _hasStaffPermission && isLiveEditable,
            isRunning: isLiveEditable ? state.isRunning : false,
            error: isLiveEditable
                ? null
                : 'Match terminé. Le Tableau est verrouillé ; les corrections se font depuis Matchs.',
            clearError: isLiveEditable,
          );
        },
        onError: (_) {
          state = state.copyWith(
            canEdit: false,
            isRunning: false,
            error: 'Le statut du match n’a pas pu être vérifié. Le Tableau reste verrouillé par sécurité.',
          );
          _stopLocalTicker();
        },
      );

"""
          if marker not in text:
              raise SystemExit('session marker not found')
          text = text.replace(marker, status_block + marker, 1)
          text = text.replace(
              """        onError: (Object error) {
          state = state.copyWith(error: error.toString());
        },
""",
              """        onError: (_) {
          state = state.copyWith(
            error: 'Le Tableau n’a pas pu être synchronisé. Actualise la page.',
          );
        },
""",
              1,
          )
          text = text.replace(
              """        onError: (Object error) {
          state = state.copyWith(error: error.toString());
        },
""",
              """        onError: (_) {
          state = state.copyWith(
            error: 'Les événements du match n’ont pas pu être synchronisés.',
          );
        },
""",
              1,
          )
          text = text.replace(
              """    } catch (error) {
      state = state.copyWith(isLoading: false, error: error.toString());
""",
              """    } catch (_) {
      state = state.copyWith(
        isLoading: false,
        canEdit: false,
        error: 'Le Tableau est temporairement indisponible. Actualise la page.',
      );
""",
          )
          text = text.replace(
              """    _sessionSubscription?.cancel();
    _eventsSubscription?.cancel();
""",
              """    _statusSubscription?.cancel();
    _sessionSubscription?.cancel();
    _eventsSubscription?.cancel();
""",
          )
          path.write_text(text)
          Path('.github/workflows/patch_complete_v1.yml').unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/features/coach/presentation/coach_board_controller.dart .github/workflows/patch_complete_v1.yml
          git commit -m "Verrouiller le Tableau après la fin du match [v1-patched]"
          git push origin HEAD:feat/complete-v1-production
