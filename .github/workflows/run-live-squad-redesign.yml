name: Build live squad redesign

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/run-live-squad-redesign.yml
      - .github/workflows/apply-live-squad-redesign.yml
      - .github/payload/**

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/live-squad-and-formations
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Apply implementation payload
        shell: bash
        run: |
          set +e
          {
            cat .github/payload/live-squad-*.b64 > /tmp/live-squad.b64
            echo "payload length $(wc -c < /tmp/live-squad.b64)"
            base64 -d /tmp/live-squad.b64 | tar -xz
            python3 apply_patch.py
            rm apply_patch.py
          } > /tmp/live-squad-debug.log 2>&1
          status=$?
          cat /tmp/live-squad-debug.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/live-squad-debug.log live-squad-debug.log
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add live-squad-debug.log
            git commit -m 'Journal de diagnostic de la refonte'
            git push origin HEAD:feat/live-squad-and-formations
            exit "$status"
          fi
      - name: Format and test
        shell: bash
        run: |
          set +e
          {
            flutter pub get
            dart format lib test
            flutter analyze
            flutter test
          } > /tmp/live-squad-ci.log 2>&1
          status=$?
          cat /tmp/live-squad-ci.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/live-squad-ci.log live-squad-ci.log
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m 'Journal CI de la refonte'
            git push origin HEAD:feat/live-squad-and-formations
            exit "$status"
          fi
      - name: Commit implementation
        shell: bash
        run: |
          rm -rf .github/payload
          rm .github/workflows/apply-live-squad-redesign.yml
          rm .github/workflows/run-live-squad-redesign.yml
          rm -f live-squad-debug.log live-squad-ci.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Refondre effectif et composition en direct'
          git push origin HEAD:feat/live-squad-and-formations
