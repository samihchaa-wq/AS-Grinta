name: Build live squad redesign

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/run-live-squad-redesign.yml
      - .github/workflows/apply-live-squad-redesign.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/live-squad-and-formations
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Apply implementation payload
        shell: bash
        run: |
          set +e
          {
            python3 - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/apply-live-squad-redesign.yml').read_text()
          payload = None
          for line in text.splitlines():
              if "echo '" in line and "' | base64" in line:
                  payload = line.split("echo '", 1)[1].split("' | base64", 1)[0]
                  break
          if not payload:
              raise SystemExit('Implementation payload not found')
          Path('/tmp/live-squad.b64').write_text(payload)
          print('payload length', len(payload))
          PY
            base64 -d /tmp/live-squad.b64 | tar -xz
            python3 apply_patch.py
            rm apply_patch.py
          } > /tmp/live-squad-debug.log 2>&1
          status=$?
          cat /tmp/live-squad-debug.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/live-squad-debug.log live-squad-debug.log
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add live-squad-debug.log
            git commit -m 'Journal de diagnostic de la refonte'
            git push origin HEAD:feat/live-squad-and-formations
            exit "$status"
          fi
      - name: Format and test
        run: |
          flutter pub get
          dart format lib test
          flutter analyze
          flutter test
      - name: Commit implementation
        shell: bash
        run: |
          rm .github/workflows/apply-live-squad-redesign.yml
          rm .github/workflows/run-live-squad-redesign.yml
          rm -f live-squad-debug.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Refondre effectif et composition en direct'
          git push origin HEAD:feat/live-squad-and-formations
