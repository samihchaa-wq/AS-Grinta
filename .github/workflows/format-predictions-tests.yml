name: Format predictions tests

on:
  push:
    branches: [test/predictions-controller-rules]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Format and clean
        shell: bash
        run: |
          set -euo pipefail
          dart format lib/features/predictions/data/predictions_repository.dart test/predictions_controller_test.dart
          rm -f .github/workflows/format-predictions-tests.yml
          rm -f .github/format-predictions-tests-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(test): format predictions reliability tests"
          git push origin HEAD:test/predictions-controller-rules
