name: Design System Format Patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR "$base...HEAD" -- '*.dart'
          )
          dart format "${files[@]}"
          git diff --binary > design-system-format.patch
      - uses: actions/upload-artifact@v4
        with:
          name: design-system-format-patch
          path: design-system-format.patch
          if-no-files-found: error
