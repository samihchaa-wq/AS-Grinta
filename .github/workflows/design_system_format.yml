name: Design System Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Capture formatter result
        shell: bash
        run: |
          set -u
          base="origin/${{ github.base_ref }}"
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR "$base...HEAD" -- '*.dart'
          )
          printf '%s\n' "${files[@]}" > formatted-files.txt
          set +e
          dart format --output=none --set-exit-if-changed "${files[@]}" \
            > formatter.log 2>&1
          status=$?
          set -e
          echo "exit_code=$status" >> formatter.log
          dart format "${files[@]}" > formatter-apply.log 2>&1
          git diff --binary > residual-format.patch

      - name: Upload formatter diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: design-system-format-diagnostic-ci
          path: |
            formatted-files.txt
            formatter.log
            formatter-apply.log
            residual-format.patch
          if-no-files-found: error
