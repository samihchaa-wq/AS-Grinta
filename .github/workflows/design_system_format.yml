name: Design System Auto Format

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  auto-format:
    if: github.head_ref == 'design-system/semantic-colors'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design-system/semantic-colors
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR "$base...HEAD" -- '*.dart'
          )
          dart format "${files[@]}"
      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No formatting changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.dart'
          git commit -m "chore: format migrated screens"
          git push origin HEAD:design-system/semantic-colors
