name: Embed upcoming prediction

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'feature/move-upcoming-prediction-into-calendar'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/move-upcoming-prediction-into-calendar
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Add stats action to embedded prediction card
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/features/predictions/presentation/pronos_hub_upcoming_section.dart')
          text = path.read_text()
          text = text.replace(
              '  const _UpcomingPredictionCard();\n',
              '  const _UpcomingPredictionCard({this.onEnterStats});\n\n  final VoidCallback? onEnterStats;\n',
          )
          marker = """          if (!item.isClosed) ...[
            const SizedBox(height: 20),
            SizedBox(
              width: double.infinity,
              child: FilledButton.icon(
"""
          insertion = """          if (onEnterStats != null) ...[
            const SizedBox(height: 20),
            SizedBox(
              width: double.infinity,
              child: FilledButton.tonalIcon(
                onPressed: onEnterStats,
                icon: const Icon(Icons.fact_check_outlined),
                label: const Text('Entrer les stats'),
              ),
            ),
          ],
          if (!item.isClosed) ...[
            const SizedBox(height: 20),
            SizedBox(
              width: double.infinity,
              child: FilledButton.icon(
"""
          text = text.replace(marker, insertion)
          path.write_text(text)
      - run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart'
          )
          dart format "${files[@]}"
      - name: Commit finalized changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib
          git commit -m "chore: finalize embedded upcoming prediction"
          git push origin HEAD:feature/move-upcoming-prediction-into-calendar
