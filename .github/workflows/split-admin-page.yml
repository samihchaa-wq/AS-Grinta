name: Split admin page

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/split-admin-page
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Split admin page into private library parts
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/features/admin/presentation/admin_page.dart')
          text = path.read_text()

          season_marker = 'class _SeasonCard extends ConsumerWidget'
          profiles_marker = 'class _ProfilesSection extends StatelessWidget'

          for marker in (season_marker, profiles_marker):
              if text.count(marker) != 1:
                  raise SystemExit(f'Expected one marker {marker!r}, found {text.count(marker)}')

          season_index = text.index(season_marker)
          profiles_index = text.index(profiles_marker)
          if not season_index < profiles_index:
              raise SystemExit('Unexpected admin page class ordering')

          directives = (
              "part 'admin_season_section.dart';\n"
              "part 'admin_profiles_section.dart';\n\n"
          )
          import_end = text.index("/// Lien public")
          main = text[:import_end] + directives + text[import_end:season_index].rstrip() + '\n'
          path.write_text(main)

          path.with_name('admin_season_section.dart').write_text(
              "part of 'admin_page.dart';\n\n" + text[season_index:profiles_index].strip() + '\n'
          )
          path.with_name('admin_profiles_section.dart').write_text(
              "part of 'admin_page.dart';\n\n" + text[profiles_index:].strip() + '\n'
          )

      - name: Format split files
        run: |
          dart format \
            lib/features/admin/presentation/admin_page.dart \
            lib/features/admin/presentation/admin_season_section.dart \
            lib/features/admin/presentation/admin_profiles_section.dart

      - name: Commit split and clean workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/split-admin-page.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(admin): split page into focused private parts"
          git push origin HEAD:refactor/split-admin-page
