name: Format agent branch

on:
  push:
    branches:
      - agent/jauges-neon-ballon

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jauges-neon-ballon
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Format file
        run: dart format lib/features/predictions/presentation/season_predictions_page.dart
      - name: Remove temporary workflow
        run: rm .github/workflows/format-agent.yml
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/predictions/presentation/season_predictions_page.dart .github/workflows/format-agent.yml
          git diff --cached --quiet || git commit -m "Formater les jauges de saison"
          git push origin HEAD:agent/jauges-neon-ballon
