name: Restore Pronos Structure

on:
  push:
    branches: [fix/restore-pronos-information-architecture]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restore-pronos-information-architecture
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Restore exact scorer label
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('lib/features/predictions/presentation/enhanced_season_predictions_page.dart')
          text = path.read_text()
          text = text.replace("label: Text('Joueurs'),", "label: Text('Par joueur'),")
          path.write_text(text)
          PY
      - run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart'
          )
          dart format "${files[@]}"
      - name: Commit finalized structure
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib
          git commit -m "chore: finalize restored Pronos structure"
          git push origin HEAD:fix/restore-pronos-information-architecture
