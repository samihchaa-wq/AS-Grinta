name: Format sports flow with dependencies

on:
  push:
    branches: [feature/simple-player-sports-flow]

permissions:
  contents: write

concurrency:
  group: format-sports-flow-with-dependencies-${{ github.ref }}
  cancel-in-progress: false

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[format-with-deps]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/simple-player-sports-flow
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Format exactly like Flutter CI
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart')
          dart format "${files[@]}"
          rm -f format-report.txt
          rm .github/workflows/format_sports_flow_with_dependencies.yml

      - name: Commit exact formatting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[format-with-deps] Aligner le formatage sur Flutter CI"
          git push origin HEAD:feature/simple-player-sports-flow
