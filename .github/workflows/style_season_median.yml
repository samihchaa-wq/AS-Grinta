name: Style season median

on:
  push:
    branches: [main]
    paths:
      - '.github/style-season-median-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply median and label styling
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lib/features/predictions/presentation/widgets/premium_season_gauges.dart')
          text = path.read_text()

          text = text.replace(
              "const _personalPrediction = Color(0xFFFFBE3D);\n",
              "const _personalPrediction = Color(0xFFFFBE3D);\nconst _medianPrediction = Color(0xFF9B6CFF);\n",
              1,
          )

          text = text.replace(
              '''                              color: Colors.white70,
                              borderRadius: BorderRadius.circular(2),
''',
              '''                              color: _medianPrediction,
                              borderRadius: BorderRadius.circular(2),
                              boxShadow: [
                                BoxShadow(
                                  color: _medianPrediction.withValues(alpha: .55),
                                  blurRadius: 8,
                                ),
                              ],
''',
              1,
          )

          text = text.replace("label: 'Toi',", "label: 'Ton prono',", 1)

          old_median = '''                  child: _GaugeValueLabel(
                    icon: Icons.balance,
                    label: 'Médiane',
                    value: roundedMedian?.round().toString() ?? '—',
                    color: Colors.white70,
                    alignment: CrossAxisAlignment.end,
                  ),
'''
          new_median = '''                  child: _GaugeValueLabel(
                    icon: Icons.circle,
                    label: 'Médiane',
                    value: roundedMedian?.round().toString() ?? '—',
                    color: _medianPrediction,
                    alignment: CrossAxisAlignment.end,
                  ),
'''
          if old_median not in text:
            raise SystemExit('median label block not found')
          text = text.replace(old_median, new_median, 1)

          path.write_text(text)
          Path('.github/style-season-median-trigger').unlink(missing_ok=True)
          Path('.github/workflows/style_season_median.yml').unlink()
          PY

      - name: Commit styling
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Styliser la médiane en violet"
          git push
