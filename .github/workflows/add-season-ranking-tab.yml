name: Add season ranking tab

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/season-ranking-x2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/season-ranking-x2
      - name: Add tab
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('lib/features/predictions/presentation/premium_season_predictions_page.dart')
          t=p.read_text()
          if "label: 'Classement saison'" not in t:
            marker="""          Expanded(
            child: _SwitchItem(
              active: selected == _PremiumView.predictors,
              icon: Icons.group_outlined,
              label: 'Par pronostiqueur',
              onTap: () => onChanged(_PremiumView.predictors),
            ),
          ),"""
            add=marker+"""
          Expanded(
            child: _SwitchItem(
              active: selected == _PremiumView.ranking,
              icon: Icons.emoji_events_outlined,
              label: 'Classement saison',
              onTap: () => onChanged(_PremiumView.ranking),
            ),
          ),"""
            t=t.replace(marker,add)
          p.write_text(t)
          PY
          dart format lib/features/predictions/presentation/premium_season_predictions_page.dart
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Ajouter l’onglet classement saison"
          git push origin HEAD:agent/season-ranking-x2
