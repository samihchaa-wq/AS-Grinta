name: Apply scorer dashboard simplification

on:
  push:
    branches: [design/simplify-scorer-dashboard]

permissions:
  contents: write

jobs:
  simplify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/simplify-scorer-dashboard
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Simplify scorer dashboard
        shell: python
        run: |
          from pathlib import Path
          path = Path('lib/features/predictions/presentation/scorer_dashboard_page.dart')
          text = path.read_text()
          podium_call = """              const SizedBox(height: 18),
              _PodiumStrip(
                players: scorers.take(3).toList(),
                onOpen: (gauge) => _openPlayerDetails(
                  context,
                  gauge,
                  currentUserId,
                ),
                onOpenRanking: () => context.go('/pronos?category=general'),
              ),
"""
          text = text.replace(podium_call, '')
          text = text.replace("        final scorers =\n            players.where((player) => !player.isGoalkeeper).toList();\n", '')
          start = text.index('class _PodiumStrip')
          end = text.index('class _PlayersTable')
          text = text[:start] + text[end:]
          table_start = text.index('class _PlayersTable')
          compact = r'''class _PlayersTable extends StatelessWidget {
  const _PlayersTable({
    required this.players,
    required this.currentUserId,
    required this.onOpen,
  });

  final List<PlayerGauge> players;
  final String? currentUserId;
  final ValueChanged<PlayerGauge> onOpen;

  @override
  Widget build(BuildContext context) {
    return Container(
      decoration: BoxDecoration(
        color: const Color(0xFF071426),
        borderRadius: BorderRadius.circular(26),
        border: Border.all(color: const Color(0xFF425D8C)),
      ),
      clipBehavior: Clip.antiAlias,
      child: Column(
        children: [
          const _PlayersTableHeader(),
          for (var index = 0; index < players.length; index++)
            _PlayerTableRow(
              rank: index + 1,
              gauge: players[index],
              personalPrediction:
                  players[index].predictionFor(currentUserId)?.value,
              onTap: () => onOpen(players[index]),
            ),
        ],
      ),
    );
  }
}

class _PlayersTableHeader extends StatelessWidget {
  const _PlayersTableHeader();

  @override
  Widget build(BuildContext context) {
    const style = TextStyle(
      color: Colors.white60,
      fontSize: 9,
      fontWeight: FontWeight.w800,
    );
    return Container(
      padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 14),
      decoration: const BoxDecoration(
        border: Border(bottom: BorderSide(color: Colors.white12)),
      ),
      child: const Row(
        children: [
          Expanded(flex: 4, child: Text('JOUEUR', style: style)),
          Expanded(flex: 2, child: Text('ACTUEL', style: style, textAlign: TextAlign.center)),
          Expanded(flex: 2, child: Text('PRONO', style: style, textAlign: TextAlign.center)),
          Expanded(flex: 2, child: Text('MÉDIANE', style: style, textAlign: TextAlign.center)),
          Expanded(flex: 2, child: Text('ÉCART', style: style, textAlign: TextAlign.center)),
        ],
      ),
    );
  }
}

class _PlayerTableRow extends StatelessWidget {
  const _PlayerTableRow({
    required this.rank,
    required this.gauge,
    required this.personalPrediction,
    required this.onTap,
  });

  final int rank;
  final PlayerGauge gauge;
  final int? personalPrediction;
  final VoidCallback onTap;

  @override
  Widget build(BuildContext context) {
    final median = gauge.predictions.isEmpty ? null : gauge.median.round();
    final difference = personalPrediction == null || median == null
        ? null
        : personalPrediction! - median;
    return Material(
      color: Colors.transparent,
      child: InkWell(
        onTap: onTap,
        child: Container(
          padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 16),
          decoration: const BoxDecoration(
            border: Border(bottom: BorderSide(color: Colors.white10)),
          ),
          child: Row(
            children: [
              Expanded(
                flex: 4,
                child: Row(
                  children: [
                    SizedBox(
                      width: 26,
                      child: Text(
                        rank.toString().padLeft(2, '0'),
                        style: const TextStyle(
                          color: _actualBlue,
                          fontSize: 14,
                          fontWeight: FontWeight.w900,
                          fontStyle: FontStyle.italic,
                        ),
                      ),
                    ),
                    const SizedBox(width: 6),
                    Expanded(
                      child: Text(
                        gauge.playerName.toUpperCase(),
                        maxLines: 1,
                        overflow: TextOverflow.ellipsis,
                        style: const TextStyle(
                          fontSize: 15,
                          fontWeight: FontWeight.w900,
                          fontStyle: FontStyle.italic,
                        ),
                      ),
                    ),
                  ],
                ),
              ),
              _CompactValue(value: gauge.actual, color: _actualBlue),
              _CompactValue(value: personalPrediction, color: _personalGold),
              _CompactValue(value: median, color: _medianPurple),
              _CompactDelta(value: difference),
            ],
          ),
        ),
      ),
    );
  }
}

class _CompactValue extends StatelessWidget {
  const _CompactValue({required this.value, required this.color});
  final int? value;
  final Color color;

  @override
  Widget build(BuildContext context) {
    return Expanded(
      flex: 2,
      child: Text(
        value?.toString() ?? '—',
        textAlign: TextAlign.center,
        style: TextStyle(color: color, fontSize: 20, fontWeight: FontWeight.w900),
      ),
    );
  }
}

class _CompactDelta extends StatelessWidget {
  const _CompactDelta({required this.value});
  final int? value;

  @override
  Widget build(BuildContext context) {
    final color = value == null
        ? Colors.white54
        : value! > 0
            ? _positivePink
            : value! < 0
                ? _negativeGreen
                : Colors.white70;
    final display = value == null ? '—' : value! > 0 ? '+$value' : '$value';
    return Expanded(
      flex: 2,
      child: Text(
        display,
        textAlign: TextAlign.center,
        style: TextStyle(color: color, fontSize: 18, fontWeight: FontWeight.w900),
      ),
    );
  }
}
'''
          path.write_text(text[:table_start] + compact)
      - run: flutter pub get
      - run: dart format lib/features/predictions/presentation/scorer_dashboard_page.dart
      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib
          git commit -m "design: simplify scorer dashboard"
          git push origin HEAD:design/simplify-scorer-dashboard
