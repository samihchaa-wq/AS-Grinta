name: Audit GitHub Pages deployment

on:
  workflow_run:
    workflows:
      - Deploy Flutter Web to GitHub Pages
    types:
      - completed

permissions:
  contents: read

jobs:
  audit:
    if: ${{ github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify public files
        shell: bash
        run: |
          set -euo pipefail
          base='https://samihchaa-wq.github.io/AS-Grinta/'
          for attempt in 1 2 3 4 5 6; do
            token="${GITHUB_RUN_ID}-${attempt}-$(date +%s)"
            index_code=$(curl -L -sS -o /tmp/index.html -w '%{http_code}' "${base}?audit=${token}")
            bootstrap_code=$(curl -L -sS -o /tmp/flutter_bootstrap.js -w '%{http_code}' "${base}flutter_bootstrap.js?audit=${token}")
            main_code=$(curl -L -sS -o /tmp/main.dart.js -w '%{http_code}' "${base}main.dart.js?audit=${token}")
            if [[ "$index_code" == '200' && "$bootstrap_code" == '200' && "$main_code" == '200' ]] \
              && [[ -s /tmp/index.html && -s /tmp/flutter_bootstrap.js && -s /tmp/main.dart.js ]] \
              && grep -q 'flutter_bootstrap.js' /tmp/index.html; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Verify rendered Flutter application
        env:
          APP_URL: https://samihchaa-wq.github.io/AS-Grinta/
        run: |
          node <<'NODE'
          const { chromium } = require('playwright');
          const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

          async function verify(attempt) {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 390, height: 844 },
              serviceWorkers: 'block',
            });
            const page = await context.newPage();
            const pageErrors = [];
            page.on('pageerror', error => pageErrors.push(error.message));

            try {
              const response = await page.goto(
                `${process.env.APP_URL}?audit_browser=${Date.now()}-${attempt}`,
                { waitUntil: 'networkidle', timeout: 90000 },
              );
              if (!response || response.status() >= 400) {
                throw new Error(`HTTP ${response?.status() ?? 'sans réponse'}`);
              }
              await page.waitForFunction(() => {
                const flutterHost = document.querySelector(
                  'flutter-view, flt-glass-pane, flt-scene-host, canvas',
                );
                return flutterHost !== null && document.body.childElementCount > 0;
              }, null, { timeout: 45000 });
              if (pageErrors.length > 0) {
                throw new Error(`Erreurs JavaScript: ${pageErrors.join(' | ')}`);
              }
              await page.screenshot({ path: 'as-grinta-audit.png', fullPage: true });
            } finally {
              await browser.close();
            }
          }

          (async () => {
            let lastError;
            for (let attempt = 1; attempt <= 6; attempt++) {
              try {
                await verify(attempt);
                return;
              } catch (error) {
                lastError = error;
                console.error(`Tentative ${attempt}/6: ${error.message}`);
                if (attempt < 6) await sleep(10000);
              }
            }
            throw lastError;
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Upload audit screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-audit-screenshot
          path: as-grinta-audit.png
          if-no-files-found: ignore
