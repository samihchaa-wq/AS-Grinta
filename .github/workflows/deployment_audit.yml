name: Audit GitHub Pages deployment

on:
  workflow_run:
    workflows:
      - Deploy Flutter Web to GitHub Pages
    types:
      - completed

permissions:
  contents: write

jobs:
  audit:
    if: ${{ github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify public files
        id: public_files
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          base='https://samihchaa-wq.github.io/AS-Grinta/'
          for attempt in 1 2 3 4 5 6; do
            index_code=$(curl -L -sS -o /tmp/index.html -w '%{http_code}' "${base}?audit=${GITHUB_RUN_ID}-${attempt}")
            bootstrap_code=$(curl -L -sS -o /tmp/flutter_bootstrap.js -w '%{http_code}' "${base}flutter_bootstrap.js?audit=${GITHUB_RUN_ID}-${attempt}")
            main_code=$(curl -L -sS -o /tmp/main.dart.js -w '%{http_code}' "${base}main.dart.js?audit=${GITHUB_RUN_ID}-${attempt}")
            if [[ "$index_code" == '200' && "$bootstrap_code" == '200' && "$main_code" == '200' ]] \
              && [[ -s /tmp/index.html && -s /tmp/flutter_bootstrap.js && -s /tmp/main.dart.js ]]; then
              grep -q 'flutter_bootstrap.js' /tmp/index.html
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Verify rendered application
        id: rendered_app
        continue-on-error: true
        env:
          APP_URL: https://samihchaa-wq.github.io/AS-Grinta/
        run: |
          node <<'NODE'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 390, height: 844 } });
            const failures = [];
            page.on('pageerror', error => failures.push(`pageerror: ${error.message}`));
            page.on('console', message => {
              if (message.type() === 'error') failures.push(`console: ${message.text()}`);
            });
            const response = await page.goto(`${process.env.APP_URL}?browser_audit=${Date.now()}`, {
              waitUntil: 'networkidle',
              timeout: 90000,
            });
            if (!response || response.status() >= 400) {
              throw new Error(`Réponse HTTP invalide: ${response?.status() ?? 'aucune'}`);
            }
            await page.waitForFunction(() => document.body.innerText.trim().length > 0, null, {
              timeout: 30000,
            });
            const bodyText = (await page.locator('body').innerText()).trim();
            if (bodyText.length < 3) throw new Error('Application rendue sans contenu visible.');
            await page.screenshot({ path: 'as-grinta-audit.png', fullPage: true });
            if (failures.length > 0) throw new Error(failures.join('\n'));
            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Upload audit screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-audit-screenshot
          path: as-grinta-audit.png
          if-no-files-found: ignore

      - name: Record deployment audit
        if: always()
        uses: actions/github-script@v7
        env:
          PUBLIC_FILES_OUTCOME: ${{ steps.public_files.outcome }}
          RENDERED_APP_OUTCOME: ${{ steps.rendered_app.outcome }}
          DEPLOY_WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          DEPLOYED_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = 'deployment-status.json';
            const payload = {
              deployed_sha: process.env.DEPLOYED_SHA,
              audited_at: new Date().toISOString(),
              url: 'https://samihchaa-wq.github.io/AS-Grinta/',
              deploy_workflow: process.env.DEPLOY_WORKFLOW_CONCLUSION,
              public_files: process.env.PUBLIC_FILES_OUTCOME,
              rendered_application: process.env.RENDERED_APP_OUTCOME,
              verified: process.env.DEPLOY_WORKFLOW_CONCLUSION === 'success' &&
                process.env.PUBLIC_FILES_OUTCOME === 'success' &&
                process.env.RENDERED_APP_OUTCOME === 'success'
            };
            let existingSha;
            try {
              const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
              existingSha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch: 'main',
              message: `[skip ci] Record Pages audit for ${process.env.DEPLOYED_SHA}`,
              content: Buffer.from(JSON.stringify(payload, null, 2) + '\n').toString('base64'),
              sha: existingSha,
            });

      - name: Fail when audit is not fully successful
        if: ${{ steps.public_files.outcome != 'success' || steps.rendered_app.outcome != 'success' || github.event.workflow_run.conclusion != 'success' }}
        run: exit 1
