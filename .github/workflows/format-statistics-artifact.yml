name: Format statistics branch

on:
  push:
    branches:
      - feat/statistiques-module

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/statistiques-module
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Format changed Dart files
        run: |
          dart format \
            lib/app/router/app_router.dart \
            lib/app/shell/app_shell.dart \
            lib/features/statistics/data/statistics_repository.dart \
            lib/features/statistics/presentation/statistics_page.dart
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/app/router/app_router.dart \
            lib/app/shell/app_shell.dart \
            lib/features/statistics/data/statistics_repository.dart \
            lib/features/statistics/presentation/statistics_page.dart
          git commit -m "style: formater le module statistiques"
          git push origin HEAD:feat/statistiques-module
