name: Format simple player sports flow

on:
  push:
    branches: [feature/simple-player-sports-flow]

permissions:
  contents: write

concurrency:
  group: format-simple-player-flow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[sports-flow-formatted]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/simple-player-sports-flow
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.dart')
          if [ "${#files[@]}" -gt 0 ]; then
            dart format "${files[@]}"
          fi
          rm .github/workflows/format_simple_player_flow.yml

      - name: Commit formatted files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[sports-flow-formatted] Formater le parcours sportif utilisateur"
          git push origin HEAD:feature/simple-player-sports-flow
