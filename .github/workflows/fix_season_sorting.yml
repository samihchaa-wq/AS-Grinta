name: Fix season prediction sorting

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.issue.title == 'RUN-SEASON-SORTING-FIX'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply requested sorting rules
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lib/features/predictions/presentation/enhanced_season_predictions_page.dart')
          text = path.read_text()

          old_players = '''    final scorers = gauges.where((gauge) => !gauge.isGoalkeeper).toList();
    final keepers = gauges.where((gauge) => gauge.isGoalkeeper).toList();
'''
          new_players = '''    int compareByActualThenMedian(PlayerGauge a, PlayerGauge b) {
      final byActual = b.actual.compareTo(a.actual);
      if (byActual != 0) return byActual;
      final byMedian = b.median.compareTo(a.median);
      if (byMedian != 0) return byMedian;
      return a.playerName.toLowerCase().compareTo(b.playerName.toLowerCase());
    }

    final scorers = gauges.where((gauge) => !gauge.isGoalkeeper).toList()
      ..sort(compareByActualThenMedian);
    final keepers = gauges.where((gauge) => gauge.isGoalkeeper).toList()
      ..sort(compareByActualThenMedian);
'''
          if old_players not in text:
            raise SystemExit('players sorting block not found')
          text = text.replace(old_players, new_players, 1)

          old_predictor = '''    int compare(PlayerGauge a, PlayerGauge b) {
      final aValue = a.predictionFor(selectedId)?.value ?? -1;
      final bValue = b.predictionFor(selectedId)?.value ?? -1;
      final byPrediction = bValue.compareTo(aValue);
      if (byPrediction != 0) return byPrediction;
      final byActual = b.actual.compareTo(a.actual);
      if (byActual != 0) return byActual;
      return a.playerName.toLowerCase().compareTo(b.playerName.toLowerCase());
    }
'''
          new_predictor = '''    int compare(PlayerGauge a, PlayerGauge b) {
      final byActual = b.actual.compareTo(a.actual);
      if (byActual != 0) return byActual;
      final aPrediction = a.predictionFor(selectedId)?.value ?? -1;
      final bPrediction = b.predictionFor(selectedId)?.value ?? -1;
      final byPrediction = bPrediction.compareTo(aPrediction);
      if (byPrediction != 0) return byPrediction;
      return a.playerName.toLowerCase().compareTo(b.playerName.toLowerCase());
    }
'''
          if old_predictor not in text:
            raise SystemExit('predictor sorting block not found')
          text = text.replace(old_predictor, new_predictor, 1)
          path.write_text(text)
          PY

      - name: Commit sorting fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/predictions/presentation/enhanced_season_predictions_page.dart
          git commit -m "Trier les pronos de saison par performances réelles"
          git push
