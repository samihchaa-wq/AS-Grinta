name: Format statistics diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Capture exact formatting check
        shell: bash
        run: |
          set -uo pipefail
          base="origin/${{ github.base_ref }}"
          range="$base...HEAD"
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$range" -- '*.dart')
          printf '%s\n' "${files[@]}" > formatted-files.txt
          set +e
          dart format --output=none --set-exit-if-changed "${files[@]}" > format-check.log 2>&1
          status=$?
          set -e
          printf '\nexit_status=%s\n' "$status" >> format-check.log
          cat format-check.log
      - uses: actions/upload-artifact@v4
        with:
          name: exact-ci-format-check
          path: |
            formatted-files.txt
            format-check.log
