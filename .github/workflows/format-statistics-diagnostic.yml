name: Format statistics with project context

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/statistiques-module-v2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Resolve project dependencies
        run: flutter pub get
      - name: Format statistics Dart files
        run: |
          dart format \
            lib/app/router/app_router.dart \
            lib/app/shell/app_shell.dart \
            lib/features/statistics/data/statistics_repository.dart \
            lib/features/statistics/presentation/statistics_page.dart
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/app/router/app_router.dart \
            lib/app/shell/app_shell.dart \
            lib/features/statistics/data/statistics_repository.dart \
            lib/features/statistics/presentation/statistics_page.dart
          git commit -m "style: formater avec le contexte Flutter"
          git push origin HEAD:feat/statistiques-module-v2
