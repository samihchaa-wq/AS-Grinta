name: Format statistics diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Format changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          range="$base...HEAD"
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$range" -- '*.dart')
          printf '%s\n' "${files[@]}" > formatted-files.txt
          dart format "${files[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: exact-ci-formatted-statistics
          path: |
            formatted-files.txt
            lib/app/router/app_router.dart
            lib/app/shell/app_shell.dart
            lib/features/statistics/data/statistics_repository.dart
            lib/features/statistics/presentation/statistics_page.dart
