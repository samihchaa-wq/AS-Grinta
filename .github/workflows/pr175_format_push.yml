name: Format exact player card

on:
  push:
    branches: [fix/exact-reference-player-card-v2]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/exact-reference-player-card-v2
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Format player card
        run: dart format lib/features/predictions/presentation/widgets/reference_player_gauge_card.dart
      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/predictions/presentation/widgets/reference_player_gauge_card.dart
          git commit -m "chore: format exact player gauge card"
          git push origin HEAD:fix/exact-reference-player-card-v2
