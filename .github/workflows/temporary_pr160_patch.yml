name: Temporary PR 160 patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'navigation/split-upcoming-finished-and-clean-headers'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: navigation/split-upcoming-finished-and-clean-headers
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Patch upcoming prediction data flow
        shell: python
        run: |
          import re
          from pathlib import Path

          repository = Path('lib/features/predictions/data/predictions_repository.dart')
          text = repository.read_text()
          pattern = re.compile(
              r"    final matches = await _client\n"
              r"        \.from\('matches'\)\n"
              r"        \.select\(_matchSelect\)\n"
              r"        \.eq\('status', 'a_venir'\)\n"
              r"        \.order\('match_date', ascending: true\)\n"
              r"        \.order\('match_time', ascending: true\)\n"
              r"        \.limit\(1\);\n"
              r"    if \(\(matches as List\)\.isEmpty\) return const \[\];\n"
              r"    final item =\n"
              r"        await _buildItem\(Map<String, dynamic>\.from\(matches\.first as Map\)\);\n"
              r"    return \[item\];"
          )
          replacement = """    final matches = await _client
              .from('matches')
              .select(_matchSelect)
              .eq('status', 'a_venir')
              .order('match_date', ascending: true)
              .order('match_time', ascending: true);
          final items = <MatchPredictionItem>[];
          for (final match in matches as List) {
            items.add(
              await _buildItem(Map<String, dynamic>.from(match as Map)),
            );
          }
          return items;"""
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit('predictions repository snippet not found')
          repository.write_text(text)

          upcoming = Path('lib/features/predictions/presentation/pronos_hub_upcoming_section.dart')
          text = upcoming.read_text()
          pattern = re.compile(
              r"class _UpcomingPredictionCard extends ConsumerWidget \{\n"
              r"  const _UpcomingPredictionCard\(\);\n\n"
              r"  @override\n"
              r"  Widget build\(BuildContext context, WidgetRef ref\) \{\n"
              r"    final state = ref\.watch\(predictionsControllerProvider\);\n"
              r"    if \(state\.isLoading\) return const _LoadingCard\(\);\n"
              r"    if \(state\.items\.isEmpty\) \{\n"
              r"      return const _MessageCard\(message: 'Aucun match à pronostiquer\.'\);\n"
              r"    \}\n\n"
              r"    final item = state\.items\.first;"
          )
          replacement = """class _UpcomingPredictionCard extends ConsumerWidget {
            const _UpcomingPredictionCard({required this.item});

            final MatchPredictionItem item;

            @override
            Widget build(BuildContext context, WidgetRef ref) {
              final state = ref.watch(predictionsControllerProvider);"""
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit('upcoming card snippet not found')
          upcoming.write_text(text)
      - name: Format changed Dart files
        run: dart format lib/core/widgets/grinta_app_bar.dart lib/features/players/data/roster_repository.dart lib/features/predictions/data/predictions_repository.dart lib/features/predictions/presentation/pronos_hub_history_section.dart lib/features/predictions/presentation/pronos_hub_upcoming_section.dart
      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib
          git commit -m "navigation: show every upcoming match as a prediction card"
          git push origin HEAD:navigation/split-upcoming-finished-and-clean-headers
