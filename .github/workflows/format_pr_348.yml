name: Format PR 348

on:
  push:
    branches:
      - agent/fix-match-detail-and-last-match

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-match-detail-and-last-match
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format changed Dart files
        run: |
          dart format \
            lib/features/home/presentation/accueil_page.dart \
            lib/features/home/presentation/home_last_match_card.dart \
            lib/features/matches/data/match_details_repository.dart \
            lib/features/matches/presentation/match_details_page.dart \
            lib/features/sports_management/presentation/match_lineup_page.dart \
            lib/features/sports_management/presentation/widgets/match_availability_selector.dart

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "Already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/features/home/presentation/accueil_page.dart \
            lib/features/home/presentation/home_last_match_card.dart \
            lib/features/matches/data/match_details_repository.dart \
            lib/features/matches/presentation/match_details_page.dart \
            lib/features/sports_management/presentation/match_lineup_page.dart \
            lib/features/sports_management/presentation/widgets/match_availability_selector.dart
          git commit -m "Formater les fiches de match"
          git push origin HEAD:agent/fix-match-detail-and-last-match
