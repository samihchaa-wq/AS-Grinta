name: Deploy sports management v63

on:
  push:
    branches: [release/run-sports-deployment-live-squad-v63]
    paths:
      - '.github/workflows/deploy_sports_management.yml'

permissions:
  contents: write

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  SUPABASE_PROJECT_ID: ovzijmqrnsgcmryinkfa

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout authorized deployment candidate
        uses: actions/checkout@v4
        with:
          ref: release/run-sports-deployment-live-squad-v63
          fetch-depth: 0

      - name: Check deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          test -n "${SUPABASE_DB_PASSWORD:-}"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Production
        shell: bash
        run: |
          set -euo pipefail
          supabase link \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Record migration state before deployment
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list | tee migration-before.txt

      - name: Apply pending migrations
        shell: bash
        run: |
          set -euo pipefail
          supabase db push \
            --password "$SUPABASE_DB_PASSWORD" \
            --yes

      - name: Record migration state after deployment
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list | tee migration-after.txt

      - name: Deploy send-push
        shell: bash
        run: |
          set -euo pipefail
          supabase functions deploy send-push \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt \
            --use-api

      - name: Record successful deployment
        shell: bash
        run: |
          set -euo pipefail
          printf 'commit=%s\ndeployed_at=%s\n' \
            '1fdf0ec93be65172dee970f9131048be47d43484' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > sports-management-v63-production.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add sports-management-v63-production.txt
          git commit -m 'Confirmer le déploiement Production v63'
          git push origin HEAD:release/run-sports-deployment-live-squad-v63

      - name: Upload deployment diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sports-management-production-deployment-v63
          path: |
            migration-before.txt
            migration-after.txt
          if-no-files-found: warn
