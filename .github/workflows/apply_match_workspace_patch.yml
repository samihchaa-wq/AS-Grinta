name: Apply match workspace patch

on:
  push:
    branches: [agent/match-actions-pari-hdm]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/match-actions-pari-hdm
          fetch-depth: 0

      - name: Apply targeted changes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'Expected snippet not found in {path}: {old[:120]!r}')
              file.write_text(text.replace(old, new, 1))

          # Main Matchs calendar: the next card opens Effectif directly, future
          # cards remain inert, and admin actions appear on every match.
          path = 'lib/features/predictions/presentation/pronos_hub_history_section.dart'
          replace_once(path, """          if (isNextMatch) ...[
            const SizedBox(height: 14),
            Row(
              children: [
                Expanded(
                  child: OutlinedButton.icon(
                    onPressed: () => context.push(
                      '/matches/${match.id}/lineup?section=effectif',
                    ),
                    icon: const Icon(Icons.groups_2_outlined),
                    label: const Text('Effectif'),
                  ),
                ),
                const SizedBox(width: 10),
                Expanded(
                  child: OutlinedButton.icon(
                    onPressed: () => context.push(
                      '/matches/${match.id}/lineup?section=composition',
                    ),
                    icon: const Icon(Icons.sports_soccer_outlined),
                    label: const Text('Composition'),
                  ),
                ),
              ],
            ),
          ],
          if (match.isFinished && isAdmin) ...[
            const SizedBox(height: 14),
            _AdminMatchActions(match: match),
          ],
""", """          if (isAdmin) ...[
            const SizedBox(height: 14),
            _AdminMatchActions(match: match),
          ],
""")
          replace_once(path, """      child: match.isFinished
          ? InkWell(
              onTap: () => context.push('/matches/${match.id}'),
              child: content,
            )
          : content,
""", """      child: match.isFinished || isNextMatch
          ? InkWell(
              onTap: () => context.push(
                match.isFinished
                    ? '/matches/${match.id}'
                    : '/matches/${match.id}/lineup?section=effectif',
              ),
              child: content,
            )
          : content,
""")
          replace_once(path, "icon: const Icon(Icons.edit_outlined),\n                label: const Text('👑 Modifier'),", "icon: const Text('⚙️', style: TextStyle(fontSize: 18)),\n                label: const Text('Modifier'),")
          replace_once(path, "icon: const Text('👑'),\n                label: const Text('Changer les stats'),", "icon: const Text('📈', style: TextStyle(fontSize: 18)),\n                label: const Text('Stats'),")
          replace_once(path, "icon: const Icon(Icons.delete_outline),\n      label: const Text('👑 Supprimer'),", "icon: const Text('🚫', style: TextStyle(fontSize: 18)),\n      label: const Text('Supprimer'),")

          # Secondary admin match list: same actions and navigation rules.
          path = 'lib/features/matches/presentation/matches_page.dart'
          replace_once(path, "import 'package:as_grinta/features/matches/presentation/upcoming_match_prediction_page.dart';\n", "")
          replace_once(path, """                    match: match,
                    canEdit: isAdmin && !match.isFinished,
                    canFinalize: isAdmin,
                    canDelete: isAdmin,
""", """                    match: match,
                    isNext: match.id == target?.id,
                    canEdit: isAdmin,
                    canFinalize: isAdmin,
                    canDelete: isAdmin,
""")
          replace_once(path, """    required this.canDelete,
    required this.canEdit,
    required this.canFinalize,
  });

  final MatchModel match;
  final bool canDelete;
""", """    required this.canDelete,
    required this.canEdit,
    required this.canFinalize,
    required this.isNext,
  });

  final MatchModel match;
  final bool canDelete;
""")
          replace_once(path, "  final bool canFinalize;\n", "  final bool canFinalize;\n  final bool isNext;\n")
          replace_once(path, """        onTap: () {
          if (isFinished) {
            context.push('/matches/${match.id}');
          } else {
            Navigator.of(context).push(
              MaterialPageRoute(
                builder: (_) => UpcomingMatchPredictionPage(matchId: match.id),
              ),
            );
          }
        },
""", """        onTap: isFinished
            ? () => context.push('/matches/${match.id}')
            : isNext
                ? () => context.push(
                      '/matches/${match.id}/lineup?section=effectif',
                    )
                : null,
""")
          replace_once(path, "isFinished ? 'Terminé' : 'À venir'", "isFinished ? 'Terminé' : isNext ? 'Prochain' : 'À venir'")
          replace_once(path, "icon: const Icon(Icons.edit_outlined),\n                       label: const Text('👑 Modifier'),", "icon: const Text('⚙️', style: TextStyle(fontSize: 18)),\n                       label: const Text('Modifier'),")
          replace_once(path, """                       icon: const Icon(Icons.fact_check_outlined),
                       label: Text(
                         isFinished
                             ? '👑 Modifier les statistiques'
                             : '👑 Saisir les statistiques',
                       ),
""", """                       icon: const Text('📈', style: TextStyle(fontSize: 18)),
                       label: const Text('Stats'),
""")
          replace_once(path, "icon: const Icon(Icons.delete_outline),\n                       label: const Text('👑 Supprimer'),", "icon: const Text('🚫', style: TextStyle(fontSize: 18)),\n                       label: const Text('Supprimer'),")

          # Home next-match shortcut opens the match workspace directly on Effectif.
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              "onTap: () => context.push('/matches/${match.id}'),",
              "onTap: () => context.push(\n          '/matches/${match.id}/lineup?section=effectif',\n        ),",
          )

          # Admin workspace: add Ton pari as a third section.
          path = 'lib/features/sports_management/presentation/admin_squad_plan_page.dart'
          replace_once(path, "import 'package:as_grinta/core/widgets/grinta_app_bar.dart';\n", "import 'package:as_grinta/core/widgets/grinta_app_bar.dart';\nimport 'package:as_grinta/features/predictions/presentation/widgets/inline_match_prediction_card.dart';\n")
          replace_once(path, "enum _AdminStep { effectif, composition }", "enum _AdminStep { effectif, composition, prediction }")
          replace_once(path, """    _step = widget.initialStep == 'composition'
        ? _AdminStep.composition
        : _AdminStep.effectif;
""", """    _step = switch (widget.initialStep) {
      'composition' => _AdminStep.composition,
      'prediction' => _AdminStep.prediction,
      _ => _AdminStep.effectif,
    };
""")
          replace_once(path, """              ButtonSegment(
                value: _AdminStep.composition,
                icon: Icon(Icons.sports_soccer_outlined),
                label: Text('Composition'),
              ),
""", """              ButtonSegment(
                value: _AdminStep.composition,
                icon: Icon(Icons.sports_soccer_outlined),
                label: Text('Composition'),
              ),
              ButtonSegment(
                value: _AdminStep.prediction,
                icon: Icon(Icons.sports_score_outlined),
                label: Text('Ton pari'),
              ),
""")
          replace_once(path, """          if (_convocations != null && _composition != null)
            _step == _AdminStep.effectif
                ? _buildEffectif()
                : _buildComposition(),
""", """          if (_selectedMatchId != null && _step == _AdminStep.prediction)
            InlineMatchPredictionCard(matchId: _selectedMatchId!)
          else if (_convocations != null && _composition != null)
            _step == _AdminStep.effectif
                ? _buildEffectif()
                : _buildComposition(),
""")

          # Public workspace: explicit three-section navigation, default Effectif.
          path = 'lib/features/sports_management/presentation/match_lineup_page.dart'
          replace_once(path, "import 'package:as_grinta/features/feature_flags/presentation/feature_flags_controller.dart';\n", "import 'package:as_grinta/features/feature_flags/presentation/feature_flags_controller.dart';\nimport 'package:as_grinta/features/predictions/presentation/widgets/inline_match_prediction_card.dart';\n")
          replace_once(path, """    final showEffectif = initialSection != 'composition';
    final showComposition = initialSection != 'effectif';
    final title = switch (initialSection) {
      'effectif' => 'Effectif',
      'composition' => 'Composition',
      _ => 'Effectif et composition',
    };
""", """    final section = switch (initialSection) {
      'composition' => 'composition',
      'prediction' => 'prediction',
      _ => 'effectif',
    };
    final showEffectif = section == 'effectif';
    final showComposition = section == 'composition';
    final showPrediction = section == 'prediction';
""")
          replace_once(path, "appBar: GrintaAppBar(title: Text(title)),", "appBar: GrintaAppBar(title: const Text('Fiche du match')),")
          replace_once(path, """            if (showEffectif)
              MatchAvailabilityBoardCard(
""", """            SegmentedButton<String>(
              segments: const [
                ButtonSegment(
                  value: 'effectif',
                  icon: Icon(Icons.groups_2_outlined),
                  label: Text('Effectif'),
                ),
                ButtonSegment(
                  value: 'composition',
                  icon: Icon(Icons.sports_soccer_outlined),
                  label: Text('Composition'),
                ),
                ButtonSegment(
                  value: 'prediction',
                  icon: Icon(Icons.sports_score_outlined),
                  label: Text('Ton pari'),
                ),
              ],
              selected: {section},
              onSelectionChanged: (selection) => context.go(
                '/matches/$matchId/lineup?section=${selection.first}',
              ),
            ),
            const SizedBox(height: 16),
            if (showEffectif)
              MatchAvailabilityBoardCard(
""")
          replace_once(path, """            if (showComposition)
              PublishedLineupPreview(
                matchId: matchId,
                expanded: true,
                fallbackToEffectif: false,
                emptyMessage: 'Composition non publiée.',
              ),
""", """            if (showComposition)
              PublishedLineupPreview(
                matchId: matchId,
                expanded: true,
                fallbackToEffectif: false,
                emptyMessage: 'Composition non publiée.',
              ),
            if (showPrediction) InlineMatchPredictionCard(matchId: matchId),
""")

          # The home shortcut and Ton pari tab now share the exact same card.
          Path('lib/features/matches/presentation/upcoming_match_prediction_page.dart').write_text("""import 'package:as_grinta/core/widgets/grinta_app_bar.dart';
import 'package:as_grinta/features/predictions/presentation/widgets/inline_match_prediction_card.dart';
import 'package:flutter/material.dart';

class UpcomingMatchPredictionPage extends StatelessWidget {
  const UpcomingMatchPredictionPage({super.key, required this.matchId});

  final String matchId;

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: GrintaAppBar(title: const Text('Ton pari')),
      body: ListView(
        padding: const EdgeInsets.fromLTRB(16, 16, 16, 40),
        children: [InlineMatchPredictionCard(matchId: matchId)],
      ),
    );
  }
}
""")

          # The public RPC wrappers are invokers: allow them to invoke the
          # private, security-definer implementations that enforce auth rules.
          Path('supabase/migrations/20260722102000_fix_motm_rpc_permissions.sql').write_text("""-- The public MOTM RPC wrappers are SECURITY INVOKER and delegate to private
-- SECURITY DEFINER implementations containing the actual authorization checks.
-- Their private delegates must therefore be executable by signed-in members.

grant execute on function private.get_match_motm_vote(uuid) to authenticated;
grant execute on function private.cast_match_motm_vote(uuid, uuid) to authenticated;
grant execute on function private.admin_cancel_match_motm_vote(uuid, text) to authenticated;
grant execute on function private.admin_restart_match_motm_vote(uuid, text) to authenticated;
""")

          # Force the PWA to take the new workspace/navigation bundle.
          replace_once(
              'web/sw.js',
              "// et réception des notifications push Web Push. Cache fonctionnel v66 — pastille des nouveaux badges.\nconst CACHE_NAME = 'as-grinta-v66';",
              "// et réception des notifications push Web Push. Cache fonctionnel v67 — fiches de match, pari et vote HDM.\nconst CACHE_NAME = 'as-grinta-v67';",
          )
          path = 'web/index.html'
          text = Path(path).read_text().replace("sw.js?v=66", "sw.js?v=67").replace("flutter_bootstrap.js?v=66", "flutter_bootstrap.js?v=67")
          Path(path).write_text(text)

          Path('.github/workflows/apply_match_workspace_patch.yml').unlink()
          PY

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Refondre les actions et la fiche des matchs"
          git push origin HEAD:agent/match-actions-pari-hdm
