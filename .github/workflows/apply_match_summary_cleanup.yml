name: Apply match summary and squad cleanup

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/match-summary-and-squad-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply requested changes
        shell: python
        run: |
          from pathlib import Path
          import re

          def replace_once(path, old, new, label):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'Block not found: {label} in {path}')
              file.write_text(text.replace(old, new, 1))

          def regex_once(path, pattern, replacement, label):
              file = Path(path)
              text = file.read_text()
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'Regex block not found: {label} in {path} ({count})')
              file.write_text(updated)

          # The whole next-match card must open match details. Only the explicit
          # betting button opens the prediction editor.
          replace_once(
              'lib/features/home/presentation/accueil_page.dart',
              """        onTap: () => context.push(
                  open ? '/matches/${match.id}/prediction' : '/matches/${match.id}',
                ),""",
              """        onTap: () => context.push('/matches/${match.id}'),""",
              'next match card route',
          )

          repo = 'lib/features/matches/data/match_details_repository.dart'
          replace_once(
              repo,
              """class MatchPredictionResult {""",
              """class MatchStartingPlayer {
            const MatchStartingPlayer({
              required this.seasonPlayerId,
              required this.name,
              required this.goals,
              required this.isManOfTheMatch,
              required this.sortOrder,
            });

            final String? seasonPlayerId;
            final String name;
            final int goals;
            final bool isManOfTheMatch;
            final int sortOrder;
          }

          class MatchPredictionResult {""",
              'starting player model',
          )
          replace_once(
              repo,
              """    required this.playerStats,
              required this.predictions,""",
              """    required this.playerStats,
              required this.startingLineup,
              required this.predictions,""",
              'details constructor lineup',
          )
          replace_once(
              repo,
              """  final List<MatchStatLine> playerStats;
            final List<MatchPredictionResult> predictions;""",
              """  final List<MatchStatLine> playerStats;
            final List<MatchStartingPlayer> startingLineup;
            final List<MatchPredictionResult> predictions;""",
              'details lineup field',
          )
          replace_once(
              repo,
              """    var playerStats = const <MatchStatLine>[];
              var predictions = const <MatchPredictionResult>[];""",
              """    var playerStats = const <MatchStatLine>[];
              var startingLineup = const <MatchStartingPlayer>[];
              var predictions = const <MatchPredictionResult>[];""",
              'details lineup variable',
          )
          regex_once(
              repo,
              r"      final statRows = await _client\.from\('match_player_stats'\)\.select\('''.*?      final pointRows = await _client",
              """      final statRows = await _client.from('match_player_stats').select('''
                season_player_id,goals,clean_sheet,
                season_players(first_name,last_name)
              ''').eq('match_id', matchId);
              final statsByPlayerId = <String, MatchStatLine>{};
              playerStats = (statRows as List).map((row) {
                final map = Map<String, dynamic>.from(row);
                final player = map['season_players'] is Map
                    ? Map<String, dynamic>.from(map['season_players'] as Map)
                    : const <String, dynamic>{};
                final stat = MatchStatLine(
                  name: _displayName(player),
                  goals: (map['goals'] as num?)?.toInt() ?? 0,
                  cleanSheet: map['clean_sheet'] == true,
                );
                final seasonPlayerId = map['season_player_id']?.toString();
                if (seasonPlayerId != null && seasonPlayerId.isNotEmpty) {
                  statsByPlayerId[seasonPlayerId] = stat;
                }
                return stat;
              }).toList()
                ..sort((a, b) => b.goals.compareTo(a.goals));

              final publication = await _client
                  .from('match_composition_publications')
                  .select('snapshot')
                  .eq('match_id', matchId)
                  .order('version', ascending: false)
                  .order('published_at', ascending: false)
                  .limit(1)
                  .maybeSingle();
              final manOfMatchRows = await _client
                  .from('match_man_of_match')
                  .select('season_player_id')
                  .eq('match_id', matchId);
              final manOfMatchIds = {
                for (final row in manOfMatchRows as List)
                  if ((row as Map)['season_player_id'] != null)
                    (row)['season_player_id'].toString(),
              };
              final snapshot = publication?['snapshot'];
              if (snapshot is Map && snapshot['entries'] is List) {
                startingLineup = (snapshot['entries'] as List)
                    .whereType<Map>()
                    .map((raw) => Map<String, dynamic>.from(raw))
                    .where((entry) => entry['zone']?.toString() == 'field')
                    .map((entry) {
                      final seasonPlayerId = entry['season_player_id']?.toString();
                      final stat = seasonPlayerId == null
                          ? null
                          : statsByPlayerId[seasonPlayerId];
                      return MatchStartingPlayer(
                        seasonPlayerId: seasonPlayerId,
                        name: _firstNameFromText(
                          (entry['display_name'] ?? 'Joueur').toString(),
                        ),
                        goals: stat?.goals ?? 0,
                        isManOfTheMatch: seasonPlayerId != null &&
                            manOfMatchIds.contains(seasonPlayerId),
                        sortOrder: (entry['sort_order'] as num?)?.toInt() ?? 0,
                      );
                    })
                    .toList()
                  ..sort((a, b) => a.sortOrder.compareTo(b.sortOrder));
              }

              final pointRows = await _client""",
              'validated stats and starting lineup',
          )
          replace_once(
              repo,
              """      playerStats: playerStats,
              predictions: predictions,""",
              """      playerStats: playerStats,
              startingLineup: startingLineup,
              predictions: predictions,""",
              'return starting lineup',
          )
          replace_once(
              repo,
              """  static String _displayName(Map<String, dynamic> profile) {
              final firstName = (profile['first_name'] ?? '').toString().trim();
              return firstName.isEmpty ? 'Joueur' : firstName;
            }

            Future<void> reportMatch({""",
              """  static String _displayName(Map<String, dynamic> profile) {
              final firstName = (profile['first_name'] ?? '').toString().trim();
              return firstName.isEmpty ? 'Joueur' : firstName;
            }

            static String _firstNameFromText(String value) {
              final trimmed = value.trim();
              if (trimmed.isEmpty) return 'Joueur';
              return trimmed.split(RegExp(r'\\s+')).first;
            }

            Future<void> reportMatch({""",
              'first name helper',
          )

          page = 'lib/features/matches/presentation/match_details_page.dart'
          replace_once(
              page,
              """                if (details.playerStats.isNotEmpty) ...[
                  const SizedBox(height: 16),
                  _MatchSummary(details: details),
                ],""",
              """                const SizedBox(height: 16),
                _MatchSummary(details: details),""",
              'always show match summary',
          )
          regex_once(
              page,
              r"class _MatchSummary extends StatelessWidget \{.*?\n\}\n\nclass _SportAction",
              """class _MatchSummary extends StatelessWidget {
            const _MatchSummary({required this.details});

            final MatchDetailsData details;

            @override
            Widget build(BuildContext context) {
              return Card(
                child: Padding(
                  padding: const EdgeInsets.all(18),
                  child: Column(
                    crossAxisAlignment: CrossAxisAlignment.start,
                    children: [
                      Text(
                        'Résumé du match',
                        style: Theme.of(context).textTheme.titleLarge,
                      ),
                      const SizedBox(height: 16),
                      Text(
                        'Composition de départ',
                        style: Theme.of(context).textTheme.titleMedium,
                      ),
                      const SizedBox(height: 8),
                      if (details.startingLineup.isEmpty)
                        const Text('Composition de départ non renseignée.')
                      else
                        ...details.startingLineup.map(
                          (player) => Padding(
                            padding: const EdgeInsets.symmetric(vertical: 4),
                            child: Row(
                              children: [
                                Expanded(child: Text(player.name)),
                                if (player.goals > 0) ...[
                                  Text(
                                    player.goals == 1
                                        ? '⚽️'
                                        : '⚽️ ×${player.goals}',
                                    style: const TextStyle(
                                      fontWeight: FontWeight.w800,
                                    ),
                                  ),
                                  const SizedBox(width: 8),
                                ],
                                if (player.isManOfTheMatch)
                                  const Text('👑', style: TextStyle(fontSize: 18)),
                              ],
                            ),
                          ),
                        ),
                    ],
                  ),
                ),
              );
            }
          }

          class _SportAction""",
              'match summary lineup',
          )

          admin = 'lib/features/sports_management/presentation/admin_squad_plan_page.dart'
          regex_once(
              admin,
              r"  void _applyAutomaticProposal\(\) \{.*?\n  \}\n\n  Future<void> _showPlayerActions",
              "  Future<void> _showPlayerActions",
              'automatic proposal method',
          )
          regex_once(
              admin,
              r"  Future<void> _configureLimit\(\) async \{.*?\n  \}\n\n  Future<void> _recomputeProposal\(\) async \{.*?\n  \}\n\n  Future<void> _sendReminder",
              "  Future<void> _sendReminder",
              'limit and recompute methods',
          )
          replace_once(
              admin,
              """          onLimit: _configureLimit,
                    onRecompute: _recomputeProposal,
                    onAutoPlace: _applyAutomaticProposal,
                    onReminder: _sendReminder,""",
              """          onReminder: _sendReminder,""",
              'summary callbacks invocation',
          )
          replace_once(
              admin,
              """    required this.onLimit,
              required this.onRecompute,
              required this.onAutoPlace,
              required this.onReminder,""",
              """    required this.onReminder,""",
              'summary constructor callbacks',
          )
          replace_once(
              admin,
              """  final VoidCallback onLimit;
            final VoidCallback onRecompute;
            final VoidCallback onAutoPlace;
            final VoidCallback onReminder;""",
              """  final VoidCallback onReminder;""",
              'summary callback fields',
          )
          replace_once(
              admin,
              """            const SizedBox(height: 12),
                      Wrap(
                        spacing: 8,
                        runSpacing: 8,
                        children: [
                          Chip(label: Text('${composition.fieldCount}/11 titulaires')),
                          Chip(label: Text('${composition.benchCount} sur le banc')),
                          Chip(
                            label: Text(
                              '${composition.selectedCount}/${convocations.squadSizeLimit} sélectionnés',
                            ),
                            side: overLimit
                                ? BorderSide(color: Theme.of(context).colorScheme.error)
                                : null,
                          ),
                          if (composition.version > 0)
                            Chip(label: Text('Version ${composition.version}')),
                        ],
                      ),""",
              """            if (composition.version > 0) ...[
                      const SizedBox(height: 12),
                      Chip(label: Text('Version ${composition.version}')),
                    ],""",
              'selection count chips',
          )
          regex_once(
              admin,
              r"                OutlinedButton\.icon\(\n                  onPressed: busy \? null : onLimit,.*?                OutlinedButton\.icon\(\n                  onPressed: busy \? null : onAutoPlace,.*?                  label: const Text\('Placer la proposition'\),\n                \),\n",
              "",
              'three removed actions',
          )
          replace_once(
              admin,
              """                  label: Text(player.displayName),""",
              """                  label: Text(
                    player.firstName.trim().isEmpty
                        ? player.displayName
                        : player.firstName.trim(),
                  ),""",
              'availability first names',
          )

      - name: Format changed Dart files
        run: |
          flutter pub get
          dart format \
            lib/features/home/presentation/accueil_page.dart \
            lib/features/matches/data/match_details_repository.dart \
            lib/features/matches/presentation/match_details_page.dart \
            lib/features/sports_management/presentation/admin_squad_plan_page.dart

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply_match_summary_cleanup.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            lib/features/home/presentation/accueil_page.dart \
            lib/features/matches/data/match_details_repository.dart \
            lib/features/matches/presentation/match_details_page.dart \
            lib/features/sports_management/presentation/admin_squad_plan_page.dart \
            .github/workflows/apply_match_summary_cleanup.yml
          git commit -m "Afficher la composition de départ et simplifier la sélection"
          git push origin HEAD:${{ github.head_ref }}
