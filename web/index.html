<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ma Petite Grinta — les pronos de l'AS Grinta">
  <meta name="theme-color" content="#07142E">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MPG">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ma Petite Grinta</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #07142E; }
  </style>
</head>
<body>
  <script>
    // Bandeau « nouvelle version disponible ».
    window.asGrintaUpdate = {
      _worker: null,
      show: function (worker) {
        this._worker = worker;
        if (!worker || document.getElementById('as-grinta-update-bar')) return;
        var bar = document.createElement('div');
        bar.id = 'as-grinta-update-bar';
        bar.textContent = '🔄 Nouvelle version disponible — appuyez pour mettre à jour';
        bar.setAttribute('style', [
          'position:fixed', 'top:0', 'left:0', 'right:0', 'z-index:2147483647',
          'background:#9B6CFF', 'color:#ffffff',
          'font:600 14px/1.35 -apple-system,BlinkMacSystemFont,system-ui,sans-serif',
          'padding:calc(env(safe-area-inset-top, 0px) + 12px) 16px 12px',
          'text-align:center', 'cursor:pointer',
          'box-shadow:0 2px 10px rgba(0,0,0,.35)'
        ].join(';'));
        var self = this;
        bar.addEventListener('click', function () {
          bar.textContent = 'Mise à jour…';
          if (self._worker) self._worker.postMessage({ type: 'SKIP_WAITING' });
        });
        document.body.appendChild(bar);
      }
    };
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js?v=125').then(function (registration) {
        if (!registration) return;
        function considerWorker(worker) {
          // On ne propose la mise à jour que s'il y a déjà une version en place.
          if (worker && navigator.serviceWorker.controller) {
            window.asGrintaUpdate.show(worker);
          }
        }
        considerWorker(registration.waiting);
        registration.addEventListener('updatefound', function () {
          var incoming = registration.installing;
          if (!incoming) return;
          incoming.addEventListener('statechange', function () {
            if (incoming.state === 'installed') considerWorker(incoming);
          });
        });
        // Re-vérifie au lancement, régulièrement, et au retour au premier plan.
        registration.update();
        setInterval(function () { registration.update(); }, 60000);
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') registration.update();
        });
      }).catch(function () {});
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
    window.asGrintaPush = {
      support: function () {
        return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
      },
      permission: function () {
        return 'Notification' in window ? Notification.permission : 'unsupported';
      },
      subscribe: async function (vapidKey) {
        if (!window.asGrintaPush.support()) return '';
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return '';
        const registration = await navigator.serviceWorker.ready;
        const padding = '='.repeat((4 - (vapidKey.length % 4)) % 4);
        const base64 = (vapidKey + padding).replace(/-/g, '+').replace(/_/g, '/');
        const raw = atob(base64);
        const key = Uint8Array.from(Array.from(raw, function (c) { return c.charCodeAt(0); }));
        const subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: key,
        });
        return JSON.stringify(subscription.toJSON());
      },
      current: async function () {
        if (!window.asGrintaPush.support()) return '';
        const registration = await navigator.serviceWorker.getRegistration();
        if (!registration) return '';
        const subscription = await registration.pushManager.getSubscription();
        return subscription ? JSON.stringify(subscription.toJSON()) : '';
      },
      unsubscribe: async function () {
        if (!window.asGrintaPush.support()) return '';
        const registration = await navigator.serviceWorker.getRegistration();
        if (!registration) return '';
        const subscription = await registration.pushManager.getSubscription();
        if (!subscription) return '';
        const json = JSON.stringify(subscription.toJSON());
        await subscription.unsubscribe();
        return json;
      },
    };
  </script>
  <script src="flutter_bootstrap.js?v=125" async></script>
</body>
</html>
