<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ma Petite Grinta — les pronos de l'AS Grinta">
  <meta name="theme-color" content="#07142E">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MPG">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ma Petite Grinta</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #07142E; }
  </style>
</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js?v=59').then(function (registration) {
        if (registration) registration.update();
      }).catch(function () {});
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
    window.asGrintaPush = {
      support: function () {
        return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
      },
      permission: function () {
        return window.Notification ? Notification.permission : 'unsupported';
      },
      requestPermission: function () {
        if (!window.Notification) return Promise.resolve('unsupported');
        return Notification.requestPermission();
      },
      subscribe: function (vapidKey) {
        return navigator.serviceWorker.ready.then(function (registration) {
          return registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: vapidKey,
          });
        }).then(function (subscription) {
          return subscription.toJSON();
        });
      },
      unsubscribe: function () {
        return navigator.serviceWorker.ready.then(function (registration) {
          return registration.pushManager.getSubscription();
        }).then(function (subscription) {
          if (!subscription) return false;
          return subscription.unsubscribe();
        });
      },
      getSubscription: function () {
        return navigator.serviceWorker.ready.then(function (registration) {
          return registration.pushManager.getSubscription();
        }).then(function (subscription) {
          return subscription ? subscription.toJSON() : null;
        });
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
