<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Application officielle AS Grinta">
  <meta name="theme-color" content="#0B1F17">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <title>AS Grinta</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #0B1F17; }
  </style>
</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
    window.asGrintaPush = {
      support: function () {
        return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
      },
      permission: function () {
        return 'Notification' in window ? Notification.permission : 'unsupported';
      },
      subscribe: async function (vapidKey) {
        if (!window.asGrintaPush.support()) return '';
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return '';
        const registration = await navigator.serviceWorker.ready;
        const padding = '='.repeat((4 - (vapidKey.length % 4)) % 4);
        const base64 = (vapidKey + padding).replace(/-/g, '+').replace(/_/g, '/');
        const raw = atob(base64);
        const key = Uint8Array.from(Array.from(raw, function (c) { return c.charCodeAt(0); }));
        const subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: key,
        });
        return JSON.stringify(subscription.toJSON());
      },
      current: async function () {
        if (!window.asGrintaPush.support()) return '';
        const registration = await navigator.serviceWorker.getRegistration();
        if (!registration) return '';
        const subscription = await registration.pushManager.getSubscription();
        return subscription ? JSON.stringify(subscription.toJSON()) : '';
      },
      unsubscribe: async function () {
        if (!window.asGrintaPush.support()) return '';
        const registration = await navigator.serviceWorker.getRegistration();
        if (!registration) return '';
        const subscription = await registration.pushManager.getSubscription();
        if (!subscription) return '';
        const json = JSON.stringify(subscription.toJSON());
        await subscription.unsubscribe();
        return json;
      },
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
